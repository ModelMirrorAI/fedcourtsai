name: run-probe

# Manual, READ-ONLY diagnostic (issue #369). Answers one open question that blocks
# the evaluate/reconcile-flow work: for the sparse historical SCOTUS
# `evt-petition-disposition` cases, is the disposition actually recoverable from
# CourtListener (an ingestion gap a seed/pull backfill can close) or genuinely
# absent upstream (keep them out of scope)?
#
# It runs `fedcourts probe-recoverability`, which only READS the CourtListener REST
# API — it never writes the corpus, `data/`, DVC, or git, opens no PR, and files no
# issue. It exists as its own dedicated workflow (rather than a step bolted onto a
# corpus writer) so the blast radius stays tiny: the sole reason it is a workflow at
# all is that the REST token lives in the runner secrets, not in `run-dev`. The
# per-docket RECOVERABLE / ABSENT / AMBIGUOUS classification is written to the
# Actions step summary and the run log.
on:
  workflow_dispatch:
    inputs:
      dockets:
        description: "court/docket pairs to probe (comma-separated). Default: the four #366 SCOTUS petitions; pass recent-term decided petitions to span eras."
        type: string
        default: "scotus/1000512,scotus/1000515,scotus/1002339,scotus/1003943"

# Least privilege: read the code to run the CLI, nothing more. No id-token (no AWS /
# DVC), no App token, no contents:write — the probe cannot touch the corpus or git.
permissions:
  contents: read

concurrency:
  group: run-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python-env

      - name: Probe recoverability
        env:
          # The dockets input is passed through the environment (never interpolated
          # into the shell) so a maintainer-supplied value cannot inject commands;
          # the CLI reads it as a single `--dockets` argument.
          DOCKETS: ${{ inputs.dockets }}
          # Read-only REST access to CourtListener. Same token + rate-limit wiring as
          # run-pull: the client throttles to the per-token tier (config.py
          # courtlistener_rpm/rph/rpd); the `|| '...'` fallbacks default to the held
          # Tier 2 (15/150/600) so an unset variable lands on the correct ceiling.
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          FEDCOURTS_COURTLISTENER_RPM: ${{ vars.COURTLISTENER_RPM || '15' }}
          FEDCOURTS_COURTLISTENER_RPH: ${{ vars.COURTLISTENER_RPH || '150' }}
          FEDCOURTS_COURTLISTENER_RPD: ${{ vars.COURTLISTENER_RPD || '600' }}
        run: |
          set -euo pipefail
          # The command prints the machine JSON to stdout (captured to the run log)
          # and appends the human Markdown summary directly to the step summary. It
          # writes nothing else — no corpus, data/, DVC, or git.
          uv run fedcourts probe-recoverability \
            --dockets "$DOCKETS" \
            --summary-out "$GITHUB_STEP_SUMMARY"
