name: run-metrics

# Scheduled refresh of the committed metrics artifacts:
# metrics/leaderboard.json (input: the git data/ evaluations ledger),
# metrics/backtest.json and metrics/statpack.{json,md} (input: the corpus).
# All three are deterministic DVC stages, but nothing regenerated them as their
# inputs grew, so they drifted stale on main between manual `dvc repro` runs.
#
# This workflow `dvc pull`s the corpus read-only, reruns the same tested
# `fedcourts` commands the stages run (calling them directly avoids `dvc repro`
# leaving an untracked dvc.lock), and — only when something changed — opens a
# **reviewed** PR, mirroring run-cleanup: never a direct commit to main, never
# auto-merged. Byte-stable artifacts mean a no-op refresh diffs empty and opens
# nothing. The branch is fixed (`metrics/refresh`, rendered by the tested
# `metrics-refresh-plan` command): each refresh regenerates from current main,
# so an unmerged refresh PR is superseded — the job force-pushes the branch and
# the open PR updates in place instead of stacking one PR per schedule tick.
on:
  schedule:
    # Weekly (Mon) at 05:41 UTC — a quiet slot after run-seed's Sunday-night
    # window, between run-pull's 01:17 and 07:17 windows, so the refresh sees a
    # settled corpus.
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: run-metrics
  cancel-in-progress: false

jobs:
  refresh:
    # Schedule and manual dispatch only — both trusted surfaces (dispatch is
    # write-gated by GitHub), so no authorize-trigger gate is needed here.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: runner
    permissions:
      contents: read
      id-token: write # assume the read-only AWS role to dvc pull the corpus
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # The refresh PR is opened with the dev App token. The dev App is not a
      # branch-protection bypass actor, so the PR still faces the required `gate`
      # check, and it is never auto-merged — review is mandatory.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      # backtest and statpack read the corpus, so it must be on disk. Assume the
      # read-only S3 role via OIDC and dvc pull it; a pull failure fails the job
      # (regenerating against a missing corpus would regress those artifacts to
      # the empty pack).
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"
      - name: Pull the corpus
        run: |
          set -euo pipefail
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; refreshing the leaderboard only"
          fi

      # The same commands the dvc.yaml stages run; each is deterministic, so an
      # unchanged input reproduces the committed artifact byte for byte. The
      # corpus-dependent pair runs only when the corpus is on disk — regenerating
      # without it would replace real metrics with the empty pack.
      - name: Regenerate the metrics artifacts
        run: |
          set -euo pipefail
          uv run fedcourts leaderboard
          if [ -f corpus/corpus.db ]; then
            uv run fedcourts backtest
            uv run fedcourts statpack
          fi

      # The branch name and PR prose come from the tested `metrics-refresh-plan`
      # (null pr = nothing changed); this step only runs git and gh, mirroring
      # run-cleanup. The fixed branch is force-pushed so an unmerged refresh PR
      # updates in place rather than stacking.
      - name: Open or update the review PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Stage first, then diff the index: a plain `git diff` sees only tracked
          # files, so a future brand-new artifact under metrics/ would be missed.
          git add -A metrics/
          git diff --cached --name-only -- metrics/ > changed.txt
          plan=$(uv run fedcourts metrics-refresh-plan --changed-file changed.txt \
            --run-id "$GITHUB_RUN_ID")
          if [ "$(jq -r '.pr' <<<"$plan")" = "null" ]; then
            echo "Metrics are up to date; nothing to refresh." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          branch=$(jq -r '.pr.branch' <<<"$plan")
          git checkout -q -b "$branch"
          jq -r '.pr.body' <<<"$plan" > pr-body.md
          git commit -q -m "$(jq -r '.pr.commit_message' <<<"$plan")"
          # Push with the app (write) token; blank any ambient extraheader so it
          # authenticates. Force: the fixed branch supersedes any unmerged refresh.
          git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
            push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${branch}"
          # Reuse the open PR for this branch when one exists (the force-push above
          # already updated its contents); otherwise open a fresh one.
          existing=$(gh pr list --repo "$REPO" --head "$branch" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$REPO" \
              --title "$(jq -r '.pr.title' <<<"$plan")" --body-file pr-body.md
            echo "Updated review PR #${existing} in place." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            url=$(gh pr create --base main --head "$branch" \
              --title "$(jq -r '.pr.title' <<<"$plan")" --body-file pr-body.md)
            echo "Opened review PR: ${url}" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
