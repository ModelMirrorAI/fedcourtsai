name: run-analytics

# Corpus analysis & derived metrics. One surface for every task that reads the
# corpus and answers a question or refreshes a derived artifact, selected by
# `mode` (dispatch) or the weekly schedule:
#
#   - corpus-stats:    aggregate disposition base-rates over the packed corpus
#                      (`fedcourts stats`) — the "what's the grant rate for X"
#                      question. Reads the corpus read-only via a `dvc pull`.
#   - recoverability:  for sparse historical SCOTUS `evt-petition-disposition`
#                      cases, is the disposition recoverable from CourtListener
#                      (an ingestion gap) or genuinely absent? (`probe-recoverability`,
#                      REST-only.)
#   - recoverability-sample: the same probe over a deterministic stratified sample
#                      of the resolved-but-dateless corpus slice, sizing what a
#                      date backfill can recover per stratum (corpus read + REST).
#   - metrics-refresh: regenerate the committed metrics artifacts (leaderboard /
#                      backtest / statpack) and land any change as a **reviewed**
#                      PR — never a direct commit to main, never auto-merged.
#                      Also the schedule's job (weekly).
#
# The analysis modes are strictly read-only: none writes the corpus, `data/`,
# DVC, or git, opens a PR, or files an issue — every result goes to the Actions step
# summary and the run log (plus a run artifact for the sample's machine report).
# GitHub scopes permissions and tokens per **job**, so each mode runs as its own
# least-privilege job gated on `mode` and none is ever granted another's credential:
# corpus-stats holds only the read-only S3 role, recoverability only the
# CourtListener REST token, recoverability-sample both read-only credentials (it
# draws its targets from the corpus, then probes them), and metrics-refresh alone
# mints the dev App token (contents + PR write) to open its review PR.
on:
  schedule:
    # Weekly metrics refresh (Mon 05:41 UTC) — a quiet slot after run-pull's
    # 02:31 historical and 04:47 live windows, before its 07:17 pull window, so
    # the refresh sees a settled corpus. Runs only the metrics-refresh job (a
    # schedule event carries no inputs, so the mode-gated jobs stay skipped).
    - cron: "41 5 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: Which analysis or refresh to run.
        type: choice
        options:
          - corpus-stats
          - recoverability
          - recoverability-sample
          - metrics-refresh
        default: corpus-stats
      # corpus-stats inputs (ignored by the recoverability mode). All are optional; an
      # empty value means "no filter" / "no grouping".
      court:
        description: "corpus-stats: restrict to one court id (e.g. scotus). Empty = all courts."
        type: string
        default: ""
      topic:
        description: "corpus-stats: restrict to one exact nature-of-suit / topic. Empty = all."
        type: string
        default: ""
      disposition:
        description: "corpus-stats: restrict to one realized outcome label (e.g. granted). Empty = all."
        type: string
        default: ""
      group_by:
        description: "corpus-stats: break base-rates down by court / topic / judge / term_year / disposition / originating_court. Empty = overall only."
        type: string
        default: ""
      term:
        description: "corpus-stats: restrict to one SCOTUS October-Term year, e.g. 2024. Empty = all Terms."
        type: string
        default: ""
      # recoverability input (ignored by corpus-stats).
      dockets:
        description: "recoverability: court/docket pairs to probe (comma-separated)."
        type: string
        default: "scotus/1000512,scotus/1000515,scotus/1002339,scotus/1003943"
      # recoverability-sample inputs (ignored by the other modes). 40 dockets is
      # ~2-3 REST requests each — roughly a fifth of the Tier 2 daily budget.
      sample:
        description: "recoverability-sample: how many dateless resolved dockets to draw."
        type: string
        default: "40"
      seed:
        description: "recoverability-sample: PRNG seed; same corpus + seed = same draw."
        type: string
        default: "0"

# Least privilege by default; each job widens only to what its mode needs.
permissions: {}

# Concurrency is per-job (not workflow-level): the analysis modes cancel a
# superseded run of themselves, while a metrics refresh must never be cancelled
# mid-PR by an unrelated analysis dispatch.

jobs:
  corpus-stats:
    if: ${{ inputs.mode == 'corpus-stats' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: runner
    concurrency:
      group: run-analytics-analysis
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write # assume the read-only AWS role to dvc pull the corpus
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python-env

      # The base-rates read the corpus (the real rows), so it must be on disk.
      # No contents:write, no App token: this job cannot touch git or the corpus.
      - uses: ./.github/actions/corpus-readonly
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          dvc-remote-url: ${{ vars.DVC_REMOTE_URL }}

      - name: Aggregate corpus base-rates
        env:
          # Every filter is passed through the environment (never interpolated into the
          # shell) so a maintainer-supplied value cannot inject commands; the CLI reads
          # each as one argument and treats an empty value as "no filter" / "no grouping".
          COURT: ${{ inputs.court }}
          TOPIC: ${{ inputs.topic }}
          DISPOSITION: ${{ inputs.disposition }}
          GROUP_BY: ${{ inputs.group_by }}
          # Not `TERM`: that name is the standard terminal-type variable, which
          # every subprocess consults — an avoidable namespace collision.
          TERM_YEAR: ${{ inputs.term }}
        run: |
          set -euo pipefail
          # Prints the machine AnalyticsReport JSON to stdout (the run log) and appends
          # the Markdown summary to the step summary. Writes nothing else.
          uv run fedcourts stats \
            --court "$COURT" \
            --topic "$TOPIC" \
            --disposition "$DISPOSITION" \
            --group-by "$GROUP_BY" \
            --term "$TERM_YEAR" \
            --summary-out "$GITHUB_STEP_SUMMARY"

  recoverability:
    if: ${{ inputs.mode == 'recoverability' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: runner
    concurrency:
      group: run-analytics-analysis
      cancel-in-progress: true
    # Least privilege: read the code to run the CLI, nothing more. No id-token (no AWS /
    # DVC), no App token, no contents:write — the probe cannot touch the corpus or git.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python-env

      - name: Probe recoverability
        env:
          # The dockets input is passed through the environment (never interpolated
          # into the shell) so a maintainer-supplied value cannot inject commands;
          # the CLI reads it as a single `--dockets` argument.
          DOCKETS: ${{ inputs.dockets }}
          # Read-only REST access to CourtListener. Same token + rate-limit wiring as
          # run-pull: the client throttles to the per-token tier (config.py
          # courtlistener_rpm/rph/rpd); the `|| '...'` fallbacks default to the held
          # Tier 2 (15/150/600) so an unset variable lands on the correct ceiling.
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          FEDCOURTS_COURTLISTENER_RPM: ${{ vars.COURTLISTENER_RPM || '15' }}
          FEDCOURTS_COURTLISTENER_RPH: ${{ vars.COURTLISTENER_RPH || '150' }}
          FEDCOURTS_COURTLISTENER_RPD: ${{ vars.COURTLISTENER_RPD || '600' }}
        run: |
          set -euo pipefail
          # The command prints the machine JSON to stdout (captured to the run log)
          # and appends the human Markdown summary directly to the step summary. It
          # writes nothing else — no corpus, data/, DVC, or git.
          uv run fedcourts probe-recoverability \
            --dockets "$DOCKETS" \
            --summary-out "$GITHUB_STEP_SUMMARY"

  # Like the plain probe but self-targeting: draws a deterministic stratified
  # sample of the resolved-but-dateless corpus slice (SCOTUS modern-cert / ca4 /
  # other circuits) and probes it, sizing what a date backfill can recover per
  # stratum. Needs both the corpus (to draw the sample — hence the read-only AWS
  # role) and the REST token (to probe it); still strictly read-only — no App
  # token, no contents:write, so it cannot touch git, data/, or the DVC remote.
  # The machine report is kept as a run artifact; the rollup goes to the step
  # summary.
  recoverability-sample:
    if: ${{ inputs.mode == 'recoverability-sample' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: runner
    concurrency:
      group: run-analytics-analysis
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write # assume the read-only AWS role to dvc pull the corpus
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python-env

      # The sampler reads the real corpus rows to draw its strata.
      - uses: ./.github/actions/corpus-readonly
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          dvc-remote-url: ${{ vars.DVC_REMOTE_URL }}

      - name: Probe a stratified sample of the dateless resolved slice
        env:
          # Inputs pass through the environment (never interpolated into the
          # shell) so a maintainer-supplied value cannot inject commands; the CLI
          # reads each as one argument.
          SAMPLE: ${{ inputs.sample }}
          SEED: ${{ inputs.seed }}
          # Same read-only REST token + rate-limit wiring as the plain probe.
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          FEDCOURTS_COURTLISTENER_RPM: ${{ vars.COURTLISTENER_RPM || '15' }}
          FEDCOURTS_COURTLISTENER_RPH: ${{ vars.COURTLISTENER_RPH || '150' }}
          FEDCOURTS_COURTLISTENER_RPD: ${{ vars.COURTLISTENER_RPD || '600' }}
        run: |
          set -euo pipefail
          # Prints the machine JSON to stdout (the run log), writes it to the
          # artifact file, and appends the per-stratum rollup + dated-share
          # summary to the step summary. Nothing else is written.
          uv run fedcourts probe-recoverability \
            --sample-dateless "$SAMPLE" \
            --seed "$SEED" \
            --report-out probe-report.json \
            --summary-out "$GITHUB_STEP_SUMMARY"

      - name: Keep the machine report as a run artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: recoverability-sample-report
          path: probe-report.json

  # Scheduled refresh of the committed metrics artifacts:
  # metrics/leaderboard.json (input: the git data/ evaluations ledger),
  # metrics/backtest.json and metrics/statpack.{json,md} (input: the corpus).
  # All three are deterministic DVC stages, but nothing regenerated them as their
  # inputs grew, so they drifted stale on main between manual `dvc repro` runs.
  #
  # This job reruns the same tested `fedcourts` commands the stages run (calling
  # them directly avoids `dvc repro` leaving an untracked dvc.lock), and — only
  # when something changed — opens a **reviewed** PR:
  # never a direct commit to main, never auto-merged. Byte-stable artifacts mean
  # a no-op refresh diffs empty and opens nothing. The branch is fixed
  # (`metrics/refresh`, rendered by the tested `metrics-refresh-plan` command):
  # each refresh regenerates from current main, so an unmerged refresh PR is
  # superseded — the job force-pushes the branch and the open PR updates in
  # place instead of stacking one PR per schedule tick.
  metrics-refresh:
    # Runs on the weekly schedule, or on dispatch with mode=metrics-refresh —
    # both trusted surfaces (dispatch is write-gated by GitHub), so no
    # authorize-trigger gate is needed here.
    if: ${{ github.event_name == 'schedule' || inputs.mode == 'metrics-refresh' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: runner
    concurrency:
      group: run-analytics-metrics-refresh
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # assume the read-only AWS role to dvc pull the corpus
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # The refresh PR is opened with the dev App token. The dev App is not a
      # branch-protection bypass actor, so the PR still faces the required `gate`
      # check, and it is never auto-merged — review is mandatory. This is the only
      # job in this workflow that holds a write-capable token; the analysis modes
      # above stay strictly read-only.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      # backtest and statpack read the corpus, so it must be on disk; a missing
      # pointer only warns (the leaderboard needs no corpus), but a failed pull
      # of an existing pointer fails the job — regenerating against a missing
      # corpus would regress those artifacts to the empty pack.
      - uses: ./.github/actions/corpus-readonly
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          dvc-remote-url: ${{ vars.DVC_REMOTE_URL }}
          missing-pointer: warn

      # The same commands the dvc.yaml stages run, called directly (avoiding an
      # untracked dvc.lock); each is deterministic, so an unchanged input
      # reproduces the committed artifact byte for byte. The corpus-dependent
      # pair runs only when the corpus is on disk — regenerating without it
      # would replace real metrics with the empty pack. (The backtest's
      # prior-vote baseline retrieves against a prebuilt index, so a full
      # replay costs a couple of resolved-slice scans, not a query per case.)
      - name: Regenerate the metrics artifacts
        run: |
          set -euo pipefail
          uv run fedcourts leaderboard
          if [ -f corpus/corpus.db ]; then
            uv run fedcourts backtest
            uv run fedcourts statpack
          fi

      # The branch name and PR prose come from the tested `metrics-refresh-plan`
      # (null pr = nothing changed); this step only runs git and gh, mirroring
      # a direct commit. The fixed branch is force-pushed so an unmerged refresh PR
      # updates in place rather than stacking.
      - name: Open or update the review PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Stage first, then diff the index: a plain `git diff` sees only tracked
          # files, so a future brand-new artifact under metrics/ would be missed.
          git add -A metrics/
          git diff --cached --name-only -- metrics/ > changed.txt
          plan=$(uv run fedcourts metrics-refresh-plan --changed-file changed.txt \
            --run-id "$GITHUB_RUN_ID")
          if [ "$(jq -r '.pr' <<<"$plan")" = "null" ]; then
            echo "Metrics are up to date; nothing to refresh." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          branch=$(jq -r '.pr.branch' <<<"$plan")
          git checkout -q -b "$branch"
          jq -r '.pr.body' <<<"$plan" > pr-body.md
          git commit -q -m "$(jq -r '.pr.commit_message' <<<"$plan")"
          # Push with the app (write) token; blank any ambient extraheader so it
          # authenticates. Force: the fixed branch supersedes any unmerged refresh.
          git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
            push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${branch}"
          # Reuse the open PR for this branch when one exists (the force-push above
          # already updated its contents); otherwise open a fresh one.
          existing=$(gh pr list --repo "$REPO" --head "$branch" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$REPO" \
              --title "$(jq -r '.pr.title' <<<"$plan")" --body-file pr-body.md
            echo "Updated review PR #${existing} in place." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            url=$(gh pr create --base main --head "$branch" \
              --title "$(jq -r '.pr.title' <<<"$plan")" --body-file pr-body.md)
            echo "Opened review PR: ${url}" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
