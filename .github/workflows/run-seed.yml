name: run-seed

# Triggered by `run:seed`. Deterministically pulls a docket from CourtListener
# (`fedcourts seed`); the workflow validates, commits to a branch, and opens one
# PR. No agent: per docs/data-pipeline.md seed is deterministic ingestion of raw
# facts only. Predictable-event definition is a separate, corpus-driven stage on
# the forward/pull path (the "Discover" job, #8) — not seed's job.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-seed-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  seed:
    if: github.event.label.name == 'run:seed'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: write
      pull-requests: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the least-privilege AWS role via GitHub OIDC so seed can `dvc push`
      # the packed historical corpus to the S3 remote. No static keys; the role
      # ARN and region come from the `runner` environment (see issue #17).
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Parse and validate request
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import json, os, re, sys
          m = re.search(r"```json\s*(\{.*?\})\s*```", os.environ.get("ISSUE_BODY", ""), re.S)
          if not m:
              sys.exit("No ```json {court,docket} block found in the issue body.")
          req = json.loads(m.group(1))
          court, docket = str(req["court"]), str(req["docket"])
          if not re.fullmatch(r"[a-z0-9]+", court):
              sys.exit(f"Invalid court id: {court!r}")
          if not re.fullmatch(r"[0-9]+", docket):
              sys.exit(f"Invalid docket id: {docket!r}")
          with open(os.environ["GITHUB_ENV"], "a") as fh:
              fh.write(f"COURT_ID={court}\nDOCKET_ID={docket}\n")
          PY

      - name: Seed docket
        env:
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: uv run fedcourts seed --court "$COURT_ID" --docket "$DOCKET_ID"

      - name: Validate and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv run fedcourts validate data
          git config user.name "fedcourts-bot"
          git config user.email "bot@users.noreply.github.com"
          gh auth setup-git
          branch="seed/${COURT_ID}-${DOCKET_ID}"
          git checkout -b "$branch"
          git add data/
          if git diff --cached --quiet; then
            echo "::warning::seed of ${COURT_ID}/${DOCKET_ID} produced no changes; skipping PR."
            exit 0
          fi
          git commit -m "seed: ${COURT_ID}/${DOCKET_ID}"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "seed: ${COURT_ID}/${DOCKET_ID}" \
            --body "Seeded docket \`${COURT_ID}/${DOCKET_ID}\` from CourtListener (raw facts only; predictable events are defined later on the forward/pull path)."
