name: run-seed

# Deterministic, NO-AGENT historical backfill. Stages the CourtListener PUBLIC
# bulk-data snapshot once (not the rate-limited REST API, so it spends no API
# budget), then LOOPS `fedcourts seed-backfill` over that staging — reusing it via
# a runner-local --staging-path so the heavy download/parse is paid once per job —
# loading a checkpoint chunk (seed.max_cases_per_run) at a time. After each chunk
# it pushes the corpus blob to the DVC S3 remote and commits the corpus pointer +
# cursor bump DIRECTLY to the default branch, so a crash/timeout loses at most one
# chunk and the next run resumes from the cursor. The loop runs until the backlog
# is done or its wall-clock budget runs out, then comments per-court progress on
# the long-lived run:seed tracking issue; on the run that exhausts every court it
# opens a one-time completion PR that flips the cursor's `completed` sign-off flag
# (merging it closes the tracker). Then it reconciles quarterly when a new bulk
# snapshot drops. Scheduled overnight so a multi-hour backfill finishes well before
# run-pull (07:17) — both share the `corpus-write` lock. See docs/seed-backfill.md
# and docs/data-pipeline.md.
on:
  schedule:
    - cron: "23 0 * * *" # overnight; a long backfill must finish before run-pull (07:17)
  workflow_dispatch:
  issues:
    types: [labeled]

permissions: {}

# Shared with run-pull: both workflows write the single corpus.db pointer, so they
# run under ONE lock to serialize corpus writers and prevent lost updates (#42).
# cancel-in-progress is false so a queued run waits rather than being dropped.
# Only a run that will actually write the corpus joins the shared group: every
# `issues: labeled` event spawns a run of BOTH this workflow and run-pull (the
# label filter is the job-level `if`, evaluated after concurrency), so a run that
# the `if` will skip is given a unique throwaway group — otherwise it could cancel
# an in-flight seed/pull as the group's pending slot before ever being skipped.
concurrency:
  group: ${{ (github.event_name != 'issues' || github.event.label.name == 'run:seed') && 'corpus-write' || format('corpus-write-skip-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  seed:
    if: github.event_name != 'issues' || github.event.label.name == 'run:seed'
    runs-on: ubuntu-latest
    timeout-minutes: 330 # overnight backfill: ~stage once + loop ingest; ends before run-pull
    environment: runner
    permissions:
      contents: write # commit the corpus pointer + cursor straight to the default branch
      issues: write # comment progress on the tracking issue
      pull-requests: write # open the backfill-completion PR (closes the tracker on merge)
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write # open the one-time backfill-completion PR

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      # Assume the read-write (append-only) IAM role via GitHub OIDC so seed can
      # pull and push the packed corpus on the S3-backed DVC remote. The role
      # grants get/put/list but no delete, so a run can add corpus objects but
      # never wipe them. No static keys; the role ARN and region come from the
      # `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          # The loop now runs for hours (LOOP_BUDGET_SECONDS, 4.5h) and dvc push
          # uses these credentials throughout. The default 1h session would expire
          # mid-loop, so request a session long enough to outlast the budget. This
          # must stay <= the role's MaxSessionDuration or the step hard-fails.
          role-duration-seconds: 18000 # 5h

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # First run has no committed pointer yet, so dvc pull would fail — guard it.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Backfill in checkpointed chunks until done or out of time
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # The loop pushes for hours, but a single installation token lives at
          # most 1h (GitHub's hard cap). So the loop re-mints its own short-lived
          # tokens from the App's private key as it goes; these two feed that.
          APP_CLIENT_ID: ${{ vars.APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          # Public CourtListener bulk snapshot — no API token. Point this at the
          # bulk-data base directory; the backfill lists the bucket and loads the
          # latest snapshot on its own (its publication date becomes the snapshot
          # id). A pinned `.csv.bz2` file URL is also honored as-is.
          FEDCOURTS_COURTLISTENER_BULK_URL: ${{ vars.COURTLISTENER_BULK_URL }}
          # Wall-clock budget for the whole loop. Kept under timeout-minutes (with
          # room for the staging build + the final comment/PR steps) and small
          # enough that the run finishes before run-pull's 07:17 slot.
          LOOP_BUDGET_SECONDS: "16200" # 4.5h
        run: |
          set -euo pipefail

          # --- Self-refreshing App token ----------------------------------------
          # Every installation token expires after at most 1h (GitHub's hard,
          # non-renewable cap), but this loop pushes a checkpoint commit for hours.
          # So mint fresh, repo-scoped `contents: write` tokens from the App's
          # private key and refresh before they age out. openssl/curl/jq are
          # preinstalled on the runner, so this needs no extra dependency.
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          mint_app_token() {
            local now header payload unsigned sig jwt install_id body
            now=$(date -u +%s)
            header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
            # iss = the App's client id; iat backdated 60s for clock skew; exp 9m.
            payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' \
              "$((now - 60))" "$((now + 540))" "$APP_CLIENT_ID" | b64url)
            unsigned="${header}.${payload}"
            sig=$(printf '%s' "$unsigned" \
              | openssl dgst -sha256 -sign <(printf '%s' "$APP_PRIVATE_KEY") -binary \
              | b64url)
            jwt="${unsigned}.${sig}"
            install_id=$(curl -fsS \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/installation" \
              | jq -r .id)
            # Least privilege: scoped to THIS repo, only the push permission the
            # loop uses (the post-loop issue/PR steps mint their own token).
            body=$(printf '{"repositories":["%s"],"permissions":{"contents":"write"}}' \
              "${GITHUB_REPOSITORY##*/}")
            curl -fsS -X POST \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${install_id}/access_tokens" \
              -d "$body" \
              | jq -r .token
          }

          # persist-credentials is false on checkout, so authenticate the push via
          # the App token's git credential helper. `gh auth git-credential` reads
          # $GH_TOKEN at call time, so refreshing the variable mid-loop is enough —
          # the helper does not need to be re-installed.
          GH_TOKEN=$(mint_app_token); export GH_TOKEN
          gh auth setup-git
          token_minted=$(date -u +%s)
          TOKEN_MAX_AGE_SECONDS=3000 # re-mint at 50min, well under the 1h cap

          refresh_token_if_stale() {
            if [ "$(( $(date -u +%s) - token_minted ))" -lt "$TOKEN_MAX_AGE_SECONDS" ]; then
              return 0
            fi
            GH_TOKEN=$(mint_app_token); export GH_TOKEN
            token_minted=$(date -u +%s)
            echo "Re-minted the App token (the previous one neared its 1h expiry)."
          }
          # ----------------------------------------------------------------------

          # The staged snapshot lives on the runner's local disk so every loop
          # iteration after the first reuses it (the build is skipped when the
          # snapshot id matches) — the GB-scale download/parse is paid once per job.
          staging="${RUNNER_TEMP}/seed-staging.db"
          deadline=$(( $(date -u +%s) + LOOP_BUDGET_SECONDS ))
          total_loaded=0

          checkpoint() {
            # Push the blob BEFORE committing the pointer so the committed pointer
            # always resolves against the remote. Only the small pointer + cursor
            # enter git; commit straight to the default branch (like run-pull) so
            # every corpus writer builds on the latest committed pointer — see the
            # shared `corpus-write` lock above and #42.
            uvx --from 'dvc[s3]' dvc add corpus/corpus.db
            uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc
            # Reclaim the runner's local DVC cache. cache.type is `copy` (the
            # runner's ext4 has no reflink), so every chunk's `dvc add` leaves a
            # full copy of the ever-growing corpus.db in .dvc/cache; across the
            # dozens of checkpoints in one job those superseded copies pile up and
            # exhaust the runner disk (ENOSPC). The blob is already safely on the
            # remote from the push above, so prune everything the *workspace* no
            # longer references. This is LOCAL only — it never passes `--cloud`, so
            # the append-only S3 remote is untouched (see docs/security.md).
            uvx --from 'dvc[s3]' dvc gc --workspace --force
            # Keep the git credential alive: a single token expires at 1h but the
            # loop pushes for hours. Refresh right before every git network op.
            refresh_token_if_stale
            git add corpus/corpus.db.dvc config/seed-progress.yaml
            if git diff --cached --quiet; then
              echo "No corpus/cursor change this chunk; nothing to commit."
              return 0
            fi
            local snapshot loaded attempt
            snapshot=$(jq -r '.snapshot' seed-report.json)
            loaded=$(jq -r '.loaded_this_run' seed-report.json)
            git commit -m "seed(backfill): ${snapshot} +${loaded} case(s)"
            # The default branch may have advanced since checkout (e.g. a merged
            # predict/evaluate PR). The corpus-write lock keeps the other corpus
            # writer out, so the pointer never conflicts; rebase onto the latest tip
            # and retry so the push is always a fast-forward.
            for attempt in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}"
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                return 0
              fi
              echo "::warning::push rejected (default branch advanced); retry ${attempt}"
              sleep 3
            done
            echo "::error::could not push the corpus pointer after 3 attempts"
            return 1
          }

          while :; do
            # One checkpoint chunk (seed.max_cases_per_run). The cursor advances and
            # is committed each pass, so the loop resumes cleanly after any stop.
            uv run fedcourts seed-backfill --staging-path "$staging" --report seed-report.json
            checkpoint

            loaded=$(jq -r '.loaded_this_run' seed-report.json)
            total_loaded=$(( total_loaded + loaded ))

            if [ "$(jq -r '.complete' seed-report.json)" = "true" ]; then
              echo "Backfill complete."
              break
            fi
            if [ "$loaded" = "0" ]; then
              echo "::warning::chunk loaded 0 cases but backfill not complete; stopping."
              break
            fi
            if [ "$(date -u +%s)" -ge "$deadline" ]; then
              echo "Wall-clock budget reached after ${total_loaded} case(s); resumes next run."
              break
            fi
          done

          # The later steps (progress comment, completion PR) read seed-report.json;
          # its per-court table is cumulative from the cursor, but loaded_this_run is
          # only the last chunk — overwrite it with the whole run's total.
          jq --argjson t "$total_loaded" '.loaded_this_run = $t' seed-report.json > seed-report.tmp
          mv seed-report.tmp seed-report.json

          # Ops analytics (#89): a per-run summary in the Actions UI, no roll-up needed.
          {
            echo "## run-seed — \`$(jq -r '.snapshot' seed-report.json)\`"
            if [ "$(jq -r '.complete' seed-report.json)" = "true" ]; then
              echo "✅ **Backfill complete.**"
            fi
            echo "Loaded **${total_loaded}** case(s) this run."
            echo ""
            echo "| Court | Loaded | Total | % | Done |"
            echo "|-------|-------:|------:|--:|:----:|"
            jq -r '.courts[] | "| \(.court) | \(.loaded) | \(.total // "?") | \(if .percent == null then "?" else "\(.percent)%" end) | \(if .complete then "✅" else "" end) |"' seed-report.json
          } >> "$GITHUB_STEP_SUMMARY"

      # The loop can run for hours, so the up-front app-token is long expired by
      # the time the loop returns. Mint a fresh one for the issue/PR steps below.
      - name: Re-mint app token for the post-loop steps
        id: app-token-post
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Comment progress on the tracking issue
        env:
          GH_TOKEN: ${{ steps.app-token-post.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_FROM_EVENT: ${{ github.event.issue.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess

          repo = os.environ["REPO"]
          issue = os.environ.get("ISSUE_FROM_EVENT") or ""


          def gh(*args: str, check: bool = True) -> str:
              return subprocess.run(
                  ["gh", *args], capture_output=True, text=True, check=check
              ).stdout.strip()


          if not issue:
              # Scheduled / dispatch runs have no triggering issue: resolve the single
              # open run:seed tracker (convention: never more than one open at a time).
              issue = gh(
                  "issue", "list", "--repo", repo, "--label", "run:seed",
                  "--state", "open", "--json", "number", "--jq", ".[0].number",
              )
          if not issue:
              print("::warning::No open run:seed tracking issue; skipping progress comment.")
              raise SystemExit(0)

          report = json.loads(open("seed-report.json").read())
          done = {c["court"] for c in report["courts"] if c["complete"]}

          lines = []
          head = "✅ Seed backfill complete" if report["complete"] else "Seed backfill progress"
          lines.append(f"### {head} — snapshot `{report['snapshot']}`")
          lines.append("")
          lines.append(f"Loaded **{report['loaded_this_run']}** case(s) this run.")
          lines.append("")
          lines.append("| Court | Loaded | Total | % | Done |")
          lines.append("|-------|-------:|------:|--:|:----:|")
          for c in report["courts"]:
              total = c["total"] if c["total"] is not None else "?"
              pct = "?" if c["percent"] is None else f"{c['percent']}%"
              tick = "✅" if c["complete"] else ""
              lines.append(f"| {c['court']} | {c['loaded']} | {total} | {pct} | {tick} |")
          gh("issue", "comment", issue, "--repo", repo, "--body", "\n".join(lines))

          # Check off completed courts in the tracker's checklist, leaving any
          # operator notes untouched (only flips `- [ ] court` -> `- [x] court`).
          if done:
              body = gh("issue", "view", issue, "--repo", repo, "--json", "body", "--jq", ".body")
              def tick(line: str) -> str:
                  m = re.match(r"^(\s*- )\[ \](\s+)(\S+)\s*$", line)
                  return f"{m.group(1)}[x]{m.group(2)}{m.group(3)}" if m and m.group(3) in done else line
              new = "\n".join(tick(line) for line in body.splitlines())
              if new != body:
                  gh("issue", "edit", issue, "--repo", repo, "--body", new)
          PY

      - name: Open the backfill-completion PR when the backlog is done
        env:
          GH_TOKEN: ${{ steps.app-token-post.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The corpus streams to the default branch chunk-by-chunk; completion is
          # acknowledged out of band by a maintainer merging a PR that flips the
          # cursor's `completed` flag (which closes the tracker). The PR carries NO
          # corpus — parking the blob on a branch would reintroduce the lost-update
          # the shared corpus-write lock removed (#42). One-shot and deduped.
          complete=$(jq -r '.complete' seed-report.json)
          if [ "$complete" != "true" ]; then
            echo "Backfill not complete yet; no completion PR."
            exit 0
          fi
          snapshot=$(jq -r '.snapshot' seed-report.json)
          branch="seed/backfill-complete-${snapshot}"

          # Without an open tracker there is nothing to close — bail rather than
          # open an orphan PR.
          tracker=$(gh issue list --repo "$REPO" --label run:seed --state open \
            --json number --jq '.[0].number')
          if [ -z "$tracker" ]; then
            echo "::warning::Backfill complete but no open run:seed tracker; skipping completion PR."
            exit 0
          fi

          # Dedupe the one-shot acknowledgement: skip if a maintainer already merged
          # it (flag on the default branch) or a completion PR is already open.
          git fetch origin "${GITHUB_REF_NAME}"
          if git show "origin/${GITHUB_REF_NAME}:config/seed-progress.yaml" | grep -qx 'completed: true'; then
            echo "Backfill already acknowledged on the default branch; nothing to do."
            exit 0
          fi
          if [ -n "$(gh pr list --repo "$REPO" --state open --head "$branch" --json number --jq '.[0].number')" ]; then
            echo "Completion PR already open for ${snapshot}."
            exit 0
          fi

          # persist-credentials is false on checkout; authenticate via the App token.
          gh auth setup-git
          git switch -c "$branch" "origin/${GITHUB_REF_NAME}"

          # Flip the sign-off flag THROUGH the model so the cursor stays schema-valid
          # (it is gate-validated and strict), and render the PR body in one pass.
          TRACKER="$tracker" uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          from fedcourtsai.pipeline.seed import load_cursor, save_cursor

          cursor_path = Path("config/seed-progress.yaml")
          cursor = load_cursor(cursor_path)
          cursor.completed = True
          save_cursor(cursor_path, cursor)

          rep = json.loads(Path("seed-report.json").read_text())
          rows = ["| Court | Loaded | Total | % |", "|-------|-------:|------:|--:|"]
          for c in rep["courts"]:
              total = c["total"] if c["total"] is not None else "?"
              pct = "?" if c["percent"] is None else f"{c['percent']}%"
              rows.append(f"| {c['court']} | {c['loaded']} | {total} | {pct} |")
          body = "\n".join(
              [
                  f"The historical backfill for snapshot `{rep['snapshot']}` is complete: "
                  "every tracked court's bulk stream is exhausted and its facts are already "
                  "committed to the default branch.",
                  "",
                  "This PR only flips the cursor's `completed` sign-off flag — it carries no "
                  "corpus (the blob streamed in chunk-by-chunk under the corpus-write lock). "
                  "Merging it records the acknowledgement and closes the tracker.",
                  "",
                  *rows,
                  "",
                  f"Closes #{os.environ['TRACKER']}",
              ]
          )
          Path("pr-body.md").write_text(body + "\n")
          PY

          if git diff --quiet config/seed-progress.yaml; then
            echo "Cursor already acknowledges completion; nothing to commit."
            exit 0
          fi
          git add config/seed-progress.yaml
          git commit -m "seed(backfill): acknowledge ${snapshot} backfill complete"
          # Dedicated bot ack branch: --force only ever matters if a prior completion
          # PR for this same snapshot was closed unmerged, leaving the branch behind.
          git push --force origin "HEAD:refs/heads/${branch}"
          gh pr create --repo "$REPO" --base "${GITHUB_REF_NAME}" --head "$branch" \
            --title "seed: backfill complete — ${snapshot}" --body-file pr-body.md
