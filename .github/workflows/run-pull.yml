name: run-pull

# Refresh tracked dockets. Runs on a staggered intraday schedule (four windows a
# day), on manual dispatch, or when an issue is labeled `run:pull`. Spreading the
# refresh over several windows lifts daily throughput toward the CourtListener
# tier's daily ceiling while each window stays under the hourly one.
# Deterministic (no agent): discovers newly-filed
# cases, re-fetches each tracked docket, and detects resolution of open events —
# writing `outcome.json` when the disposition is machine-readable — ingesting the
# raw facts (including each refresh's point-in-time snapshot) into the DVC-managed
# corpus (pulled from / pushed back to the S3 remote). The new outcomes and the
# small corpus pointer are committed DIRECTLY to main (they are CourtListener
# facts, not agent output — see docs/data-pipeline.md). It then opens
# a `run:predict` issue for each changed case with open events, a `run:evaluate`
# issue for each case that gained an outcome, and a `run:reconcile` issue for
# each case that appears decided but whose outcome an agent must confirm by hand
# (resolved by run-reconcile.yml — a distinct label so it never re-fires pull).
# The day's windows share one short-lived `pull-log` tracking issue: the first
# window opens it, each posts its summary, and the final daily window closes it on
# success (left open as a record if a window fails). All git/issue writes use the GitHub App token so the
# resulting issues/commits trigger downstream workflows; the `pull-log` label is
# deliberately NOT a `run:*` trigger label, so the tracking issue does not re-fire pull.
on:
  schedule:
    # Four windows/day, six hours apart (staggered off the hour from other jobs).
    # Spreading the work keeps each run under the hourly CourtListener ceiling
    # while the day's total approaches the daily one. Separate lines (not a
    # comma-list) so `github.event.schedule` identifies the final daily window,
    # which is the one that closes the shared pull-log issue.
    - cron: "17 1 * * *"
    - cron: "17 7 * * *"
    - cron: "17 13 * * *"
    - cron: "17 19 * * *"
  workflow_dispatch:
  issues:
    types: [labeled]

permissions: {}

# Shared with run-seed: both workflows write the single corpus.db pointer, so they
# run under ONE lock to serialize corpus writers and prevent lost updates (#42).
# cancel-in-progress is false so a queued run waits rather than being dropped.
# Only a run that will actually write the corpus joins the shared group: every
# `issues: labeled` event spawns a run of BOTH this workflow and run-seed (the
# label filter is the job-level `if`, evaluated after concurrency), so a run that
# the `if` will skip is given a unique throwaway group — otherwise it could cancel
# an in-flight seed/pull as the group's pending slot before ever being skipped.
concurrency:
  group: ${{ (github.event_name != 'issues' || github.event.label.name == 'run:pull') && 'corpus-write' || format('corpus-write-skip-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  pull:
    if: github.event_name != 'issues' || github.event.label.name == 'run:pull'
    runs-on: ubuntu-latest
    # A single window's refresh (≤ max_cases_per_run dockets ≈ a few dozen
    # CourtListener fetches + DVC S3 transfer) finishes well inside this; the cap
    # releases the shared corpus-write lock far sooner than GitHub's 6h default if
    # a network step hangs. Below run-seed's quarterly budget, since pull does much
    # less work.
    timeout-minutes: 45
    environment: runner
    permissions:
      contents: write
      issues: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this
      # privileged run by filing the pull form. Require the triggering actor to
      # hold write access; deny everyone else. Fail closed if it can't be read.
      # (The label name is already checked in the job `if:`.)
      - name: Authorize the trigger (issue label must come from a maintainer)
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          perm=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" \
            --jq '.permission' 2>/dev/null || echo none)
          case "$perm" in
            admin | maintain | write) echo "Authorized ${ACTOR} (${perm} access)." ;;
            *)
              echo "::error::${ACTOR} lacks write access (permission: ${perm}); refusing to run." >&2
              exit 1
              ;;
          esac

      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DATA_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write

      - name: Open the daily run issue
        id: run-issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `pull-log` is a NON-triggering label by design: it is not a `run:*`
          # label, so labeling the tracking issue cannot re-fire this workflow
          # (issues: labeled) in a loop — unlike run:pull, which is the trigger.
          # Create it idempotently so a fresh repo's first run does not fail on a
          # missing label.
          gh label create pull-log --repo "$REPO" --force \
            --color 1d76db --description "Daily run-pull refresh log (open while a run is in flight)"
          today=$(date -u +%Y-%m-%d)
          # Reuse the open pull-log issue if one exists — the day's earlier windows
          # share it, and a streak of failures (left open as a record) collapses
          # into one thread — instead of opening a fresh one each window. The final
          # daily window closes it (below), so steady state is one issue per day.
          num=$(gh issue list --repo "$REPO" --label pull-log --state open \
            --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            url=$(gh issue create --repo "$REPO" \
              --title "pull: daily refresh — ${today}" \
              --label pull-log \
              --body "Daily \`run-pull\` refresh in progress. Each window posts a summary here; the day's final window closes this issue on success, and it is left open as a record if a window fails.")
            num="${url##*/}"
            echo "Opened pull-log issue: ${url}"
          else
            gh issue comment "$num" --repo "$REPO" \
              --body "New \`run-pull\` refresh window started ${today} — reusing this open log."
            echo "Reusing open pull-log issue #${num}"
          fi
          echo "number=${num}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Persist the App token so refreshed snapshots can be pushed back to main;
        # this job uploads no artifacts, so credential leakage is not a concern.
        with: # zizmor: ignore[artipacked]
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the read-write (append-only) IAM role via GitHub OIDC so pull can
      # `dvc push` fresh forward facts into the corpus on the S3 remote. The role
      # grants get/put/list but no delete, so a run can add corpus objects but
      # never wipe them. No static keys; the role ARN and region come from the
      # `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # First run has no committed pointer yet, so dvc pull would fail — guard
          # it. Discovery and the rotation governor read prior corpus state (the
          # discovery watermark and per-case last_pulled), so it must be restored.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Refresh tracked dockets
        env:
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          # CourtListener per-token rate limits the client throttles to
          # (config.py courtlistener_rpm/rph/rpd). The repo/environment variables
          # are the knob — set them to the active Free Law Project tier to retune
          # without a code change. The `|| '...'` fallbacks default to the pilot's
          # held tier (Tier 2 = 15/150/600), so an unset variable lands on the
          # correct ceiling rather than silently throttling to the free tier (an
          # unset Actions variable renders as an empty string, which would also
          # fail int parsing — the fallback avoids that crash). Drop these to the
          # free-tier 5/50/125 if the membership ever lapses.
          FEDCOURTS_COURTLISTENER_RPM: ${{ vars.COURTLISTENER_RPM || '15' }}
          FEDCOURTS_COURTLISTENER_RPH: ${{ vars.COURTLISTENER_RPH || '150' }}
          FEDCOURTS_COURTLISTENER_RPD: ${{ vars.COURTLISTENER_RPD || '600' }}
        run: |
          uv run fedcourts pull-all \
            --out predict-queue.json \
            --evaluate-out evaluate-queue.json \
            --reconcile-out reconcile-queue.json \
            --limit 50

      - name: Push the corpus blob to the DVC remote
        run: |
          # pull-all wrote fresh facts, discovered filings, and bumped tracking
          # state in corpus/corpus.db. Push the blob before committing the pointer
          # so the committed pointer always resolves against the remote.
          uvx --from 'dvc[s3]' dvc add corpus/corpus.db
          uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Commit outcomes and corpus pointer to main
        id: commit
        run: |
          set -euo pipefail
          # Facts go straight to main: any deterministically-detected outcome.json
          # under data/ and the small corpus pointer (the corpus blob — rows and
          # point-in-time snapshots — lives in the DVC remote, pushed above).
          # data/ may not exist yet (no outcome has ever been written), so stage it
          # only when present; the corpus pointer always exists and an empty staged
          # set is handled by the no-op guard below.
          git add corpus/corpus.db.dvc
          if [ -d data ]; then
            git add data/
          fi
          if git diff --cached --quiet; then
            echo "No outcome or corpus changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "pull: refresh corpus + outcomes ($(date -u +%Y-%m-%d))"
          # The default branch may have advanced since checkout (e.g. a run:predict
          # / run:evaluate PR merged). The corpus-write lock keeps the other corpus
          # writer out, so the pointer never conflicts; rebase our commit onto the
          # latest tip and retry so the push is always a fast-forward.
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::push rejected (default branch advanced); retry ${attempt}"
            sleep 3
          done
          echo "::error::could not push refreshed corpus pointer + outcomes after 3 attempts"
          exit 1

      # Trailing, NON-BLOCKING data-validation: the corpus is already pulled here, so
      # produce the correctness verdict (corpus integrity + ledger referential checks)
      # and publish it to the ops-metrics branch for run-ops to present and escalate.
      # continue-on-error keeps a failing verdict (or a publish hiccup) from failing
      # the refresh — the verdict is loud-not-fatal by contract.
      - name: Produce + publish the corpus validation verdict
        continue-on-error: true
        uses: ./.github/actions/publish-corpus-verdict
        with:
          token: ${{ steps.app-token.outputs.token }}

      # One run:predict issue for the whole window's queue, not one per case:
      # predict-matrix parses a JSON array of cases, so the handoff is a single
      # issue + workflow run that fans out one job per case x predictor (throttled
      # by the matrix max-parallel) instead of N issues each spawning their own run.
      - name: Open the run:predict handoff for changed cases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' predict-queue.json)
          echo "Queued $count case(s) for prediction."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' predict-queue.json)
            gh issue create --repo "$REPO" \
              --title "predict: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:predict"
          fi

      # Likewise one run:evaluate issue for the window's newly-resolved cases.
      - name: Open the run:evaluate handoff for newly resolved events
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' evaluate-queue.json)
          echo "Queued $count case(s) for evaluation."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' evaluate-queue.json)
            gh issue create --repo "$REPO" \
              --title "evaluate: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:evaluate"
          fi

      - name: Open run:reconcile issues for ambiguous outcomes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' reconcile-queue.json)
          echo "Queued $count case(s) for outcome reconcile."
          # `run:reconcile` routes to run-reconcile.yml (an agent that records the
          # outcome), NOT back to this deterministic pull — so filing one never
          # re-runs a full refresh. Create it idempotently for a fresh repo's first run.
          gh label create "run:reconcile" --repo "$REPO" --force \
            --color d93f0b --description "Confirm a decided event's outcome.json from the docket (run-reconcile)"
          # Dedupe against open reconcile issues so a still-unresolved case does not
          # spawn a fresh issue every run.
          open_titles=$(gh issue list --repo "$REPO" --state open --label "run:reconcile" \
            --limit 200 --json title --jq '.[].title')
          for i in $(seq 0 $((count - 1))); do
            court=$(jq -r ".[$i].court" reconcile-queue.json)
            docket=$(jq -r ".[$i].docket" reconcile-queue.json)
            events=$(jq -c ".[$i].events" reconcile-queue.json)
            reason=$(jq -r ".[$i].reason" reconcile-queue.json)
            title="reconcile: ${court}/${docket}"
            if grep -Fxq "$title" <<<"$open_titles"; then
              echo "Skipping existing reconcile issue: $title"
              continue
            fi
            block=$(jq -n --arg c "$court" --argjson d "$docket" --argjson e "$events" \
              '{court: $c, docket: $d, events: $e}')
            body=$(printf 'A refresh detected this case as decided, but its outcome could not be recorded deterministically:\n\n> %s\n\nConfirm the disposition from the docket and record `outcome.json` for each event below.\n\n```json\n%s\n```\n' \
              "$reason" "$block")
            gh issue create --repo "$REPO" \
              --title "$title" \
              --body "$body" \
              --label "run:reconcile"
          done

      - name: Summarize the run; close the log after the final daily window
        if: success() && steps.run-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ steps.run-issue.outputs.number }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          # The shared daily log is closed only after the last scheduled window
          # (so the day's windows collapse into one thread), or by a one-off
          # manual / `run:pull` run (no schedule, so it owns its own log).
          IS_FINAL_WINDOW: ${{ github.event_name != 'schedule' || github.event.schedule == '17 19 * * *' }}
        run: |
          set -euo pipefail
          predict=$(jq 'length' predict-queue.json)
          evaluate=$(jq 'length' evaluate-queue.json)
          reconcile=$(jq 'length' reconcile-queue.json)
          if [ "${COMMITTED:-false}" = "true" ]; then
            snap="Committed the refreshed corpus pointer + new outcomes to the default branch."
          else
            snap="No outcome or corpus changes this window."
          fi
          body=$(printf '### ✅ Pull refresh window complete\n\n%s\n\nHandoffs this window (predict/evaluate batch into one issue each):\n- run:predict cases queued: **%s**\n- run:evaluate cases queued: **%s**\n- ambiguous outcomes flagged for reconcile: **%s**\n' \
            "$snap" "$predict" "$evaluate" "$reconcile")
          gh issue comment "$ISSUE" --repo "$REPO" --body "$body"
          if [ "${IS_FINAL_WINDOW}" = "true" ]; then
            gh issue close "$ISSUE" --repo "$REPO" --reason completed
          fi
          # Ops analytics (#89): the same summary in the Actions UI, no roll-up needed.
          {
            echo "## run-pull — $(date -u +%Y-%m-%d)"
            echo "$snap"
            echo ""
            echo "| Handoff | Count |"
            echo "|---------|------:|"
            echo "| run:predict cases queued | ${predict} |"
            echo "| run:evaluate cases queued | ${evaluate} |"
            echo "| reconcile flagged | ${reconcile} |"
          } >> "$GITHUB_STEP_SUMMARY"
