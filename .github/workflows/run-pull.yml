name: run-pull

# Refresh tracked dockets — three writer jobs on one surface, at most one per run:
#
# - `pull` (the `17 *` crons, dispatch mode=pull, or a `run:pull` label):
#   targeted CourtListener *enrichment* for the tracked set —
#   not the primary freshness mechanism. CourtListener discovery is off (`pull.
#   discover_new_filings: false`): the live channel owns SCOTUS onboarding, and
#   circuit discovery onboarded cases outside the prediction scope.
# - `live` (the `47 *` crons or dispatch mode=live): the SCOTUS live channel
#   (docs/live-sources.md) — `fedcourts live-poll` probes supremecourt.gov
#   docket JSON for newly docketed petitions (persisted per-Term cursor) and
#   re-polls the pending watchlist. No CourtListener token, no API budget; the
#   same corpus-writer plumbing (DVC push, pointer commit, queue handoffs).
# - `historical` (the `31 2` cron or dispatch mode=historical): the historical
#   Term walker (docs/live-sources.md) — LOOPS `fedcourts historical-terms`,
#   which walks the configured October Terms' docket serials newest-first over
#   the supremecourt.gov docket JSON (no token, no API budget) from persisted
#   per-(Term, stream) cursors and ingests the sampled decided set: every
#   decided petition except denials, which are systematically sampled
#   (`historical:` in config/tracking.yaml IS the committed sampling frame).
#   Primarily statpack coverage (per-Term base rates), secondarily the cert
#   back-test set. Ingested petitions land already resolved and feed
#   replay/evaluation only — this job files NO predict/evaluate handoffs, ever.
#
# Each scheduled run fires exactly one of the three (the cron minute is the mode
# switch), so the shared corpus-write lock serializes writers. Live/forward work
# keeps structural priority: the historical job's daily 02:31 slot and wall-clock
# budget sit entirely between the 01:17 pull and 04:47 live windows, so it frees
# the lock before forward work needs it — no in-run budget split required (the
# walker spends zero CourtListener budget). Note GitHub keeps only the latest
# *pending* run per concurrency group: a long dispatch-mode historical run can
# cause a queued scheduled window to be superseded by the next one — the next
# window's rotation picks up where it left off.
# Spreading the refresh over several windows lifts daily throughput toward the
# CourtListener tier's daily ceiling while each window stays under the hourly one.
# Deterministic (no agent): re-fetches tracked dockets
# and detects resolution of open events —
# writing `outcome.json` when the disposition is machine-readable — ingesting the
# raw facts (including each refresh's point-in-time snapshot) into the DVC-managed
# corpus (pulled from / pushed back to the S3 remote). The new outcomes and the
# small corpus pointer are committed DIRECTLY to main (they are CourtListener
# facts, not agent output — see docs/data-pipeline.md). It then opens
# a `run:predict` issue for each changed case with open events and a `run:evaluate`
# issue for each case that gained an outcome; a case that appears decided but
# whose outcome could not be recorded deterministically is surfaced on the
# daily log for maintainer triage (no issue is filed for it).
# The day's windows share one short-lived `pull-log` tracking issue: the first
# window opens it, each posts its summary, and the final daily window closes it on
# success (left open as a record if a window fails). All git/issue writes use the GitHub App token so the
# resulting issues/commits trigger downstream workflows; the `pull-log` label is
# deliberately NOT a `run:*` trigger label, so the tracking issue does not re-fire pull.
on:
  schedule:
    # Four pull windows/day, six hours apart (staggered off the hour from other
    # jobs). Spreading the work keeps each run under the hourly CourtListener
    # ceiling while the day's total approaches the daily one. Separate lines
    # (not a comma-list) so `github.event.schedule` identifies the final daily
    # window, which is the one that closes the shared pull-log issue. The
    # minute is also the job selector: `17 *` crons run `pull`, `47 *` run
    # `live`, and `31 2` runs `historical`.
    - cron: "17 1 * * *"
    - cron: "17 7 * * *"
    - cron: "17 13 * * *"
    - cron: "17 19 * * *"
    # One historical window/day, in the dead zone between the 01:17 pull and
    # 04:47 live windows; its wall-clock budget ends before the live window so
    # the shared lock is free when forward work arrives.
    - cron: "31 2 * * *"
    # Four live windows/day, interleaved between the pull windows so the
    # corpus writers rarely even queue on the shared lock. Budget-free
    # (supremecourt.gov), so cadence is a freshness/politeness choice — the
    # conference watchlist will retune it around the cert calendar.
    - cron: "47 4 * * *"
    - cron: "47 10 * * *"
    - cron: "47 16 * * *"
    - cron: "47 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which refresh to run"
        type: choice
        options: [pull, live, historical]
        default: pull
  issues:
    types: [labeled]

permissions: {}

# All three jobs write the single corpus.db pointer, so they run under ONE lock
# to serialize corpus writers and prevent lost updates.
# cancel-in-progress is false so a queued run waits rather than being dropped.
# Only a run that will actually write the corpus joins the shared group: every
# `issues: labeled` event spawns a run of this workflow (the label filter is the
# job-level `if`, evaluated after concurrency), so a run that the `if` will skip
# is given a unique throwaway group — otherwise it could cancel an in-flight
# writer as the group's pending slot before ever being skipped.
concurrency:
  group: ${{ (github.event_name != 'issues' || github.event.label.name == 'run:pull') && 'corpus-write' || format('corpus-write-skip-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  pull:
    # One writer job per run: the cron minute (17 = pull, 31 = historical,
    # 47 = live) or the dispatch `mode` input selects the job; a `run:pull`
    # label always means pull.
    if: >-
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '17 ')) ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'pull') ||
      (github.event_name == 'issues' && github.event.label.name == 'run:pull')
    runs-on: ubuntu-latest
    # A single window's refresh (≤ max_cases_per_run dockets ≈ a few dozen
    # CourtListener fetches + DVC S3 transfer) finishes well inside this; the cap
    # releases the shared corpus-write lock far sooner than GitHub's 6h default if
    # a network step hangs. Below the historical job's budget, since pull does
    # much less work.
    timeout-minutes: 45
    environment: runner
    permissions:
      contents: write
      issues: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this
      # privileged run by filing the pull form. Require the triggering actor to
      # hold write access; deny everyone else. Fail closed if it can't be read.
      # (The label name is already checked in the job `if:`.)
      - name: Authorize the trigger (issue label must come from a maintainer)
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          perm=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" \
            --jq '.permission' 2>/dev/null || echo none)
          case "$perm" in
            admin | maintain | write) echo "Authorized ${ACTOR} (${perm} access)." ;;
            *)
              echo "::error::${ACTOR} lacks write access (permission: ${perm}); refusing to run." >&2
              exit 1
              ;;
          esac

      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DATA_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write

      - name: Open the daily run issue
        id: run-issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `pull-log` is a NON-triggering label by design: it is not a `run:*`
          # label, so labeling the tracking issue cannot re-fire this workflow
          # (issues: labeled) in a loop — unlike run:pull, which is the trigger.
          # Create it idempotently so a fresh repo's first run does not fail on a
          # missing label.
          gh label create pull-log --repo "$REPO" --force \
            --color 1d76db --description "Daily run-pull refresh log (open while a run is in flight)"
          today=$(date -u +%Y-%m-%d)
          # Reuse the open pull-log issue if one exists — the day's earlier windows
          # share it, and a streak of failures (left open as a record) collapses
          # into one thread — instead of opening a fresh one each window. The final
          # daily window closes it (below), so steady state is one issue per day.
          num=$(gh issue list --repo "$REPO" --label pull-log --state open \
            --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            url=$(gh issue create --repo "$REPO" \
              --title "pull: daily refresh — ${today}" \
              --label pull-log \
              --body "Daily \`run-pull\` refresh in progress. Each window posts a summary here; the day's final window closes this issue on success, and it is left open as a record if a window fails.")
            num="${url##*/}"
            echo "Opened pull-log issue: ${url}"
          else
            gh issue comment "$num" --repo "$REPO" \
              --body "New \`run-pull\` refresh window started ${today} — reusing this open log."
            echo "Reusing open pull-log issue #${num}"
          fi
          echo "number=${num}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Persist the App token so refreshed snapshots can be pushed back to main;
        # this job uploads no artifacts, so credential leakage is not a concern.
        with: # zizmor: ignore[artipacked]
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Sync the working tree to the current tip of the default branch
        # actions/checkout pins this run's frozen github.sha — the branch tip when
        # the run was CREATED, not when it starts. A run that queues behind another
        # corpus writer on the shared corpus-write lock therefore checks out a
        # stale base, so the corpus blob it dvc-pulls and mutates is built on an
        # obsolete pointer and the final commit cannot rebase onto the advanced tip
        # (an unmergeable corpus/corpus.db.dvc conflict). Reset to the live tip
        # first, under the lock, so we always mutate the latest committed corpus —
        # the invariant docs/data-pipeline.md's corpus-writer coordination relies
        # on. The repo is public, so this read-only fetch needs no credentials.
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard FETCH_HEAD

      - uses: ./.github/actions/setup-python-env

      # Assume the read-write (append-only) IAM role via GitHub OIDC so pull can
      # `dvc push` fresh forward facts into the corpus on the S3 remote. The role
      # grants get/put/list but no delete, so a run can add corpus objects but
      # never wipe them. No static keys; the role ARN and region come from the
      # `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # First run has no committed pointer yet, so dvc pull would fail — guard
          # it. Discovery and the rotation governor read prior corpus state (the
          # discovery watermark and per-case last_pulled), so it must be restored.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Refresh tracked dockets
        env:
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          # CourtListener per-token rate limits the client throttles to
          # (config.py courtlistener_rpm/rph/rpd). The repo/environment variables
          # are the knob — set them to the active Free Law Project tier to retune
          # without a code change. The `|| '...'` fallbacks default to the pilot's
          # held tier (Tier 2 = 15/150/600), so an unset variable lands on the
          # correct ceiling rather than silently throttling to the free tier (an
          # unset Actions variable renders as an empty string, which would also
          # fail int parsing — the fallback avoids that crash). Drop these to the
          # free-tier 5/50/125 if the membership ever lapses.
          FEDCOURTS_COURTLISTENER_RPM: ${{ vars.COURTLISTENER_RPM || '15' }}
          FEDCOURTS_COURTLISTENER_RPH: ${{ vars.COURTLISTENER_RPH || '150' }}
          FEDCOURTS_COURTLISTENER_RPD: ${{ vars.COURTLISTENER_RPD || '600' }}
        run: |
          uv run fedcourts pull-all \
            --out predict-queue.json \
            --evaluate-out evaluate-queue.json \
            --unrecorded-out unrecorded-queue.json \
            --limit 50

      - name: Push the corpus blob to the DVC remote
        run: |
          # pull-all wrote fresh facts, discovered filings, and bumped tracking
          # state in corpus/corpus.db. Push the blob before committing the pointer
          # so the committed pointer always resolves against the remote.
          uvx --from 'dvc[s3]' dvc add corpus/corpus.db
          uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Commit outcomes and corpus pointer to main
        id: commit
        run: |
          set -euo pipefail
          # Facts go straight to main: any deterministically-detected outcome.json
          # under data/ and the small corpus pointer (the corpus blob — rows and
          # point-in-time snapshots — lives in the DVC remote, pushed above).
          # data/ may not exist yet (no outcome has ever been written), so stage it
          # only when present; the corpus pointer always exists and an empty staged
          # set is handled by the no-op guard below.
          git add corpus/corpus.db.dvc
          if [ -d data ]; then
            git add data/
          fi
          if git diff --cached --quiet; then
            echo "No outcome or corpus changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "pull: refresh corpus + outcomes ($(date -u +%Y-%m-%d))"
          # We synced to the live tip before mutating and hold the corpus-write
          # lock, so the corpus pointer is built on the latest committed base. The
          # default branch can still advance for an unrelated reason (e.g. a
          # run:predict / run:evaluate PR merged, touching data/), so rebase onto
          # the new tip and retry the push as a fast-forward. A rebase CONFLICT
          # means the pointer diverged despite the lock — fail loudly rather than
          # silently exhausting retries or masking it as a push rejection.
          for attempt in 1 2 3; do
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              # A genuine conflict (a diverged corpus pointer — a corpus writer was
              # not serialized) leaves a rebase in progress; a transient fetch blip
              # does not. Tell them apart so triage isn't misdirected — fail closed
              # either way.
              if [ -d "$(git rev-parse --git-path rebase-merge)" ] || [ -d "$(git rev-parse --git-path rebase-apply)" ]; then
                git rebase --abort || true
                echo "::error::rebase conflict on the corpus pointer against the advanced tip — a concurrent corpus writer was not serialized (see docs/data-pipeline.md corpus-writer coordination)"
              else
                echo "::error::could not fetch/rebase onto the advanced tip (transient upstream failure)"
              fi
              exit 1
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::push rejected (default branch advanced); retry ${attempt}"
            sleep 3
          done
          echo "::error::could not push refreshed corpus pointer + outcomes after 3 attempts"
          exit 1

      # Trailing, NON-BLOCKING data-validation: the corpus is already pulled here, so
      # produce the correctness verdict (corpus integrity + ledger referential checks)
      # and publish it to the ops-metrics branch for run-ops to present and escalate.
      # continue-on-error keeps a failing verdict (or a publish hiccup) from failing
      # the refresh — the verdict is loud-not-fatal by contract.
      - name: Produce + publish the corpus validation verdict
        continue-on-error: true
        uses: ./.github/actions/publish-corpus-verdict
        with:
          token: ${{ steps.app-token.outputs.token }}

      # One run:predict issue for the whole window's queue, not one per case:
      # predict-matrix parses a JSON array of cases, so the handoff is a single
      # issue + workflow run that fans out one job per case x predictor (throttled
      # by the matrix max-parallel) instead of N issues each spawning their own run.
      - name: Open the run:predict handoff for changed cases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' predict-queue.json)
          echo "Queued $count case(s) for prediction."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' predict-queue.json)
            gh issue create --repo "$REPO" \
              --title "predict: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:predict"
          fi

      # Likewise one run:evaluate issue for the window's newly-resolved cases.
      - name: Open the run:evaluate handoff for newly resolved events
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' evaluate-queue.json)
          echo "Queued $count case(s) for evaluation."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' evaluate-queue.json)
            gh issue create --repo "$REPO" \
              --title "evaluate: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:evaluate"
          fi

      - name: Summarize the run; close the log after the final daily window
        if: success() && steps.run-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ steps.run-issue.outputs.number }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          # The shared daily log is closed only after the last scheduled window
          # (so the day's windows collapse into one thread), or by a one-off
          # manual / `run:pull` run (no schedule, so it owns its own log).
          IS_FINAL_WINDOW: ${{ github.event_name != 'schedule' || github.event.schedule == '17 19 * * *' }}
        run: |
          set -euo pipefail
          predict=$(jq 'length' predict-queue.json)
          evaluate=$(jq 'length' evaluate-queue.json)
          unrecorded=$(jq 'length' unrecorded-queue.json)
          if [ "${COMMITTED:-false}" = "true" ]; then
            snap="Committed the refreshed corpus pointer + new outcomes to the default branch."
          else
            snap="No outcome or corpus changes this window."
          fi
          # Unrecorded outcomes are surfaced per case on the daily log (no issue
          # is filed — nothing consumes one): decided-looking dockets whose
          # outcome could not be recorded deterministically, for maintainer triage.
          unrecorded_lines=$(jq -r \
            '.[] | "- `\(.court)/\(.docket)` — \(.reason)"' unrecorded-queue.json)
          body=$(printf '### ✅ Pull refresh window complete\n\n%s\n\nHandoffs this window (predict/evaluate batch into one issue each):\n- run:predict cases queued: **%s**\n- run:evaluate cases queued: **%s**\n- outcomes left unrecorded (not deterministically recordable): **%s**\n' \
            "$snap" "$predict" "$evaluate" "$unrecorded")
          if [ "$unrecorded" -gt 0 ]; then
            body=$(printf '%s\n%s\n' "$body" "$unrecorded_lines")
          fi
          gh issue comment "$ISSUE" --repo "$REPO" --body "$body"
          if [ "${IS_FINAL_WINDOW}" = "true" ]; then
            gh issue close "$ISSUE" --repo "$REPO" --reason completed
          fi
          # Ops analytics: the same summary in the Actions UI, no roll-up needed.
          {
            echo "## run-pull — $(date -u +%Y-%m-%d)"
            echo "$snap"
            echo ""
            echo "| Handoff | Count |"
            echo "|---------|------:|"
            echo "| run:predict cases queued | ${predict} |"
            echo "| run:evaluate cases queued | ${evaluate} |"
            echo "| outcomes left unrecorded | ${unrecorded} |"
          } >> "$GITHUB_STEP_SUMMARY"

  live:
    # The SCOTUS live channel (docs/live-sources.md): `fedcourts live-poll`
    # probes supremecourt.gov docket JSON for newly docketed petitions and
    # re-polls the pending watchlist — no CourtListener token, no API budget.
    # Same corpus-writer shape and privileges as `pull` (App token + the
    # read-write DVC role), but schedule/dispatch only: there is no `run:live`
    # label, so nothing an outside actor can file fires this job and no
    # issue-form authorization gate is needed.
    if: >-
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '47 ')) ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'live')
    runs-on: ubuntu-latest
    # A cycle is ~60 polite requests at 1 req/s plus the DVC transfer — minutes;
    # the cap releases the shared corpus-write lock quickly if a network step hangs.
    timeout-minutes: 30
    environment: runner
    # Unlike `pull`, the ambient GITHUB_TOKEN is never used here (checkout, the
    # corpus push, and every gh call run on the App token, and there is no
    # authorize-trigger step to need a read) — so it carries no write at all.
    permissions:
      contents: read
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DATA_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write

      - name: Open the daily live-log issue
        id: run-issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `live-log` mirrors `pull-log`: a NON-triggering label, one shared
          # issue per day across the live windows, closed by the final window.
          gh label create live-log --repo "$REPO" --force \
            --color 1d76db --description "Daily run-pull live-channel log (open while a run is in flight)"
          today=$(date -u +%Y-%m-%d)
          num=$(gh issue list --repo "$REPO" --label live-log --state open \
            --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            url=$(gh issue create --repo "$REPO" \
              --title "live: daily poll — ${today}" \
              --label live-log \
              --body "Daily SCOTUS live-channel poll in progress. Each window posts a summary here; the day's final window closes this issue on success, and it is left open as a record if a window fails.")
            num="${url##*/}"
            echo "Opened live-log issue: ${url}"
          else
            gh issue comment "$num" --repo "$REPO" \
              --body "New live-poll window started ${today} — reusing this open log."
            echo "Reusing open live-log issue #${num}"
          fi
          echo "number=${num}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Persist the App token so outcomes + the corpus pointer can be pushed
        # back to main; this job uploads no artifacts, so credential leakage is
        # not a concern.
        with: # zizmor: ignore[artipacked]
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Sync the working tree to the current tip of the default branch
        # actions/checkout pins this run's frozen github.sha — the branch tip when
        # the run was CREATED, not when it starts. A run that queues behind another
        # corpus writer on the shared corpus-write lock therefore checks out a
        # stale base, so the corpus blob it dvc-pulls and mutates is built on an
        # obsolete pointer and the final commit cannot rebase onto the advanced tip
        # (an unmergeable corpus/corpus.db.dvc conflict). Reset to the live tip
        # first, under the lock, so we always mutate the latest committed corpus —
        # the invariant docs/data-pipeline.md's corpus-writer coordination relies
        # on. The repo is public, so this read-only fetch needs no credentials.
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard FETCH_HEAD

      - uses: ./.github/actions/setup-python-env

      # Same read-write (append-only) role as `pull`: the live poller adds
      # snapshots and rows to the corpus blob but can never wipe remote objects.
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # The live rotation and the per-Term discovery cursors read prior
          # corpus state, so it must be restored; guard the very first run.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Poll the live channel
        # No token, no budget env: politeness (browser UA, ~1 req/s) is built
        # into the client; caps come from tracking.yaml's `live:` section.
        run: |
          uv run fedcourts live-poll \
            --out predict-queue.json \
            --evaluate-out evaluate-queue.json \
            --unrecorded-out unrecorded-queue.json

      - name: Push the corpus blob to the DVC remote
        run: |
          # live-poll wrote fresh snapshots, rows, and cursors into
          # corpus/corpus.db. Push the blob before committing the pointer so the
          # committed pointer always resolves against the remote.
          uvx --from 'dvc[s3]' dvc add corpus/corpus.db
          uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Commit outcomes and corpus pointer to main
        id: commit
        run: |
          set -euo pipefail
          # Facts go straight to main, exactly as in `pull`: deterministically
          # detected outcome.json files under data/ plus the small corpus pointer.
          git add corpus/corpus.db.dvc
          if [ -d data ]; then
            git add data/
          fi
          if git diff --cached --quiet; then
            echo "No outcome or corpus changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "live: refresh corpus + outcomes ($(date -u +%Y-%m-%d))"
          # We synced to the live tip before mutating and hold the corpus-write
          # lock, so the pointer is built on the latest committed base; only an
          # unrelated advance (a merged data/ PR) should need a rebase, which is a
          # clean fast-forward. A rebase CONFLICT means the pointer diverged despite
          # the lock — fail loudly rather than masking it as a push rejection.
          for attempt in 1 2 3; do
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              # A genuine conflict (a diverged corpus pointer — a corpus writer was
              # not serialized) leaves a rebase in progress; a transient fetch blip
              # does not. Tell them apart so triage isn't misdirected — fail closed
              # either way.
              if [ -d "$(git rev-parse --git-path rebase-merge)" ] || [ -d "$(git rev-parse --git-path rebase-apply)" ]; then
                git rebase --abort || true
                echo "::error::rebase conflict on the corpus pointer against the advanced tip — a concurrent corpus writer was not serialized (see docs/data-pipeline.md corpus-writer coordination)"
              else
                echo "::error::could not fetch/rebase onto the advanced tip (transient upstream failure)"
              fi
              exit 1
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::push rejected (default branch advanced); retry ${attempt}"
            sleep 3
          done
          echo "::error::could not push refreshed corpus pointer + outcomes after 3 attempts"
          exit 1

      - name: Open the run:predict handoff for changed cases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' predict-queue.json)
          echo "Queued $count case(s) for prediction."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' predict-queue.json)
            gh issue create --repo "$REPO" \
              --title "predict: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:predict"
          fi

      - name: Open the run:evaluate handoff for newly resolved events
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' evaluate-queue.json)
          echo "Queued $count case(s) for evaluation."
          if [ "$count" -gt 0 ]; then
            body=$(jq '[.[] | {court, docket, events}]' evaluate-queue.json)
            gh issue create --repo "$REPO" \
              --title "evaluate: ${count} case(s)" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:evaluate"
          fi

      # Unrecorded outcomes are surfaced on the log/summary below, exactly as in
      # `pull`: live resolution is machine-readable by construction (the
      # disposition orders ride in the proceedings text), so a non-empty
      # unrecorded queue signals a case shape worth manual triage.

      - name: Summarize the run; close the log after the final daily window
        if: success() && steps.run-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ steps.run-issue.outputs.number }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          IS_FINAL_WINDOW: ${{ github.event_name != 'schedule' || github.event.schedule == '47 22 * * *' }}
        run: |
          set -euo pipefail
          predict=$(jq 'length' predict-queue.json)
          evaluate=$(jq 'length' evaluate-queue.json)
          unrecorded=$(jq 'length' unrecorded-queue.json)
          if [ "${COMMITTED:-false}" = "true" ]; then
            snap="Committed the refreshed corpus pointer + new outcomes to the default branch."
          else
            snap="No outcome or corpus changes this window."
          fi
          unrecorded_lines=$(jq -r \
            '.[] | "- `\(.court)/\(.docket)` — \(.reason)"' unrecorded-queue.json)
          body=$(printf '### ✅ Live poll window complete\n\n%s\n\nHandoffs this window:\n- run:predict cases queued: **%s**\n- run:evaluate cases queued: **%s**\n- outcomes left unrecorded (triage if persistent): **%s**\n' \
            "$snap" "$predict" "$evaluate" "$unrecorded")
          if [ "$unrecorded" -gt 0 ]; then
            body=$(printf '%s\n%s\n' "$body" "$unrecorded_lines")
          fi
          gh issue comment "$ISSUE" --repo "$REPO" --body "$body"
          if [ "${IS_FINAL_WINDOW}" = "true" ]; then
            gh issue close "$ISSUE" --repo "$REPO" --reason completed
          fi
          {
            echo "## run-pull (live) — $(date -u +%Y-%m-%d)"
            echo "$snap"
            echo ""
            echo "| Handoff | Count |"
            echo "|---------|------:|"
            echo "| run:predict cases queued | ${predict} |"
            echo "| run:evaluate cases queued | ${evaluate} |"
            echo "| outcomes left unrecorded | ${unrecorded} |"
          } >> "$GITHUB_STEP_SUMMARY"

  historical:
    # The historical Term walker (docs/live-sources.md): walks October Terms'
    # docket serials newest-first over the supremecourt.gov docket JSON and
    # ingests the sampled decided set — every decided petition except denials,
    # which are systematically sampled per config/tracking.yaml's committed
    # `historical:` frame. No CourtListener token, no API budget; the same
    # corpus-writer plumbing as the other jobs (checkpointed loop, DVC push,
    # pointer commit). Deliberately files NO predict/evaluate handoffs: every
    # ingested petition is decided history, landed already resolved.
    # Schedule/dispatch only: there is no trigger label for this job, so
    # nothing an outside actor can file fires it and no issue-form
    # authorization gate is needed.
    if: >-
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '31 ')) ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'historical')
    runs-on: ubuntu-latest
    # Headroom for the checkpointed walk (LOOP_BUDGET_SECONDS + the fixed setup
    # and post-loop steps). Deliberately ends before the 04:47 live window so a
    # hung network step cannot hold the shared corpus-write lock into forward
    # work's slot.
    timeout-minutes: 125
    environment: runner
    # The ambient GITHUB_TOKEN is never used here (checkout, the corpus push,
    # and every gh call run on App tokens) — so it carries no write at all.
    permissions:
      contents: read
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DATA_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Sync the working tree to the current tip of the default branch
        # actions/checkout pins this run's frozen github.sha — the branch tip when
        # the run was CREATED, not when it starts. A run that queues behind another
        # corpus writer on the shared corpus-write lock therefore checks out a
        # stale base, so the corpus blob it dvc-pulls and mutates is built on an
        # obsolete pointer and the final commit cannot rebase onto the advanced tip
        # (an unmergeable corpus/corpus.db.dvc conflict). Reset to the live tip
        # first, under the lock, so we always mutate the latest committed corpus —
        # the invariant docs/data-pipeline.md's corpus-writer coordination relies
        # on. The repo is public, so this read-only fetch needs no credentials.
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard FETCH_HEAD

      - uses: ./.github/actions/setup-python-env

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      # Same read-write (append-only) role as the other jobs: the walker adds
      # snapshots, rows, and documents to the corpus blob but can never wipe
      # remote objects. The loop pushes for up to ~2h, so the session must
      # outlast the wall-clock budget (must stay <= the role's
      # MaxSessionDuration).
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 9000 # 2.5h

      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # The per-(Term, stream) walk cursors and identity reconciliation
          # read prior corpus state, so it must be restored; guard the very
          # first run.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Walk the Terms in checkpointed chunks until done or out of time
        env:
          # The loop pushes for up to ~2h, but a single installation token lives
          # at most 1h (GitHub's hard cap). So the loop re-mints its own
          # short-lived tokens from the App's private key as it goes; these two
          # feed that.
          APP_CLIENT_ID: ${{ vars.DATA_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          # Wall-clock budget for the whole loop, kept under timeout-minutes
          # with room for setup and the post-loop steps — and sized so the run
          # ends before the 04:47 live window wants the corpus-write lock.
          LOOP_BUDGET_SECONDS: "6600" # 1h50m
        run: |
          set -euo pipefail

          # --- Self-refreshing App token ----------------------------------------
          # Mint fresh, repo-scoped `contents: write` tokens from the App's
          # private key and refresh before they age out (installation tokens
          # hard-expire at 1h).
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          mint_app_token() {
            local now header payload unsigned sig jwt install_id body
            now=$(date -u +%s)
            header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
            # iss = the App's client id; iat backdated 60s for clock skew; exp 9m.
            payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' \
              "$((now - 60))" "$((now + 540))" "$APP_CLIENT_ID" | b64url)
            unsigned="${header}.${payload}"
            sig=$(printf '%s' "$unsigned" \
              | openssl dgst -sha256 -sign <(printf '%s' "$APP_PRIVATE_KEY") -binary \
              | b64url)
            jwt="${unsigned}.${sig}"
            install_id=$(curl -fsS \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/installation" \
              | jq -r .id)
            # Least privilege: scoped to THIS repo, only the push permission the
            # loop uses (the post-loop comment step mints its own token).
            body=$(printf '{"repositories":["%s"],"permissions":{"contents":"write"}}' \
              "${GITHUB_REPOSITORY##*/}")
            curl -fsS -X POST \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${install_id}/access_tokens" \
              -d "$body" \
              | jq -r .token
          }

          # persist-credentials is false on checkout, so authenticate the push via
          # the App token's git credential helper. `gh auth git-credential` reads
          # $GH_TOKEN at call time, so refreshing the variable mid-loop is enough.
          GH_TOKEN=$(mint_app_token); export GH_TOKEN
          gh auth setup-git
          token_minted=$(date -u +%s)
          TOKEN_MAX_AGE_SECONDS=3000 # re-mint at 50min, well under the 1h cap

          refresh_token_if_stale() {
            if [ "$(( $(date -u +%s) - token_minted ))" -lt "$TOKEN_MAX_AGE_SECONDS" ]; then
              return 0
            fi
            GH_TOKEN=$(mint_app_token); export GH_TOKEN
            token_minted=$(date -u +%s)
            echo "Re-minted the App token (the previous one neared its 1h expiry)."
          }
          # ----------------------------------------------------------------------

          deadline=$(( $(date -u +%s) + LOOP_BUDGET_SECONDS ))

          checkpoint() {
            # Push the blob BEFORE committing the pointer so the committed pointer
            # always resolves against the remote; then prune the runner-local DVC
            # cache copies the workspace no longer references (cache.type is
            # `copy`, so they pile up across a long loop's checkpoints). Facts go
            # straight to the default branch under the shared corpus-write lock:
            # the pointer, plus any outcome.json the walker's resolution recorded
            # onto a previously-open event under data/.
            uvx --from 'dvc[s3]' dvc add corpus/corpus.db
            uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc
            uvx --from 'dvc[s3]' dvc gc --workspace --force
            refresh_token_if_stale
            git add corpus/corpus.db.dvc
            if [ -d data ]; then
              git add data/
            fi
            if git diff --cached --quiet; then
              echo "No corpus or outcome change this chunk; nothing to commit."
              return 0
            fi
            local ingested probed attempt
            ingested=$(jq -r '.ingested_granted + .ingested_denied + .ingested_other' historical-report.json)
            probed=$(jq -r '.probed' historical-report.json)
            git commit -m "historical: +${ingested} petition(s) (${probed} probed)"
            # We synced to the live tip at job start and each chunk rebases before
            # pushing, all under the shared corpus-write lock, so the pointer is
            # built on the latest committed base; only an unrelated advance (a
            # merged data/ PR) should need a rebase, which is a clean fast-forward.
            # A rebase CONFLICT means the pointer diverged despite the lock — fail
            # loudly rather than masking it as a push rejection.
            for attempt in 1 2 3; do
              if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
                # A genuine conflict (a diverged corpus pointer — a corpus writer
                # was not serialized) leaves a rebase in progress; a transient fetch
                # blip does not. Tell them apart so triage isn't misdirected — fail
                # closed either way.
                if [ -d "$(git rev-parse --git-path rebase-merge)" ] || [ -d "$(git rev-parse --git-path rebase-apply)" ]; then
                  git rebase --abort || true
                  echo "::error::rebase conflict on the corpus pointer against the advanced tip — a concurrent corpus writer was not serialized (see docs/data-pipeline.md corpus-writer coordination)"
                else
                  echo "::error::could not fetch/rebase onto the advanced tip (transient upstream failure)"
                fi
                return 1
              fi
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                return 0
              fi
              echo "::warning::push rejected (default branch advanced); retry ${attempt}"
              sleep 3
            done
            echo "::error::could not push the corpus pointer after 3 attempts"
            return 1
          }

          while :; do
            # One checkpoint chunk (historical.max_probes_per_run docket probes).
            # The per-(Term, stream) cursors advance inside the corpus and are
            # pushed each pass, so the loop resumes cleanly after any stop; the
            # totals file accumulates the whole run's counts for the comment.
            uv run fedcourts historical-terms \
              --report historical-report.json --totals historical-totals.json
            checkpoint

            stopped=$(jq -r '.stopped' historical-report.json)
            if [ "$(jq -r '.complete' historical-report.json)" = "true" ]; then
              echo "Term walk complete: every configured stream is at its frontier."
              break
            fi
            if [ "$stopped" = "stream-errors" ]; then
              echo "::warning::upstream errors stopped the remaining streams; resumes next run."
              break
            fi
            if [ "$(date -u +%s)" -ge "$deadline" ]; then
              echo "Wall-clock budget reached; the walk resumes next run from the cursors."
              break
            fi
          done

      # The loop can run for hours, so the up-front App token is long expired by
      # the time it returns. Mint a fresh one for the comment/verdict steps.
      - name: Re-mint app token for the post-loop steps
        id: app-token-post
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DATA_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write

      - name: Summarize the run; comment progress on the open pull-log issue
        env:
          GH_TOKEN: ${{ steps.app-token-post.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The body is rendered by the tested library renderer over the run's
          # cumulative totals; this step only posts it.
          uv run python - <<'PY'
          from pathlib import Path

          from fedcourtsai.pipeline.historical import HistoricalReport, render_markdown

          report = HistoricalReport.model_validate_json(Path("historical-totals.json").read_text())
          Path("historical-summary.md").write_text(render_markdown(report) + "\n")
          PY
          cat historical-summary.md >> "$GITHUB_STEP_SUMMARY"
          # Best-effort progress comment on the day's open pull-log issue, if one
          # exists (the 01:17 pull window opened it; dispatch runs outside the
          # schedule may find none and keep the step summary only).
          num=$(gh issue list --repo "$REPO" --label pull-log --state open \
            --json number --jq '.[0].number')
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$REPO" --body-file historical-summary.md
          else
            echo "No open pull-log issue; progress lives in the step summary."
          fi

      # Reconcile predict scope on the now-current corpus: latch the
      # out-of-scope cases so `open_events` drops them at the source, and clear
      # the latch on any back in scope. This job carries the daily schedule, so
      # the sweep's cadence lives here. NON-BLOCKING: a hiccup must not fail
      # the walker run.
      - name: Reconcile predict scope (latch out-of-scope cases)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token-post.outputs.token }}
        run: |
          set -euo pipefail
          if [ ! -f corpus/corpus.db.dvc ]; then
            echo "no corpus pointer yet; skipping scope reconcile"; exit 0
          fi
          gh auth setup-git  # persist-credentials is false on checkout
          uv run fedcourts reconcile-scope --apply
          uvx --from 'dvc[s3]' dvc add corpus/corpus.db
          uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc
          # Reclaim the runner's local DVC cache (cache.type is copy) like the
          # loop's checkpoint — the blob is already on the remote.
          uvx --from 'dvc[s3]' dvc gc --workspace --force
          git add corpus/corpus.db.dvc
          if git diff --cached --quiet; then
            echo "Scope latch already converged; nothing to persist."
            exit 0
          fi
          git commit -m "historical: latch out-of-scope cases"
          # This runs after the walk under the same corpus-write lock, on the tip
          # the walk left; only an unrelated advance (a merged data/ PR) should
          # need a rebase, which is a clean fast-forward. A rebase CONFLICT means
          # the pointer diverged despite the lock — fail loudly rather than masking
          # it as a push rejection.
          for attempt in 1 2 3; do
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              # A genuine conflict (a diverged corpus pointer — a corpus writer was
              # not serialized) leaves a rebase in progress; a transient fetch blip
              # does not. Tell them apart so triage isn't misdirected — fail closed
              # either way.
              if [ -d "$(git rev-parse --git-path rebase-merge)" ] || [ -d "$(git rev-parse --git-path rebase-apply)" ]; then
                git rebase --abort || true
                echo "::error::rebase conflict on the corpus pointer against the advanced tip — a concurrent corpus writer was not serialized (see docs/data-pipeline.md corpus-writer coordination)"
              else
                echo "::error::could not fetch/rebase onto the advanced tip (transient upstream failure)"
              fi
              exit 1
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "::warning::pointer push rejected (branch advanced); retry ${attempt}"
            sleep 3
          done
          echo "::error::could not push the scope-latch pointer after 3 attempts"
          exit 1

      # Trailing, NON-BLOCKING data-validation, exactly as on the other jobs:
      # produce the correctness verdict on the now-current corpus and publish it
      # for run-ops to present and escalate — loud-not-fatal by contract.
      - name: Produce + publish the corpus validation verdict
        continue-on-error: true
        uses: ./.github/actions/publish-corpus-verdict
        with:
          token: ${{ steps.app-token-post.outputs.token }}
