name: run-pull

# Refresh tracked dockets. Runs on a daily schedule, on manual dispatch, or when
# an issue is labeled `run:pull`. Deterministic (no agent): discovers newly-filed
# cases and re-fetches each tracked docket, ingesting the raw facts into the
# DVC-managed corpus (pulled from / pushed back to the S3 remote) and writing fresh
# dated snapshots. The dated snapshots and the small corpus pointer are committed
# DIRECTLY to main (they are CourtListener facts, not agent output — see
# docs/data-pipeline.md). For each case whose docket changed and still has open
# events, it opens a `run:predict` issue. All git/issue writes use the GitHub App
# token so the resulting issues/commits trigger downstream workflows.
on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-pull
  cancel-in-progress: false

jobs:
  pull:
    if: github.event_name != 'issues' || github.event.label.name == 'run:pull'
    runs-on: ubuntu-latest
    environment: runner
    permissions:
      contents: write
      issues: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-write corpus)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Persist the App token so refreshed snapshots can be pushed back to main;
        # this job uploads no artifacts, so credential leakage is not a concern.
        with: # zizmor: ignore[artipacked]
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the least-privilege AWS role via GitHub OIDC so pull can `dvc push`
      # fresh forward facts into the corpus on the S3 remote. No static keys; the
      # role ARN and region come from the `runner` environment (see issue #17).
      - name: Configure AWS credentials (DVC S3 remote, read-write)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      - name: Pull the current corpus from the DVC remote
        run: |
          # First run has no committed pointer yet, so dvc pull would fail — guard
          # it. Discovery and the rotation governor read prior corpus state (the
          # discovery watermark and per-case last_pulled), so it must be restored.
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "No corpus pointer yet; starting a fresh corpus."
          fi

      - name: Refresh tracked dockets
        env:
          FEDCOURTS_COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: uv run fedcourts pull-all --out predict-queue.json --limit 50

      - name: Push the corpus blob to the DVC remote
        run: |
          # pull-all wrote fresh facts, discovered filings, and bumped tracking
          # state in corpus/corpus.db. Push the blob before committing the pointer
          # so the committed pointer always resolves against the remote.
          uvx --from 'dvc[s3]' dvc add corpus/corpus.db
          uvx --from 'dvc[s3]' dvc push corpus/corpus.db.dvc

      - name: Commit snapshots and corpus pointer to main
        run: |
          git config user.name "fedcourts-bot"
          git config user.email "bot@users.noreply.github.com"
          # Raw facts go straight to main: dated docket snapshots under data/ and
          # the small corpus pointer (the blob itself lives in the DVC remote).
          git add data/ corpus/corpus.db.dvc
          if git diff --cached --quiet; then
            echo "No docket or corpus changes to commit."
          else
            git commit -m "pull: refresh docket snapshots + corpus ($(date -u +%Y-%m-%d))"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Open run:predict issues for changed cases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          count=$(jq 'length' predict-queue.json)
          echo "Queued $count case(s) for prediction."
          for i in $(seq 0 $((count - 1))); do
            court=$(jq -r ".[$i].court" predict-queue.json)
            docket=$(jq -r ".[$i].docket" predict-queue.json)
            events=$(jq -c ".[$i].events" predict-queue.json)
            body=$(jq -n --arg c "$court" --argjson d "$docket" --argjson e "$events" \
              '{court: $c, docket: $d, events: $e}')
            gh issue create --repo "$REPO" \
              --title "predict: ${court}/${docket}" \
              --body "$(printf '```json\n%s\n```\n' "$body")" \
              --label "run:predict"
          done
