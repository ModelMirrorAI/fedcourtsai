name: run-predict

# Triggered by `run:predict` (created by run-pull, or applied manually). Fans out
# over every enabled predictor x open event and runs the matching coding agent.
# The agent only writes files; each cell uploads its output as an artifact and the
# `collect` job aggregates the whole run into one auto-merged PR (plus a draft PR
# for any partial output). See docs/pipeline.md.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-predict-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event.label.name == 'run:predict'
    runs-on: ubuntu-latest
    environment: runner
    permissions:
      contents: read
      id-token: write # assume the AWS role to dvc pull the corpus for scope gating
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent
      # run by filing a form that declares `run:predict`. Require the trigger to
      # come from the pipeline App (run-pull files predict issues automatically) or
      # a maintainer with write access; deny everyone else. Fail closed otherwise.
      # claude-code-action re-checks the actor before it spends model tokens, but
      # this pre-flight step refuses *before* the downstream `predict` job (which
      # `needs: plan`) mints any token, assumes the S3 role, or reads the corpus —
      # matching the deterministic writers (run-pull / run-seed / run-reconcile).
      # (The label name is already checked in the job `if:`.)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env

      # Only a maintainer-installed App can apply a `run:*` label that triggers a
      # workflow (events from the default GITHUB_TOKEN do not), so a Bot sender is
      # the trusted run-pull handoff; any other actor must hold write access. The
      # decision (and its fail-closed default) lives in the tested `authorize-trigger`
      # command. It refuses *before* the downstream `predict` job (which `needs: plan`)
      # mints any token, assumes the S3 role, or reads the corpus. (The label name is
      # already checked in the job `if:`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          uv run fedcourts authorize-trigger \
            --sender-type "$SENDER_TYPE" --actor "$ACTOR" --repo "$REPO"

      # The scope gate (predict.scope=scotus_touched) reads each case's latched
      # predict_eligible flag from the DVC-backed corpus, so the corpus must be on
      # disk before predict-matrix runs. Assume the read-only S3 role via OIDC and
      # `dvc pull` it here — without this the gate sees an empty database, drops
      # every case, and the predict job is silently skipped.
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"
      - name: Pull the corpus for scope gating
        run: |
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; scope gating has no corpus to read"
          fi

      - name: Build predictor x case x event matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c "import os, pathlib; pathlib.Path('issue-body.md').write_text(os.environ.get('ISSUE_BODY', ''))"
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          matrix=$(uv run fedcourts predict-matrix --body-file issue-body.md --run-id "$run_id")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          if [ "$count" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi
          # Ops analytics (#89): record the planned fan-out in the Actions UI.
          echo "## run-predict — queued ${count} prediction job(s)" >> "$GITHUB_STEP_SUMMARY"

  predict:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      # The cell no longer commits or opens a PR — it only reads the repo and
      # uploads an artifact; the collect job does the git/PR with its own token.
      contents: read
      id-token: write # assume the AWS role for the DVC S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint agent comment token
        id: agent-token
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue/PR. No contents:write — the agent only writes files locally, which
        # ride to the collect job as an artifact; that job (its own token) does the
        # commit/PR, so a prompt injection in docket text cannot push code here.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the dedicated read-only IAM role via GitHub OIDC so retrieval steps
      # can `dvc pull` the historical corpus from the S3 remote. No static keys; a
      # compromised predict runner cannot write or delete corpus objects. The role
      # ARN and region come from the `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed read-only credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      # Point-in-time snapshots are raw facts in the DVC-backed corpus, not git:
      # pull the corpus and materialize this case's latest snapshot to the
      # gitignored record/ path the predictor reads (never committed). Best-effort
      # — a missing snapshot must not abort the run; the agent notes it per prompt.
      - name: Provision the case snapshot from the corpus
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
        run: |
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; cannot provision a snapshot"
          fi
          uv run fedcourts provision-snapshot --court "$COURT_ID" --docket "$DOCKET_ID"

      # A predictable event is a corpus fact, not a committed file. Project it into
      # the event's ledger directory so the prediction PR carries its event.yaml and
      # the offline `validate` gate can confirm the judgment references a real event
      # without the corpus. Runs before the agent so a genuinely missing event fails
      # the job before any model tokens are spent.
      - name: Materialize the event definition for the ledger
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
        run: uv run fedcourts materialize-event --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"

      - name: Predict with Claude Code
        id: predict_claude
        if: matrix.engine == 'claude-code'
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the finalize step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          PREDICTOR_ID: ${{ matrix.predictor_id }}
          RUN_ID: ${{ matrix.run_id }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        with:
          # run-pull files this predict issue as the trusted pipeline App
          # (`fedcourtsai-data[bot]`), which the plan job's authorize-trigger gate
          # already approved. claude-code-action runs its own actor check and
          # refuses a bot by default, so allow exactly that one bot through (never
          # `*`) — otherwise the automated handoff never reaches the agent.
          allowed_bots: "fedcourtsai-data[bot]"
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md), and per
          # Anthropic policy the Max subscription OAuth token is for interactive
          # Claude Code / claude.ai, not CI. For a local/interactive fallback,
          # swap this for `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.agent-token.outputs.token }}
          # Prompt caching is automatic: the stable prefix (AGENTS.md + the
          # prompt template + schema) is cached across the run's tool-use turns.
          # The API key's default cache TTL is only 5 minutes, which would expire
          # mid-run, so ENABLE_PROMPT_CACHING_1H below pins the 1-hour TTL (and the
          # cache-read discount priced in fedcourtsai.pricing).
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          prompt: |
            Read ${{ matrix.prompt }} and AGENTS.md, then produce the prediction
            for the event in the COURT_ID/DOCKET_ID/EVENT_ID environment variables.
            Write ONLY the prediction.json and reasoning.md files. Do not commit,
            push, or open a PR — the workflow handles git. You run headless with no
            interactive input; if you are blocked, post a brief note on the
            triggering issue (#${{ github.event.issue.number }}) with
            `gh issue comment` and explain it in reasoning.md, then finish — do not
            wait for a reply.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      - name: Predict with Codex
        id: predict_codex
        if: matrix.engine == 'codex'
        # Same buffer as the Claude step: trip this step, not the job, on overrun.
        timeout-minutes: 50
        uses: openai/codex-action@10cb888d2ed3b99867f7e7ccff174a861a75aeb6 # v1
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          PREDICTOR_ID: ${{ matrix.predictor_id }}
          RUN_ID: ${{ matrix.run_id }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          # Pin the session log to a known dir so the usage-capture step can read it.
          CODEX_HOME: ${{ github.workspace }}/.codex
        with:
          # As with the Claude step: let the trusted run-pull bot handoff
          # (`fedcourtsai-data[bot]`, already authorized by the plan job) past
          # codex-action's write-access check, which a bot installation fails.
          allow-bot-users: "fedcourtsai-data[bot]"
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ matrix.prompt }}
          model: gpt-5.5
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo

      # Record measured token usage + estimated cost next to the prediction so a
      # maintainer can sum it into a real $/run (docs/budget.md). Best-effort: the
      # engine logs are read here, never the agent's word, and a miss must not
      # fail the prediction — hence continue-on-error.
      - name: Capture model usage
        if: steps.predict_claude.conclusion == 'success' || steps.predict_codex.conclusion == 'success'
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          PREDICTOR_ID: ${{ matrix.predictor_id }}
          RUN_ID: ${{ matrix.run_id }}
          ENGINE: ${{ matrix.engine }}
          MODEL: ${{ matrix.model }}
          CLAUDE_EXECUTION_FILE: ${{ steps.predict_claude.outputs.execution_file }}
          CODEX_HOME: ${{ github.workspace }}/.codex
        run: |
          args=(record-usage
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"
            --run-id "$RUN_ID" --engine "$ENGINE"
            --role predictor --actor "$PREDICTOR_ID")
          if [ -n "$MODEL" ]; then args+=(--model "$MODEL"); fi
          if [ "$ENGINE" = "claude-code" ]; then
            args+=(--claude-execution-file "$CLAUDE_EXECUTION_FILE")
          else
            args+=(--codex-sessions-dir "$CODEX_HOME/sessions")
          fi
          # Surface the measured tokens + estimated $ in the Actions UI (#89). The
          # command already prints `usage: <actor> <N> tok ~$<cost> -> <path>`; keep
          # all but the path. A miss just warns (best-effort, like the step itself).
          if out=$(uv run fedcourts "${args[@]}"); then
            echo "$out"
            {
              echo "## predict usage — ${COURT_ID}/${DOCKET_ID} ${EVENT_ID} (${ENGINE})"
              echo "${out%% -> *}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no model usage captured for ${EVENT_ID}"
          fi

      # The cell no longer opens a PR. Even when the agent failed or timed out
      # (`!cancelled()`), record what it produced and hand its output to the
      # collect job; that job aggregates the whole run into one PR. The decisions
      # (produced? validated?) use the same tested commands the old finalize step
      # did — this step only records them into a status file the collect job reads.
      - name: Record cell status
        if: ${{ !cancelled() }}
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          PREDICTOR_ID: ${{ matrix.predictor_id }}
          RUN_ID: ${{ matrix.run_id }}
          # Did the agent finish cleanly? On max-turns or a step timeout the engine
          # step fails; its partial output still rides to the collect job, which
          # routes it to a draft PR a maintainer completes — never the ready one.
          AGENT_OK: ${{ (matrix.engine == 'claude-code' && steps.predict_claude.outcome == 'success') || (matrix.engine == 'codex' && steps.predict_codex.outcome == 'success') }}
        run: |
          set -euo pipefail
          # The event.yaml is materialized before the agent runs, so a staged change
          # is not proof of a prediction. `finalize-produced` checks for the agent's
          # own prediction.json; only a produced cell is validated, and the collect
          # job commits only produced cells (a no-output cell is just warned about).
          produced=$(uv run fedcourts finalize-produced --role predict \
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID" \
            --actor "$PREDICTOR_ID" --run-id "$RUN_ID")
          validated=false
          if [ "$produced" = "true" ] && uv run fedcourts validate data; then
            validated=true
          fi
          jq -n \
            --arg court "$COURT_ID" --argjson docket "$DOCKET_ID" \
            --arg event_id "$EVENT_ID" --arg actor "$PREDICTOR_ID" --arg run_id "$RUN_ID" \
            --argjson produced "$produced" --argjson validated "$validated" \
            --argjson agent_ok "$AGENT_OK" \
            '{court:$court,docket:$docket,event_id:$event_id,actor:$actor,run_id:$run_id,produced:$produced,validated:$validated,agent_ok:$agent_ok}' \
            > status.json

      # One artifact per cell: its status.json plus its data/ subtree. The name is
      # unique per predictor x case x event so concurrent cells never collide, and
      # the collect job keys the download on the `predict-` prefix.
      - name: Upload cell output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: predict-${{ matrix.predictor_id }}-${{ matrix.court }}-${{ matrix.docket }}-${{ matrix.event_id }}
          path: |
            status.json
            data
          if-no-files-found: error
          retention-days: 7

  collect:
    needs: [plan, predict]
    # Run after the whole fan-out even if some cells failed, as long as the plan
    # queued jobs. This is the only writer: it unions the cells' artifacts into one
    # PR per run (auto-merged when green) plus, if any cell left salvageable
    # partial output, one draft PR a maintainer finishes.
    if: ${{ always() && needs.plan.outputs.has_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: runner
    permissions:
      contents: write # commit the run's predictions to a branch
      pull-requests: write # open the run PR and enable auto-merge
    steps:
      # The collect job opens the PR with the dev App token. The dev App is *not* a
      # branch-protection bypass actor (see docs/security.md), so its auto-merge is
      # bound by the required `gate` + `paths` checks rather than skipping them.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Download cell artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: cell-artifacts
          pattern: predict-*

      - name: Aggregate the run into one PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Every cell was cancelled before it could upload — nothing to collect.
          if [ ! -d cell-artifacts ] || [ -z "$(ls -A cell-artifacts)" ]; then
            echo "::warning::no cell artifacts to collect"; exit 0
          fi
          # All cells share the plan's run id; read it off any status file.
          run_id=$(jq -r '.run_id' cell-artifacts/*/status.json | head -n1)
          # The ready/draft partition, branch names, and PR prose are computed by the
          # tested `collect-plan`; this step only runs git and gh. The ready PR
          # closes the triggering issue on merge (unless a draft still has work).
          plan=$(uv run fedcourts collect-plan --role predict --run-id "$run_id" \
            --status-dir cell-artifacts --issue "$ISSUE")
          # Never silently drop a cell: warn for each that produced no output.
          jq -r '.skipped[] | "::warning::no prediction for \(.actor) on \(.court)/\(.docket) \(.event_id)"' <<<"$plan"
          for kind in ready partial; do
            pr=$(jq -c ".${kind}" <<<"$plan")
            [ "$pr" = "null" ] && continue
            git checkout -q main
            branch=$(jq -r '.branch' <<<"$pr")
            git checkout -q -b "$branch"
            # Union each member cell's data/ subtree onto the clean main checkout.
            # Cells write disjoint paths, so the union is conflict-free.
            while IFS= read -r dir; do
              cp -a "cell-artifacts/${dir}/data/." data/
            done < <(jq -r '.artifact_dirs[]' <<<"$pr")
            git add data/
            draft=$(jq -r '.draft' <<<"$pr")
            auto=true
            # Enforce the append-only data/ jail and a final schema check here,
            # producer-side. Either failing downgrades the PR to a draft for review
            # instead of auto-merging something unexpected (CI re-checks the jail).
            git diff --cached --name-status > changes.txt
            if ! uv run fedcourts assert-paths --name-status-file changes.txt; then
              draft=true; auto=false; echo "::warning::path jail tripped; opening ${branch} as a draft"
            fi
            if ! uv run fedcourts validate data; then
              draft=true; auto=false; echo "::warning::validation failed; opening ${branch} as a draft"
            fi
            git commit -q -m "$(jq -r '.commit_message' <<<"$pr")"
            # Push with the app (write) token explicitly; blank any ambient
            # extraheader at command scope so the write token authenticates.
            git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
              push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
              "HEAD:refs/heads/${branch}"
            jq -r '.body' <<<"$pr" > pr-body.md
            flags=()
            [ "$draft" = "true" ] && flags+=(--draft)
            url=$(gh pr create --base main --head "$branch" "${flags[@]}" \
              --title "$(jq -r '.title' <<<"$pr")" --body-file pr-body.md)
            # Enable auto-merge only for a ready (non-draft, jail-clean) PR. A miss
            # (e.g. the repo's "Allow auto-merge" is off) leaves the PR open for a
            # manual merge rather than failing the run.
            if [ "$draft" != "true" ] && [ "$auto" = "true" ]; then
              gh pr merge --auto --squash "$url" \
                || echo "::warning::could not enable auto-merge on ${url}"
            fi
          done
