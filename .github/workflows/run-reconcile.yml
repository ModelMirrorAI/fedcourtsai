name: run-reconcile

# Resolves the reconcile issues `run-pull` files when a docket appears decided but
# its outcome could not be recorded deterministically (an unreadable disposition,
# a missing decision date, or a case-level disposition that cannot be attributed
# to one of several open events). Fans out one agent per flagged case; the agent
# confirms the disposition from the point-in-time snapshot and writes `outcome.json`
# for each event it can settle. The agent only writes files; the workflow validates,
# commits, and opens one PR per case — mirroring run-predict / run-evaluate.
#
# Closing the cascade: when that PR merges (outcome.json now on the default branch)
# the `handoff` job opens a `run:evaluate` issue for the settled events, so a
# reconciled outcome reaches evaluation exactly as a deterministically-detected one
# does. The reconcile issue itself is labeled `run:reconcile` (not `run:pull`), so
# filing or relabeling it never re-fires the full deterministic pull.
on:
  issues:
    types: [labeled]
  # The evaluate handoff fires when a reconcile PR's outcome.json lands on the
  # default branch. We trigger on the push (ref = main) rather than on
  # pull_request, so the handoff job's ref satisfies the runner environment's
  # main-only deployment policy (a pull_request ref is refs/pull/N/merge and would
  # be blocked). The path filter keeps non-outcome merges from spinning the job up.
  push:
    branches: [main]
    paths:
      - "data/cases/**/outcome.json"

permissions: {}

concurrency:
  group: run-reconcile-${{ github.event.issue.number || github.sha }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'issues' && github.event.label.name == 'run:reconcile'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env

      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent run
      # by filing the reconcile form. Only a maintainer-installed App can apply a
      # `run:*` label that triggers a workflow (the default GITHUB_TOKEN cannot), so a
      # Bot sender is the trusted run-pull handoff; any other actor must hold write
      # access. The decision (and its fail-closed default) lives in the tested
      # `authorize-trigger` command. (The label name is already checked in the job
      # `if:`; this also gates the downstream `reconcile` job, which `needs: plan`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          uv run fedcourts authorize-trigger \
            --sender-type "$SENDER_TYPE" --actor "$ACTOR" --repo "$REPO"

      - name: Build per-case reconcile matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c "import os, pathlib; pathlib.Path('issue-body.md').write_text(os.environ.get('ISSUE_BODY', ''))"
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          matrix=$(uv run fedcourts reconcile-matrix --body-file issue-body.md --run-id "$run_id")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          if [ "$count" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi
          # Ops analytics (#89): record the planned fan-out in the Actions UI.
          echo "## run-reconcile — queued ${count} reconcile job(s)" >> "$GITHUB_STEP_SUMMARY"

  reconcile:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: write
      pull-requests: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Mint agent comment token
        id: agent-token
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue. No contents:write — the agent only writes files locally and the
        # workflow (app-token above) does the commit/PR, so a prompt injection in
        # docket text cannot push code or record an outcome with this token.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the dedicated read-only IAM role via GitHub OIDC so the agent can
      # `dvc pull` the corpus from the S3 remote for legal-context retrieval. No
      # static keys; a compromised reconcile runner cannot write or delete corpus
      # objects. The role ARN and region come from the `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed read-only credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      # Point-in-time snapshots are raw facts in the DVC-backed corpus, not git:
      # pull the corpus and materialize this case's latest snapshot to the
      # gitignored record/ path the agent reads (never committed). Best-effort —
      # a missing snapshot must not abort the run; the agent notes it per prompt.
      - name: Provision the case snapshot from the corpus
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
        run: |
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; cannot provision a snapshot"
          fi
          uv run fedcourts provision-snapshot --court "$COURT_ID" --docket "$DOCKET_ID"

      # A predictable event is a corpus fact, not a committed file. Project each
      # event in the cell into its ledger directory so an outcome the agent settles
      # carries its event.yaml and the offline `validate` gate can confirm the
      # outcome references a real event without the corpus. Runs before the agent so
      # a genuinely missing event fails the job before any model tokens are spent.
      - name: Materialize the event definitions for the ledger
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_IDS: ${{ matrix.events }}
        run: |
          for eid in $EVENT_IDS; do
            uv run fedcourts materialize-event --court "$COURT_ID" --docket "$DOCKET_ID" --event "$eid"
          done

      - name: Reconcile with Claude Code
        id: reconcile_claude
        if: matrix.engine == 'claude-code'
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the finalize step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_IDS: ${{ matrix.events }}
          RUN_ID: ${{ matrix.run_id }}
        with:
          # run-pull files reconcile issues as the trusted pipeline App
          # (`fedcourtsai-data[bot]`), already approved by the plan job's
          # authorize-trigger gate. claude-code-action refuses a bot actor by
          # default, so allow exactly that one bot (never `*`) or the automated
          # handoff never reaches the agent.
          allowed_bots: "fedcourtsai-data[bot]"
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md), and per
          # Anthropic policy the Max subscription OAuth token is for interactive
          # Claude Code / claude.ai, not CI. For a local/interactive fallback,
          # swap this for `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.agent-token.outputs.token }}
          # Prompt caching is automatic: the stable prefix (AGENTS.md + the prompt
          # template + schema) is cached across the run's tool-use turns. The API
          # key's default cache TTL is only 5 minutes, so ENABLE_PROMPT_CACHING_1H
          # below pins the 1-hour TTL (and the cache-read discount).
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          prompt: |
            Read .github/prompts/reconcile.md and AGENTS.md, then confirm the
            outcome of each event in the COURT_ID/DOCKET_ID/EVENT_IDS environment
            variables from the case snapshot and write its outcome.json (only for
            events you can settle with confidence). Do not commit, push, or open a
            PR — the workflow handles git. You run headless with no interactive
            input; if you cannot settle an event, leave it open, post a brief note
            on the triggering issue (#${{ github.event.issue.number }}) with
            `gh issue comment`, and finish — do not wait for a reply.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      # Finalize even when the agent step failed or timed out (`!cancelled()`), so a
      # run stopped by max-turns or the step timeout still hands the outcomes it did
      # settle to a maintainer instead of vanishing with the runner.
      - name: Configure git identity
        if: ${{ !cancelled() }}
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Validate and open PR
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          RUN_ID: ${{ matrix.run_id }}
          ISSUE: ${{ github.event.issue.number }}
          # Did the agent finish cleanly? On max-turns or a step timeout it fails;
          # we still commit whatever outcomes it settled, but as a *draft* PR. A
          # draft never merges, so its `reconcile:` commit can't fire the evaluate
          # handoff until a maintainer reviews and merges it.
          AGENT_OK: ${{ steps.reconcile_claude.outcome == 'success' }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Branch name, draft-vs-ready routing, and the PR title/body are computed
          # by the tested `finalize-branch` / `finalize-pr` commands; this step only
          # runs git and gh.
          branch=$(uv run fedcourts finalize-branch --role reconcile \
            --court "$COURT_ID" --docket "$DOCKET_ID" --run-id "$RUN_ID")
          git checkout -b "$branch"
          # data/ may not exist yet (no derived artifact has ever been committed),
          # so guard the add: a run that settles nothing then yields the "no outcome
          # recorded" plan below instead of aborting on a missing pathspec.
          if [ -d data ]; then
            git add data/
          fi
          # The settled events are exactly the outcome.json files this run added
          # under the case (the agent writes only outcome.json — event open/resolved
          # state is a corpus fact, not a git file). The `reconcile:` commit subject
          # and these added paths are what the push-triggered handoff reads to queue
          # run:evaluate, so an event the agent left ambiguous is never queued.
          prefix="data/cases/${COURT_ID}/${DOCKET_ID}/events"
          mapfile -t settled < <(
            git diff --cached --name-only --diff-filter=A -- "$prefix" \
              | sed -n "s#^${prefix}/\([^/]*\)/outcome.json\$#\1#p"
          )
          # A clean run must produce schema-valid outcomes (hard fail keeps the ledger
          # honest); validate only when something was settled (else finalize-pr skips).
          validated=true
          if [ "${#settled[@]}" -gt 0 ]; then
            uv run fedcourts validate data || validated=false
          fi
          plan=$(uv run fedcourts finalize-pr --role reconcile \
            --court "$COURT_ID" --docket "$DOCKET_ID" --run-id "$RUN_ID" \
            --agent-ok "$AGENT_OK" --validated "$validated" --issue "$ISSUE" \
            --settled "$(IFS=,; echo "${settled[*]:-}")")
          case "$(jq -r '.action' <<<"$plan")" in
            skip) echo "::warning::$(jq -r '.message' <<<"$plan")"; exit 0 ;;
            fail) echo "::error::$(jq -r '.message' <<<"$plan")"; exit 1 ;;
          esac
          git commit -m "$(jq -r '.commit_message' <<<"$plan")"
          # claude-code-action leaves its contents:read agent token as the ambient
          # git credential (a global http extraheader / credential helper), which
          # overrides the contents:write app token and 403s a plain push. Push with
          # the app token explicitly: inline URL credentials bypass any credential
          # helper, and blanking http.extraHeader at command scope (highest config
          # precedence) drops any ambient Authorization header — so the write token
          # authenticates.
          git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
            push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${branch}"
          jq -r '.body' <<<"$plan" > pr-body.md
          flags=()
          if [ "$(jq -r '.draft' <<<"$plan")" = "true" ]; then flags+=(--draft); fi
          gh pr create --base main --head "$branch" "${flags[@]}" \
            --title "$(jq -r '.title' <<<"$plan")" \
            --body-file pr-body.md

  # When a reconcile PR's outcome.json lands on main, hand off to evaluation —
  # mirrors run-pull's "open run:evaluate for newly resolved events", but fired by
  # the merge rather than by detection (reconcile resolves by hand). Reads the push
  # payload directly (no checkout): each commit subject-prefixed `reconcile:` names
  # a case, and its added outcome.json paths name the settled events; run-pull's
  # own `pull:` outcome commits are ignored, so a deterministic outcome is not
  # double-queued (run-pull already queues it).
  handoff:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: runner
    permissions:
      contents: read
    steps:
      - name: Mint app token
        id: app-token
        # App token (not GITHUB_TOKEN) so the run:evaluate issue triggers run-evaluate.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Open run:evaluate issues for the reconciled events
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMITS: ${{ toJson(github.event.commits) }}
        run: |
          set -euo pipefail
          # Group the outcome.json files added by this push's `reconcile:` commits
          # into "<court> <docket> <event1,event2,...>" lines, one per case.
          python3 - <<'PY' > cases.txt
          import json, os, re
          pat = re.compile(r"^data/cases/([^/]+)/([^/]+)/events/([^/]+)/outcome\.json$")
          cases: dict[tuple[str, str], list[str]] = {}
          for c in json.loads(os.environ["COMMITS"]):
              if not c.get("message", "").splitlines()[0].startswith("reconcile:"):
                  continue
              for path in c.get("added", []):
                  m = pat.match(path)
                  if m:
                      cases.setdefault((m[1], m[2]), []).append(m[3])
          for (court, docket), events in cases.items():
              print(court, docket, ",".join(sorted(set(events))))
          PY
          if [ ! -s cases.txt ]; then
            echo "No reconcile outcomes in this push; nothing to hand off."
            exit 0
          fi
          while read -r court docket events; do
            block=$(jq -n --arg c "$court" --arg d "$docket" \
              --argjson e "$(jq -R 'split(",")' <<<"$events")" \
              '{court: $c, docket: ($d | tonumber), events: $e}')
            gh issue create --repo "$REPO" \
              --title "evaluate: ${court}/${docket}" \
              --body "$(printf '```json\n%s\n```\n' "$block")" \
              --label "run:evaluate"
          done < cases.txt
