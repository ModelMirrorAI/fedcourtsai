name: run-reconcile

# Resolves the reconcile issues `run-pull` files when a docket appears decided but
# its outcome could not be recorded deterministically (an unreadable disposition,
# a missing decision date, or a case-level disposition that cannot be attributed
# to one of several open events). Fans out one agent per flagged case; the agent
# confirms the disposition from the point-in-time snapshot and writes `outcome.json`
# for each event it can settle. The agent only writes files; each cell (one case)
# uploads its output as an artifact and the `collect` job aggregates the whole run
# into one auto-merged PR (plus a draft PR for partials). The ready PR's commit and
# title start with `reconcile:` so the squash-merge fires the handoff below.
#
# Closing the cascade: when that PR merges (outcome.json now on the default branch)
# the `handoff` job opens a `run:evaluate` issue per case for the settled events, so
# a reconciled outcome reaches evaluation exactly as a deterministically-detected one
# does. The reconcile issue itself is labeled `run:reconcile` (not `run:pull`), so
# filing or relabeling it never re-fires the full deterministic pull.
on:
  issues:
    types: [labeled]
  # The evaluate handoff fires when a reconcile PR's outcome.json lands on the
  # default branch. We trigger on the push (ref = main) rather than on
  # pull_request, so the handoff job's ref satisfies the runner environment's
  # main-only deployment policy (a pull_request ref is refs/pull/N/merge and would
  # be blocked). The path filter keeps non-outcome merges from spinning the job up.
  push:
    branches: [main]
    paths:
      - "data/cases/**/outcome.json"

permissions: {}

concurrency:
  group: run-reconcile-${{ github.event.issue.number || github.sha }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'issues' && github.event.label.name == 'run:reconcile'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env

      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent run
      # by filing the reconcile form. Only a maintainer-installed App can apply a
      # `run:*` label that triggers a workflow (the default GITHUB_TOKEN cannot), so a
      # Bot sender is the trusted run-pull handoff; any other actor must hold write
      # access. The decision (and its fail-closed default) lives in the tested
      # `authorize-trigger` command. (The label name is already checked in the job
      # `if:`; this also gates the downstream `reconcile` job, which `needs: plan`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          uv run fedcourts authorize-trigger \
            --sender-type "$SENDER_TYPE" --actor "$ACTOR" --repo "$REPO"

      - name: Build per-case reconcile matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c "import os, pathlib; pathlib.Path('issue-body.md').write_text(os.environ.get('ISSUE_BODY', ''))"
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          matrix=$(uv run fedcourts reconcile-matrix --body-file issue-body.md --run-id "$run_id")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          if [ "$count" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi
          # Ops analytics (#89): record the planned fan-out in the Actions UI.
          echo "## run-reconcile — queued ${count} reconcile job(s)" >> "$GITHUB_STEP_SUMMARY"

  reconcile:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      # The cell no longer commits or opens a PR — it only reads the repo and
      # uploads an artifact; the collect job does the git/PR with its own token.
      contents: read
      id-token: write # assume the AWS role for the DVC S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint agent comment token
        id: agent-token
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue. No contents:write — the agent only writes files locally, which ride
        # to the collect job as an artifact; that job (its own token) does the
        # commit/PR, so a prompt injection in docket text cannot push code or record
        # an outcome with this token.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Read-only corpus access (OIDC role; no static keys — a compromised
      # reconcile runner cannot write or delete corpus objects). No pull: the cell
      # queries the immutable corpus blob in place over ranged reads, so the
      # only corpus bytes this job moves are the KBs its lookups touch.
      - uses: ./.github/actions/corpus-ranged
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          dvc-remote-url: ${{ vars.DVC_REMOTE_URL }}

      # Point-in-time snapshots are raw facts in the DVC-backed corpus, not git:
      # materialize this case's latest snapshot (a ranged point lookup, KB-scale)
      # to the gitignored record/ path the agent reads (never committed).
      # Best-effort — a missing snapshot must not abort the run; the agent notes
      # it per prompt.
      - name: Provision the case snapshot from the corpus
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
        run: uv run fedcourts provision-snapshot --court "$COURT_ID" --docket "$DOCKET_ID"

      # A predictable event is a corpus fact, not a committed file. Project each
      # event in the cell into its ledger directory so an outcome the agent settles
      # carries its event.yaml and the offline `validate` gate can confirm the
      # outcome references a real event without the corpus. Runs before the agent so
      # a genuinely missing event fails the job before any model tokens are spent.
      - name: Materialize the event definitions for the ledger
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_IDS: ${{ matrix.events }}
        run: |
          for eid in $EVENT_IDS; do
            uv run fedcourts materialize-event --court "$COURT_ID" --docket "$DOCKET_ID" --event "$eid"
          done

      - name: Reconcile with Claude Code
        id: reconcile_claude
        if: matrix.engine == 'claude-code'
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the finalize step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1.0.168
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_IDS: ${{ matrix.events }}
          RUN_ID: ${{ matrix.run_id }}
        with:
          # run-pull files reconcile issues as the trusted pipeline App
          # (`fedcourtsai-data[bot]`), already approved by the plan job's
          # authorize-trigger gate. claude-code-action refuses a bot actor by
          # default, so allow exactly that one bot (never `*`) or the automated
          # handoff never reaches the agent.
          allowed_bots: "fedcourtsai-data[bot]"
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md), and per
          # Anthropic policy the Max subscription OAuth token is for interactive
          # Claude Code / claude.ai, not CI. For a local/interactive fallback,
          # swap this for `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.agent-token.outputs.token }}
          # Prompt caching is automatic: the stable prefix (AGENTS.md + the prompt
          # template + schema) is cached across the run's tool-use turns. The API
          # key's default cache TTL is only 5 minutes, so ENABLE_PROMPT_CACHING_1H
          # below pins the 1-hour TTL (and the cache-read discount).
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          prompt: |
            Read .github/prompts/reconcile.md and AGENTS.md, then confirm the
            outcome of each event in the COURT_ID/DOCKET_ID/EVENT_IDS environment
            variables from the case snapshot and write its outcome.json (only for
            events you can settle with confidence). Do not commit, push, or open a
            PR — the workflow handles git. You run headless with no interactive
            input; if you cannot settle an event, leave it open, post a brief note
            on the triggering issue (#${{ github.event.issue.number }}) with
            `gh issue comment`, and finish — do not wait for a reply.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      # The cell no longer opens a PR. Even when the agent failed or timed out
      # (`!cancelled()`), record which events it settled and hand its output to the
      # collect job; that job aggregates the whole run into one PR.
      - name: Record cell status
        if: ${{ !cancelled() }}
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_IDS: ${{ matrix.events }}
          RUN_ID: ${{ matrix.run_id }}
          # Did the agent finish cleanly? On max-turns or a step timeout it fails;
          # whatever it settled still rides to the collect job, which routes it to a
          # draft PR a maintainer completes — never the auto-merging ready one.
          AGENT_OK: ${{ steps.reconcile_claude.outcome == 'success' }}
        run: |
          set -euo pipefail
          # Settled = the cell's events that now have an outcome.json on disk (the
          # agent writes outcome.json only for events it can settle; event.yaml is
          # materialized for every event, so it is the outcome.json that is the
          # signal). The append-only data/ jail in collect rejects a modified
          # outcome.json, so a pre-existing one can never be mistaken for settled.
          settled=()
          for eid in $EVENT_IDS; do
            if [ -f "data/cases/${COURT_ID}/${DOCKET_ID}/events/${eid}/outcome.json" ]; then
              settled+=("$eid")
            fi
          done
          validated=false
          if [ "${#settled[@]}" -gt 0 ] && uv run fedcourts validate data; then
            validated=true
          fi
          settled_json=$(printf '%s\n' "${settled[@]:-}" | jq -R . | jq -s 'map(select(length > 0))')
          jq -n \
            --arg court "$COURT_ID" --argjson docket "$DOCKET_ID" --arg run_id "$RUN_ID" \
            --argjson settled "$settled_json" \
            --argjson validated "$validated" --argjson agent_ok "$AGENT_OK" \
            '{court:$court,docket:$docket,run_id:$run_id,settled:$settled,validated:$validated,agent_ok:$agent_ok}' \
            > status.json

      # One artifact per cell (per case): its status.json plus its data/ subtree.
      # The name is unique per case so concurrent cells never collide, and the
      # collect job keys the download on the `reconcile-` prefix.
      - name: Upload cell output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reconcile-${{ matrix.court }}-${{ matrix.docket }}
          path: |
            status.json
            data
          if-no-files-found: error
          retention-days: 7

  collect:
    needs: [plan, reconcile]
    # Run after the whole fan-out even if some cells failed, as long as the plan
    # queued jobs (and only on the issue trigger, not the handoff push). This is the
    # only writer: it unions the cells' artifacts into one PR per run (auto-merged
    # when green) plus, if any case left salvageable output, one draft PR.
    if: ${{ always() && github.event_name == 'issues' && needs.plan.outputs.has_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: runner
    permissions:
      contents: write # commit the run's outcomes to a branch
      pull-requests: write # open the run PR and enable auto-merge
      issues: write # GITHUB_TOKEN posts flags to the agent-feedback issue (not the App token)
    steps:
      # The collect job opens the PR with the dev App token. The dev App is *not* a
      # branch-protection bypass actor (see docs/security.md), so its auto-merge is
      # bound by the required `gate` + `paths` checks rather than skipping them.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Download cell artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cell-artifacts
          pattern: reconcile-*

      - name: Aggregate the run into one PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Every cell was cancelled before it could upload — nothing to collect.
          run_url="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          if [ ! -d cell-artifacts ] || [ -z "$(ls -A cell-artifacts)" ]; then
            # Wholesale failure: no cell delivered anything. Render the tested
            # stall comment for the trigger issue so the run's silence is loud
            # there; the next step posts it with the ambient token.
            echo "::warning::no cell artifacts to collect"
            uv run fedcourts stall-comment --role reconcile --run-url "$run_url" > stall-comment.md
            exit 0
          fi
          # All cells share the plan's run id; read it off any status file.
          run_id=$(jq -r '.run_id' cell-artifacts/*/status.json | head -n1)
          # The ready/draft partition, branch names, and PR prose are computed by the
          # tested `collect-reconcile-plan`; this step only runs git and gh. The ready
          # PR's `reconcile:` commit subject fires the evaluate handoff on merge, and
          # it closes the triggering issue (unless a draft still has work).
          plan=$(uv run fedcourts collect-reconcile-plan --run-id "$run_id" \
            --status-dir cell-artifacts --issue "$ISSUE")
          # Surface this run's agent flags in the Actions summary so they are seen
          # even when no PR opens (e.g. every case was blocked). They also ride in
          # the ready/draft PR body, and each settled case's flags.json is committed.
          flags=$(jq -r '.flags' <<<"$plan")
          if [ -n "$flags" ] && [ "$flags" != "null" ]; then
            printf '%s\n' "$flags" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Roll this run's flags to a file for the next step to latch onto the
          # long-lived agent-feedback issue (posted with the ambient GITHUB_TOKEN, off
          # this job's contents-write App token). Empty when the run raised no flags.
          feedback=$(jq -r '.feedback_comment' <<<"$plan")
          if [ -n "$feedback" ] && [ "$feedback" != "null" ]; then
            printf '%s\n' "$feedback" > feedback-comment.md
          fi
          # Never silently drop a case: warn for each that settled nothing.
          jq -r '.skipped[] | "::warning::reconcile settled nothing for \(.court)/\(.docket)"' <<<"$plan"
          if [ "$(jq -r '.stalled' <<<"$plan")" = "true" ]; then
            # Artifacts arrived but no case was settled and no agent finished
            # cleanly (the tested `stalled` signal) — same stall, same comment.
            uv run fedcourts stall-comment --role reconcile --run-url "$run_url" > stall-comment.md
          fi
          for kind in ready partial; do
            pr=$(jq -c ".${kind}" <<<"$plan")
            [ "$pr" = "null" ] && continue
            git checkout -q main
            branch=$(jq -r '.branch' <<<"$pr")
            git checkout -q -b "$branch"
            # Union each member case's data/ subtree onto the clean main checkout.
            # Cases write disjoint paths, so the union is conflict-free.
            while IFS= read -r dir; do
              cp -a "cell-artifacts/${dir}/data/." data/
            done < <(jq -r '.artifact_dirs[]' <<<"$pr")
            git add data/
            draft=$(jq -r '.draft' <<<"$pr")
            auto=true
            # Enforce the append-only data/ jail and a final schema check here,
            # producer-side. Either failing downgrades the PR to a draft for review
            # instead of auto-merging something unexpected (CI re-checks the jail).
            git diff --cached --name-status > changes.txt
            if ! uv run fedcourts assert-paths --name-status-file changes.txt; then
              draft=true; auto=false; echo "::warning::path jail tripped; opening ${branch} as a draft"
            fi
            if ! uv run fedcourts validate data; then
              draft=true; auto=false; echo "::warning::validation failed; opening ${branch} as a draft"
            fi
            git commit -q -m "$(jq -r '.commit_message' <<<"$pr")"
            # Push with the app (write) token explicitly; blank any ambient
            # extraheader at command scope so the write token authenticates.
            git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
              push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
              "HEAD:refs/heads/${branch}"
            jq -r '.body' <<<"$pr" > pr-body.md
            flags=()
            [ "$draft" = "true" ] && flags+=(--draft)
            url=$(gh pr create --base main --head "$branch" "${flags[@]}" \
              --title "$(jq -r '.title' <<<"$pr")" --body-file pr-body.md)
            # Enable auto-merge only for a ready (non-draft, jail-clean) PR. A miss
            # (e.g. the repo's "Allow auto-merge" is off) leaves the PR open for a
            # manual merge rather than failing the run.
            if [ "$draft" != "true" ] && [ "$auto" = "true" ]; then
              gh pr merge --auto --squash "$url" \
                || echo "::warning::could not enable auto-merge on ${url}"
            fi
          done

      - name: Flag a stalled run on the trigger issue
        # A run that produced no output opens no PR, so nothing would close — or
        # even mention — the trigger issue; it would sit silently orphaned open.
        # Post the tested stall comment (rendered by the aggregate step) with the
        # ambient GITHUB_TOKEN: commenting triggers nothing, so the contents-write
        # App token stays out of it. Runs even if the aggregate step failed; the
        # file is absent whenever the run produced output.
        if: ${{ always() && github.event.issue.number }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          [ -s stall-comment.md ] || exit 0
          gh issue comment "$ISSUE" --repo "$REPO" --body-file stall-comment.md

      - name: Latch run flags onto the agent-feedback issue
        # Post with the ambient GITHUB_TOKEN (job-scoped `issues: write`), NOT the dev
        # App token: latching needs no cross-workflow trigger (`agent-feedback` is a
        # non-triggering label), so issue-write stays off this job's contents-write
        # token. The find-or-create and once-only idempotency are the tested
        # `post-agent-feedback` command (agent_feedback.py); this only invokes it.
        # Runs even if the aggregate step failed, so a fully-failed run still leaves a
        # note. The file is empty/absent when the run raised no flags.
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          [ -s feedback-comment.md ] || exit 0
          uv run fedcourts post-agent-feedback --repo "$REPO" --body-file feedback-comment.md

  # When a reconcile PR's outcome.json lands on main, hand off to evaluation —
  # mirrors run-pull's "open run:evaluate for newly resolved events", but fired by
  # the merge rather than by detection (reconcile resolves by hand). Reads the push
  # payload directly (no checkout): a `reconcile:`-subject commit's added
  # outcome.json paths name the settled events, grouped per case (the collect job's
  # squash commit covers every case in the run at once); run-pull's own `pull:`
  # outcome commits are ignored, so a deterministic outcome is not double-queued
  # (run-pull already queues it). One run:evaluate issue is opened per case.
  handoff:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: runner
    permissions:
      contents: read
    steps:
      - name: Mint app token
        id: app-token
        # App token (not GITHUB_TOKEN) so the run:evaluate issue triggers run-evaluate.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Open run:evaluate issues for the reconciled events
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMITS: ${{ toJson(github.event.commits) }}
        run: |
          set -euo pipefail
          # Group the outcome.json files added by this push's `reconcile:` commits
          # into "<court> <docket> <event1,event2,...>" lines, one per case.
          python3 - <<'PY' > cases.txt
          import json, os, re
          pat = re.compile(r"^data/cases/([^/]+)/([^/]+)/events/([^/]+)/outcome\.json$")
          cases: dict[tuple[str, str], list[str]] = {}
          for c in json.loads(os.environ["COMMITS"]):
              if not c.get("message", "").splitlines()[0].startswith("reconcile:"):
                  continue
              for path in c.get("added", []):
                  m = pat.match(path)
                  if m:
                      cases.setdefault((m[1], m[2]), []).append(m[3])
          for (court, docket), events in cases.items():
              print(court, docket, ",".join(sorted(set(events))))
          PY
          if [ ! -s cases.txt ]; then
            echo "No reconcile outcomes in this push; nothing to hand off."
            exit 0
          fi
          while read -r court docket events; do
            block=$(jq -n --arg c "$court" --arg d "$docket" \
              --argjson e "$(jq -R 'split(",")' <<<"$events")" \
              '{court: $c, docket: ($d | tonumber), events: $e}')
            gh issue create --repo "$REPO" \
              --title "evaluate: ${court}/${docket}" \
              --body "$(printf '```json\n%s\n```\n' "$block")" \
              --label "run:evaluate"
          done < cases.txt
