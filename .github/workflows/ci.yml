name: ci

# The local gate, enforced on every PR and on pushes to main. Mirrors the
# commands in AGENTS.md so "green CI" and "passes the local gate" mean the same
# thing. Uses no secrets, so it does not declare the `runner` environment.
on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    # The whole suite (lint, mypy, pytest, validation) runs in a few minutes; this
    # cap is generous headroom so a hung step is cancelled long before the 6h default.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env
      - name: ruff format
        run: uv run ruff format --check .
      - name: ruff check
        run: uv run ruff check .
      - name: mypy
        run: uv run mypy
      - name: pytest
        run: uv run pytest --cov --cov-report=term-missing
      - name: coverage summary
        # Surface coverage to maintainers in the run's job summary (no badge, no
        # commit, no upload). Needs no permissions — $GITHUB_STEP_SUMMARY is a
        # runner-local file — so this stays fork-safe.
        run: |
          {
            echo "## Coverage: $(uv run coverage report --format=total)%"
            echo ""
            echo "<details><summary>Per-file coverage</summary>"
            echo ""
            uv run coverage report --format=markdown
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: validate data
        run: uv run fedcourts validate data
      - name: dvc status
        run: uv run fedcourts dvc-status
      - name: schema drift
        run: |
          uv run fedcourts export-schemas schemas
          git diff --exit-code schemas
