name: run-dev

# Triggered by `run:dev`. Runs Claude Code on the pipeline codebase to complete
# a development task described in the issue. Unlike predict/evaluate (where the
# workflow does git), the dev agent follows the full branch-and-PR workflow
# itself, using the GitHub App token so its PR triggers CI.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-dev-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dev:
    if: github.event.label.name == 'run:dev'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: read
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Develop with Claude Code
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            Read .github/prompts/dev.md and AGENTS.md, then complete the `run:dev`
            development task described in the issue (number in ISSUE_NUMBER, title in
            ISSUE_TITLE, body in ISSUE_BODY). This issue may have been re-labeled to
            resume earlier work: before branching, read the issue comments and check
            for an existing branch/PR for it, and update that PR in place rather than
            opening a second one — dev.md has the exact steps. Follow the branch-and-PR
            workflow yourself, pass the local gate, and never commit to main directly.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions
