name: run-dev

# Triggered by `run:dev`. Runs Claude Code on the pipeline codebase to complete
# a development task described in the issue. Unlike predict/evaluate (where the
# workflow does git), the dev agent follows the full branch-and-PR workflow
# itself, using the GitHub App token so its PR triggers CI.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-dev-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dev:
    if: github.event.label.name == 'run:dev'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: read
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent
      # run by filing a form that declares `run:dev`. Require the trigger to come
      # from the pipeline App or a maintainer with write access; deny everyone else.
      # Fail closed otherwise. claude-code-action re-checks the actor before it
      # spends model tokens, but this pre-flight step refuses *before* the dev App
      # token (contents + pull-requests + workflows: write) is minted — matching the
      # deterministic writers (run-pull / run-reconcile).
      # (The label name is already checked in the job `if:`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          set -euo pipefail
          # Only a maintainer-installed App can apply a `run:*` label that triggers
          # a workflow (events from the default GITHUB_TOKEN do not), so a Bot
          # sender is a trusted pipeline App handoff.
          if [ "$SENDER_TYPE" = "Bot" ]; then
            echo "Authorized ${ACTOR} (pipeline App handoff)."
            exit 0
          fi
          perm=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" \
            --jq '.permission' 2>/dev/null || echo none)
          case "$perm" in
            admin | maintain | write) echo "Authorized ${ACTOR} (${perm} access)." ;;
            *)
              echo "::error::${ACTOR} lacks write access (permission: ${perm}); refusing to run." >&2
              exit 1
              ;;
          esac

      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          # Pipeline development includes the workflows themselves, so the dev agent
          # may modify files under .github/workflows/ (a push without this scope is
          # rejected by GitHub). The change still lands only via a reviewed PR, and
          # the `runner` environment that holds every secret is restricted to deploy
          # from `main`, so a workflow the agent authors on its PR branch cannot
          # reach those secrets until the PR is merged.
          permission-workflows: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Develop with Claude Code
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the rescue step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1.0.168
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md). For a
          # local/interactive fallback, swap this for
          # `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          # The API key's default prompt-cache TTL is only 5 minutes, which would
          # expire across a long dev run's tool-use turns; pin the 1-hour TTL so the
          # stable prefix (AGENTS.md + prompt) keeps its cache-read discount.
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          prompt: |
            Read .github/prompts/dev.md and AGENTS.md, then complete the `run:dev`
            development task described in the issue (number in ISSUE_NUMBER, title in
            ISSUE_TITLE, body in ISSUE_BODY). This issue may have been re-labeled to
            resume earlier work: before branching, read the issue comments and check
            for an existing branch/PR for it, and update that PR in place rather than
            opening a second one — dev.md has the exact steps. Follow the branch-and-PR
            workflow yourself, pass the local gate, and never commit to main directly.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      # The dev agent does its own git, so if max-turns or the step timeout stops it
      # before it pushes its branch and opens a PR, the work is only on the runner —
      # and the runner is thrown away. These two steps run on `!cancelled()` to
      # salvage it: commit any leftover changes on the issue branch and open a
      # *draft* PR for a maintainer to finish. A run that already opened its PR with
      # a clean tree is a no-op.
      - name: Configure git identity
        if: ${{ !cancelled() }}
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Rescue partial work
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -uo pipefail
          gh auth setup-git
          branch="dev/issue-${ISSUE_NUMBER}"
          # Agent finished cleanly when the tree is clean and a PR is already open for
          # the branch — nothing to salvage.
          clean=true
          [ -n "$(git status --porcelain)" ] && clean=false
          existing=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' || true)
          if [ "$clean" = "true" ] && [ -n "$existing" ]; then
            echo "Agent opened PR #${existing} with a clean tree; nothing to rescue."
            exit 0
          fi
          # Make sure we are on the issue branch, creating it (and carrying any
          # uncommitted work onto it) if the agent never did.
          if [ "$(git branch --show-current)" != "$branch" ]; then
            if git show-ref --verify --quiet "refs/heads/${branch}"; then
              git checkout "$branch"
            else
              git checkout -b "$branch"
            fi
          fi
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "dev: rescue partial work for issue #${ISSUE_NUMBER}"
          fi
          if [ "$(git rev-list --count "origin/main..${branch}")" -eq 0 ]; then
            echo "::warning::run for issue #${ISSUE_NUMBER} hit its turn/time limit with no committed work to push."
            exit 0
          fi
          git push origin "$branch"
          # The agent may have pushed but been stopped before opening the PR; open a
          # draft one only when none exists yet.
          if [ -z "$existing" ]; then
            body=$(printf 'Partial work for issue #%s, salvaged after the run hit its turn/time limit.\n\n⚠️ Draft: a maintainer should review and finish it.\n\nCloses #%s\n' \
              "$ISSUE_NUMBER" "$ISSUE_NUMBER")
            gh pr create --draft --base main --head "$branch" \
              --title "dev: ${ISSUE_TITLE} (partial)" \
              --body "$body"
          fi
