name: run-evaluate

# Triggered by `run:evaluate`. Fans out over every enabled evaluator x resolved
# event and runs the matching coding agent. Each evaluator scores every
# predictor's prediction for the event internally, so predictors are not a
# matrix dimension. The agent only writes files; the workflow commits and opens
# one PR per cell. (run-predict aggregates its cells into one PR per run via a
# collect job; run-evaluate has not yet been converted to that pattern.)
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-evaluate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event.label.name == 'run:evaluate'
    runs-on: ubuntu-latest
    environment: runner
    permissions:
      contents: read
      id-token: write # assume the AWS role to dvc pull the corpus for scope gating
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent
      # run by filing a form that declares `run:evaluate`. Require the trigger to
      # come from the pipeline App (run-pull files evaluate issues automatically) or
      # a maintainer with write access; deny everyone else. Fail closed otherwise.
      # claude-code-action re-checks the actor before it spends model tokens, but
      # this pre-flight step refuses *before* the downstream `evaluate` job (which
      # `needs: plan`) mints any token, assumes the S3 role, or reads the corpus —
      # matching the deterministic writers (run-pull / run-seed / run-reconcile).
      # (The label name is already checked in the job `if:`.)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env

      # Only a maintainer-installed App can apply a `run:*` label that triggers a
      # workflow (events from the default GITHUB_TOKEN do not), so a Bot sender is
      # the trusted run-pull handoff; any other actor must hold write access. The
      # decision (and its fail-closed default) lives in the tested `authorize-trigger`
      # command. It refuses *before* the downstream `evaluate` job (which `needs: plan`)
      # mints any token, assumes the S3 role, or reads the corpus. (The label name is
      # already checked in the job `if:`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          uv run fedcourts authorize-trigger \
            --sender-type "$SENDER_TYPE" --actor "$ACTOR" --repo "$REPO"

      # The scope gate (predict.scope=scotus_touched) reads each case's latched
      # predict_eligible flag from the DVC-backed corpus, so the corpus must be on
      # disk before evaluate-matrix runs. Assume the read-only S3 role via OIDC and
      # `dvc pull` it here — without this the gate sees an empty database, drops
      # every case, and the evaluate job is silently skipped.
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"
      - name: Pull the corpus for scope gating
        run: |
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; scope gating has no corpus to read"
          fi

      - name: Build evaluator x case x event matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c "import os, pathlib; pathlib.Path('issue-body.md').write_text(os.environ.get('ISSUE_BODY', ''))"
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          matrix=$(uv run fedcourts evaluate-matrix --body-file issue-body.md --run-id "$run_id")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          if [ "$count" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi
          # Ops analytics (#89): record the planned fan-out in the Actions UI.
          echo "## run-evaluate — queued ${count} evaluation job(s)" >> "$GITHUB_STEP_SUMMARY"

  evaluate:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: write
      pull-requests: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Mint agent comment token
        id: agent-token
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue/PR. No contents:write — the agent only writes files locally and the
        # workflow (app-token above) does the commit/PR, so a prompt injection in
        # docket text cannot push code with this token.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the dedicated read-only IAM role via GitHub OIDC so retrieval steps
      # can `dvc pull` the historical corpus from the S3 remote. No static keys; a
      # compromised evaluate runner cannot write or delete corpus objects. The role
      # ARN and region come from the `runner` environment.
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Define the remote's bucket URL out of band into the gitignored
      # .dvc/config.local (never committed; see SECURITY.md). Boto3 picks up the
      # OIDC-assumed read-only credentials from the environment.
      - name: Configure the DVC remote
        env:
          DVC_REMOTE_URL: ${{ vars.DVC_REMOTE_URL }}
        run: uvx --from 'dvc[s3]' dvc remote add --local -d storage "$DVC_REMOTE_URL"

      # Point-in-time snapshots are raw facts in the DVC-backed corpus, not git:
      # pull the corpus and materialize this case's latest snapshot to the
      # gitignored record/ path the evaluator reads (never committed). Best-effort
      # — a missing snapshot must not abort the run; the agent notes it per prompt.
      - name: Provision the case snapshot from the corpus
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
        run: |
          if [ -f corpus/corpus.db.dvc ]; then
            uvx --from 'dvc[s3]' dvc pull corpus/corpus.db.dvc
          else
            echo "::warning::no corpus pointer yet; cannot provision a snapshot"
          fi
          uv run fedcourts provision-snapshot --court "$COURT_ID" --docket "$DOCKET_ID"

      # A predictable event is a corpus fact, not a committed file. Project it into
      # the event's ledger directory so the evaluation PR carries its event.yaml and
      # the offline `validate` gate can confirm the judgment references a real event
      # without the corpus. Runs before the agent so a genuinely missing event fails
      # the job before any model tokens are spent.
      - name: Materialize the event definition for the ledger
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
        run: uv run fedcourts materialize-event --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"

      - name: Evaluate with Claude Code
        id: evaluate_claude
        if: matrix.engine == 'claude-code'
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the finalize step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
        with:
          # run-pull files this evaluate issue as the trusted pipeline App
          # (`fedcourtsai-data[bot]`), already approved by the plan job's
          # authorize-trigger gate. claude-code-action refuses a bot actor by
          # default, so allow exactly that one bot (never `*`) or the automated
          # handoff never reaches the agent.
          allowed_bots: "fedcourtsai-data[bot]"
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md), and per
          # Anthropic policy the Max subscription OAuth token is for interactive
          # Claude Code / claude.ai, not CI. For a local/interactive fallback,
          # swap this for `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.agent-token.outputs.token }}
          # Prompt caching is automatic: the stable prefix (AGENTS.md + the
          # prompt template + schema) is cached across the run's tool-use turns.
          # The API key's default cache TTL is only 5 minutes, which would expire
          # mid-run, so ENABLE_PROMPT_CACHING_1H below pins the 1-hour TTL (and the
          # cache-read discount priced in fedcourtsai.pricing).
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          prompt: |
            Read ${{ matrix.prompt }} and AGENTS.md, then score every predictor's
            prediction for the event in the COURT_ID/DOCKET_ID/EVENT_ID environment
            variables against its outcome.json. Write ONLY the evaluation.json and
            evaluation.md files. Do not commit, push, or open a PR — the workflow
            handles git. You run headless with no interactive input; if you are
            blocked, post a brief note on the triggering issue
            (#${{ github.event.issue.number }}) with `gh issue comment` and explain
            it in evaluation.md, then finish — do not wait for a reply.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      - name: Evaluate with Codex
        id: evaluate_codex
        if: matrix.engine == 'codex'
        # Same buffer as the Claude step: trip this step, not the job, on overrun.
        timeout-minutes: 50
        uses: openai/codex-action@10cb888d2ed3b99867f7e7ccff174a861a75aeb6 # v1
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          # Pin the session log to a known dir so the usage-capture step can read it.
          CODEX_HOME: ${{ github.workspace }}/.codex
        with:
          # As with the Claude step: let the trusted run-pull bot handoff
          # (`fedcourtsai-data[bot]`, already authorized by the plan job) past
          # codex-action's write-access check, which a bot installation fails.
          allow-bot-users: "fedcourtsai-data[bot]"
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ matrix.prompt }}
          model: gpt-5.5
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo

      # Record measured token usage + estimated cost next to the evaluation so a
      # maintainer can sum it into a real $/run (docs/budget.md). Best-effort: the
      # engine logs are read here, never the agent's word, and a miss must not
      # fail the evaluation — hence continue-on-error.
      - name: Capture model usage
        if: steps.evaluate_claude.conclusion == 'success' || steps.evaluate_codex.conclusion == 'success'
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          ENGINE: ${{ matrix.engine }}
          MODEL: ${{ matrix.model }}
          CLAUDE_EXECUTION_FILE: ${{ steps.evaluate_claude.outputs.execution_file }}
          CODEX_HOME: ${{ github.workspace }}/.codex
        run: |
          args=(record-usage
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"
            --run-id "$RUN_ID" --engine "$ENGINE"
            --role evaluator --actor "$EVALUATOR_ID")
          if [ -n "$MODEL" ]; then args+=(--model "$MODEL"); fi
          if [ "$ENGINE" = "claude-code" ]; then
            args+=(--claude-execution-file "$CLAUDE_EXECUTION_FILE")
          else
            args+=(--codex-sessions-dir "$CODEX_HOME/sessions")
          fi
          # Surface the measured tokens + estimated $ in the Actions UI (#89). The
          # command already prints `usage: <actor> <N> tok ~$<cost> -> <path>`; keep
          # all but the path. A miss just warns (best-effort, like the step itself).
          if out=$(uv run fedcourts "${args[@]}"); then
            echo "$out"
            {
              echo "## evaluate usage — ${COURT_ID}/${DOCKET_ID} ${EVENT_ID} (${ENGINE})"
              echo "${out%% -> *}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no model usage captured for ${EVENT_ID}"
          fi

      # Finalize even when the agent step failed or timed out (`!cancelled()`), so a
      # run stopped by max-turns or the step timeout still hands its partial output
      # to a maintainer instead of vanishing with the runner.
      - name: Configure git identity
        if: ${{ !cancelled() }}
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Validate and open PR
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          # Did the agent finish cleanly? On max-turns or a step timeout the engine
          # step fails; we still commit whatever valid output it left, but as a
          # *draft* PR a maintainer must complete, never as a ready evaluation.
          AGENT_OK: ${{ (matrix.engine == 'claude-code' && steps.evaluate_claude.outcome == 'success') || (matrix.engine == 'codex' && steps.evaluate_codex.outcome == 'success') }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Branch name, draft-vs-ready routing, and the PR title/body are computed
          # by the tested `finalize-branch` / `finalize-pr` commands; this step only
          # runs git and gh. The case + event + actor ride in the branch so two
          # concurrent cells sharing a second-granular run id never collide on a ref.
          branch=$(uv run fedcourts finalize-branch --role evaluate \
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID" \
            --actor "$EVALUATOR_ID" --run-id "$RUN_ID")
          git checkout -b "$branch"
          # The event.yaml is materialized before the agent runs, so a staged change
          # is not proof of an evaluation — a failed/empty agent leaves only that
          # scaffold. Stage data/ (and open a PR) only when this evaluator's own
          # evaluation.json exists; otherwise the cell is skipped with a warning
          # rather than opening a draft PR that carries no evaluation.
          if [ "$(uv run fedcourts finalize-produced --role evaluate \
              --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID" \
              --actor "$EVALUATOR_ID" --run-id "$RUN_ID")" = "true" ]; then
            changed=true
            git add data/
          else
            changed=false
          fi
          # Only validate when there is output; a clean run must validate (hard fail),
          # a partial run's invalid output becomes a draft (decided in finalize-pr).
          validated=true
          if [ "$changed" = "true" ]; then
            uv run fedcourts validate data || validated=false
          fi
          plan=$(uv run fedcourts finalize-pr --role evaluate \
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID" \
            --actor "$EVALUATOR_ID" --run-id "$RUN_ID" \
            --agent-ok "$AGENT_OK" --changed "$changed" --validated "$validated")
          case "$(jq -r '.action' <<<"$plan")" in
            skip) echo "::warning::$(jq -r '.message' <<<"$plan")"; exit 0 ;;
            fail) echo "::error::$(jq -r '.message' <<<"$plan")"; exit 1 ;;
          esac
          git commit -m "$(jq -r '.commit_message' <<<"$plan")"
          # claude-code-action leaves its contents:read agent token as the ambient
          # git credential (a global http extraheader / credential helper), which
          # overrides the contents:write app token and 403s a plain push. Push with
          # the app token explicitly: inline URL credentials bypass any credential
          # helper, and blanking http.extraHeader at command scope (highest config
          # precedence) drops any ambient Authorization header — so the write token
          # authenticates.
          git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
            push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${branch}"
          jq -r '.body' <<<"$plan" > pr-body.md
          flags=()
          if [ "$(jq -r '.draft' <<<"$plan")" = "true" ]; then flags+=(--draft); fi
          gh pr create --base main --head "$branch" "${flags[@]}" \
            --title "$(jq -r '.title' <<<"$plan")" \
            --body-file pr-body.md
