name: run-evaluate

# Triggered by `run:evaluate`. Fans out over every enabled evaluator x resolved
# event and runs the matching coding agent. Each evaluator scores every
# predictor's prediction for the event internally, so predictors are not a
# matrix dimension. The agent only writes files; the workflow commits and opens
# one PR per cell. Mirror of run-predict.yml.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-evaluate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event.label.name == 'run:evaluate'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env
      - name: Build evaluator x event matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY' > request.json
          import json, os, re, sys
          m = re.search(r"```json\s*(\{.*?\})\s*```", os.environ.get("ISSUE_BODY", ""), re.S)
          if not m:
              sys.exit("No ```json {court,docket,events} block found in the issue body.")
          print(m.group(1))
          PY
          court=$(jq -r '.court' request.json)
          docket=$(jq -r '.docket' request.json)
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          events=$(jq -r '.events[]?' request.json | sed 's/^/--event /' | tr '\n' ' ')
          matrix=$(uv run fedcourts evaluate-matrix --court "$court" --docket "$docket" --run-id "$run_id" $events)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$matrix" | jq '.include | length')" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi

  evaluate:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      contents: write
      pull-requests: write
      id-token: write # assume the AWS role for the DVC S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Mint agent comment token
        id: agent-token
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue/PR. No contents:write — the agent only writes files locally and the
        # workflow (app-token above) does the commit/PR, so a prompt injection in
        # docket text cannot push code with this token.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Assume the least-privilege AWS role via GitHub OIDC so retrieval steps can
      # `dvc pull` the historical corpus from the S3 remote. No static keys; the
      # role ARN and region come from the `runner` environment (see issue #17).
      - name: Configure AWS credentials (DVC S3 remote, read-only)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Evaluate with Claude Code
        if: matrix.engine == 'claude-code'
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.agent-token.outputs.token }}
          prompt: |
            Read ${{ matrix.prompt }} and AGENTS.md, then score every predictor's
            prediction for the event in the COURT_ID/DOCKET_ID/EVENT_ID environment
            variables against its outcome.json. Write ONLY the evaluation.json and
            evaluation.md files. Do not commit, push, or open a PR — the workflow
            handles git. You run headless with no interactive input; if you are
            blocked, post a brief note on the triggering issue
            (#${{ github.event.issue.number }}) with `gh issue comment` and explain
            it in evaluation.md, then finish — do not wait for a reply.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 120
            --permission-mode bypassPermissions

      - name: Evaluate with Codex
        if: matrix.engine == 'codex'
        uses: openai/codex-action@10cb888d2ed3b99867f7e7ccff174a861a75aeb6 # v1
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ matrix.prompt }}
          model: gpt-5.5
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Validate and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
        run: |
          uv run fedcourts validate data
          git config user.name "fedcourts-bot"
          git config user.email "bot@users.noreply.github.com"
          gh auth setup-git
          branch="evaluate/${EVENT_ID}-${EVALUATOR_ID}-${RUN_ID}"
          git checkout -b "$branch"
          git add data/
          if git diff --cached --quiet; then
            echo "::warning::${EVALUATOR_ID} produced no changes for ${EVENT_ID}; skipping PR."
            exit 0
          fi
          git commit -m "evaluate(${EVALUATOR_ID}): ${COURT_ID}/${DOCKET_ID} ${EVENT_ID}"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "evaluate(${EVALUATOR_ID}): ${COURT_ID}/${DOCKET_ID} — ${EVENT_ID}" \
            --body "Automated evaluation by \`${EVALUATOR_ID}\` (run \`${RUN_ID}\`) for event \`${EVENT_ID}\`."
