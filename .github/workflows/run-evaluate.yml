name: run-evaluate

# Triggered by `run:evaluate`. Fans out over every enabled evaluator x resolved
# event and runs the matching coding agent. Each evaluator scores every
# predictor's prediction for the event internally, so predictors are not a
# matrix dimension. The agent only writes files; each cell uploads its output as
# an artifact and the `collect` job aggregates the whole run into one auto-merged
# PR (plus a draft PR for any partial output). Mirrors run-predict.yml.
on:
  issues:
    types: [labeled]

permissions: {}

concurrency:
  group: run-evaluate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.event.label.name == 'run:evaluate'
    runs-on: ubuntu-latest
    environment: runner
    # Corpus-split read side for the matrix scope backstop: the bare-opinion-
    # import exclusion fetches the case's latest snapshot, which under
    # FEDCOURTS_CORPUS_SPLIT=1 lives only in the per-case content store (the
    # ranged-read index carries no snapshots). Unset variable -> '0' -> off.
    env:
      FEDCOURTS_CASESTORE_URL: ${{ vars.CASESTORE_URL }}
      FEDCOURTS_CORPUS_SPLIT: ${{ vars.FEDCOURTS_CORPUS_SPLIT || '0' }}
    permissions:
      contents: read
      id-token: write # assume the AWS role for ranged corpus reads (scope gating)
      issues: write # close the trigger issue when the matrix is empty (nothing in scope)
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      # An issue *form* applies its declared labels on creation regardless of the
      # submitter's permissions, so on a public repo anyone could fire this agent
      # run by filing a form that declares `run:evaluate`. Require the trigger to
      # come from the pipeline App (run-pull files evaluate issues automatically) or
      # a maintainer with write access; deny everyone else. Fail closed otherwise.
      # claude-code-action re-checks the actor before it spends model tokens, but
      # this pre-flight step refuses *before* the downstream `evaluate` job (which
      # `needs: plan`) mints any token, assumes the S3 role, or reads the corpus —
      # matching the deterministic writer (run-pull).
      # (The label name is already checked in the job `if:`.)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-env

      # Only a maintainer-installed App can apply a `run:*` label that triggers a
      # workflow (events from the default GITHUB_TOKEN do not), so a Bot sender is
      # the trusted run-pull handoff; any other actor must hold write access. The
      # decision (and its fail-closed default) lives in the tested `authorize-trigger`
      # command. It refuses *before* the downstream `evaluate` job (which `needs: plan`)
      # mints any token, assumes the S3 role, or reads the corpus. (The label name is
      # already checked in the job `if:`.)
      - name: Authorize the trigger (label from the pipeline App or a maintainer)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SENDER_TYPE: ${{ github.event.sender.type }}
        run: |
          uv run fedcourts authorize-trigger \
            --sender-type "$SENDER_TYPE" --actor "$ACTOR" --repo "$REPO"

      # The scope gate (predict.scope=scotus_docket) reads each case's corpus
      # row (court + exclusion reasons) for the *specific* cases the trigger
      # issue names -- point lookups, not a scan -- so it reads the committed
      # corpus pointer in place over the ranged backend (KBs) instead of
      # pulling the whole index. The cell jobs below use the same backend.
      - uses: ./.github/actions/corpus-ranged
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          corpus-remote-url: ${{ vars.CORPUS_REMOTE_URL }}

      - name: Build evaluator x case x event matrix
        id: plan
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c "import os, pathlib; pathlib.Path('issue-body.md').write_text(os.environ.get('ISSUE_BODY', ''))"
          run_id=$(date -u +%Y%m%dT%H%M%SZ)
          matrix=$(uv run fedcourts evaluate-matrix --body-file issue-body.md --run-id "$run_id")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          if [ "$count" -gt 0 ]; then
            echo "has_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jobs=false" >> "$GITHUB_OUTPUT"
          fi
          # Ops analytics: record the planned fan-out in the Actions UI.
          echo "## run-evaluate — queued ${count} evaluation job(s)" >> "$GITHUB_STEP_SUMMARY"

      # An empty matrix means every queued case was out of scope (or has no scorable
      # outcome): the `evaluate`/`collect` jobs are skipped, so nothing would close the
      # trigger issue. Close it here with a note rather than leave it orphaned open.
      # Uses the ambient GITHUB_TOKEN (closing triggers nothing) — least privilege.
      - name: Close the trigger issue when nothing is in scope
        if: ${{ steps.plan.outputs.has_jobs == 'false' && github.event.issue.number }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # One atomic call: close with the explanatory comment (no commented-but-open state).
          gh issue close "$ISSUE" --repo "$REPO" --comment \
            "No evaluations in scope this run — every queued case was dropped by the scope gate (out of scope, or nothing scorable). Closing; nothing to evaluate."

  evaluate:
    needs: plan
    if: needs.plan.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: runner
    permissions:
      # The cell no longer commits or opens a PR — it only reads the repo and
      # uploads an artifact; the collect job does the git/PR with its own token.
      contents: read
      id-token: write # assume the AWS role for the corpus S3 remote (read-only)
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Mint agent comment token
        id: agent-token
        # Only the Claude step consumes this token (Codex never took one, and
        # Gemini's CLI strips custom env vars from agent shells in CI): don't
        # mint a live credential in cells that cannot use it.
        if: matrix.engine == 'claude-code'
        # Least-privilege token the agent itself uses to comment on the triggering
        # issue/PR. No contents:write — the agent only writes files locally, which
        # ride to the collect job as an artifact; that job (its own token) does the
        # commit/PR, so a prompt injection in docket text cannot push code here.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      # Read-only corpus access (OIDC role; no static keys — a compromised
      # evaluate runner cannot write or delete corpus objects). No pull: the cell
      # queries the immutable corpus blob in place over ranged reads, so the
      # only corpus bytes this job moves are the KBs its lookups touch.
      - uses: ./.github/actions/corpus-ranged
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_READONLY }}
          aws-region: ${{ vars.AWS_REGION }}
          corpus-remote-url: ${{ vars.CORPUS_REMOTE_URL }}

      # Point-in-time snapshots are raw facts in the access-gated corpus, not git:
      # materialize this case's latest snapshot (a ranged point lookup, KB-scale)
      # to the gitignored record/ path the evaluator reads (never committed).
      # Best-effort — a missing snapshot must not abort the run; the agent notes
      # it per prompt.
      - name: Provision the case snapshot from the corpus
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          # Corpus-split read side: under FEDCOURTS_CORPUS_SPLIT=1 (the clean-slate
          # cutover switch; unset variable -> '0' -> off) provisioning defaults to
          # the per-case content store, which needs its URL. Inert while the flag
          # is off -- the corpus/ranged path is unchanged.
          FEDCOURTS_CASESTORE_URL: ${{ vars.CASESTORE_URL }}
          FEDCOURTS_CORPUS_SPLIT: ${{ vars.FEDCOURTS_CORPUS_SPLIT || '0' }}
        run: uv run fedcourts provision-snapshot --court "$COURT_ID" --docket "$DOCKET_ID"

      # A predictable event is a corpus fact, not a committed file. Project it into
      # the event's ledger directory so the evaluation PR carries its event.yaml and
      # the offline `validate` gate can confirm the judgment references a real event
      # without the corpus. Runs before the agent so a genuinely missing event fails
      # the job before any model tokens are spent.
      - name: Materialize the event definition for the ledger
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          # Corpus-split read side: under FEDCOURTS_CORPUS_SPLIT=1 (the clean-slate
          # cutover switch; unset variable -> '0' -> off) provisioning defaults to
          # the per-case content store, which needs its URL. Inert while the flag
          # is off -- the corpus/ranged path is unchanged.
          FEDCOURTS_CASESTORE_URL: ${{ vars.CASESTORE_URL }}
          FEDCOURTS_CORPUS_SPLIT: ${{ vars.FEDCOURTS_CORPUS_SPLIT || '0' }}
        run: uv run fedcourts materialize-event --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"

      # Configure the cell's MCP retrieval from the evaluator registry's
      # tool manifest (config/evaluators.yaml `mcp_servers:`) — evaluators get
      # the same retrieval as predictors so a judge can check a cited authority
      # rather than take it on faith. Same posture as run-predict: the tested
      # `mcp-config` command emits each engine's client format, the
      # CourtListener API token is injected into the workspace-local, gitignored
      # file (never uploaded — the artifact lists status.json + data/), and an
      # unset secret degrades to anonymous rate limits.
      - name: Configure agent retrieval (MCP)
        env:
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          ENGINE: ${{ matrix.engine }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
        run: |
          set -euo pipefail
          case "$ENGINE" in
            claude-code)
              uv run fedcourts mcp-config --engine claude-code \
                --role evaluator --actor "$EVALUATOR_ID" > mcp-servers.json
              ;;
            codex)
              mkdir -p .codex
              uv run fedcourts mcp-config --engine codex \
                --role evaluator --actor "$EVALUATOR_ID" > .codex/config.toml
              ;;
            gemini)
              # Written whole here (telemetry block included): the secret-free
              # npm install step below must not carry the token this step holds.
              # logPrompts:true so tool_call telemetry carries `function_args`,
              # populating retrieval_log.json's query slice (Claude/Codex already
              # capture args). The raw telemetry.log is gitignored and not
              # uploaded; the captured args come from the Gemini agent step, which
              # is token-free (the token rides this config step only to reach the
              # gitignored settings file), and the CLI strips custom env from agent
              # shell commands except the non-secret identifiers allowlisted below,
              # so a captured arg is a query, not a secret. See run-predict.yml for
              # the fuller rationale.
              # security.environmentVariableRedaction.allowed: without it gemini's
              # strict-mode sanitizer (on whenever GITHUB_SHA is set) strips the
              # cell env contract, so `$COURT_ID` expands empty in the agent's
              # shell and it cannot resolve its own cell's paths — the same env
              # contract claude and codex get for free. Keys are `allowed` /
              # `blocked` / `enabled` under `security.environmentVariableRedaction`;
              # a wrong namespace is a silent no-op. Secrets can never be
              # allowlisted (the CLI hard-filters /TOKEN|SECRET|KEY|AUTH|.../i).
              mkdir -p .gemini
              printf '%s\n' '{"telemetry":{"enabled":true,"target":"local","outfile":".gemini/telemetry.log","logPrompts":true},"security":{"environmentVariableRedaction":{"allowed":["COURT_ID","DOCKET_ID","EVENT_ID","PREDICTOR_ID","EVALUATOR_ID","RUN_ID","MODEL_ID","DECIDED_BEFORE"]}}}' > .gemini/settings.json
              uv run fedcourts mcp-config --engine gemini \
                --role evaluator --actor "$EVALUATOR_ID" \
                --base-settings .gemini/settings.json > .gemini/settings.json.new
              mv .gemini/settings.json.new .gemini/settings.json
              ;;
          esac

      - name: Evaluate with Claude Code
        id: evaluate_claude
        if: matrix.engine == 'claude-code'
        # Bound the agent below the job timeout so a runaway run trips this *step*
        # (leaving the finalize step to salvage its work) instead of the job-level
        # timeout, which would cancel the runner and discard everything.
        timeout-minutes: 50
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          MODEL_ID: ${{ matrix.model }}
        with:
          # run-pull files this evaluate issue as the trusted pipeline App
          # (`fedcourtsai-data[bot]`), already approved by the plan job's
          # authorize-trigger gate. claude-code-action refuses a bot actor by
          # default, so allow exactly that one bot (never `*`) or the automated
          # handoff never reaches the agent.
          allowed_bots: "fedcourtsai-data[bot]"
          # Auth is the Anthropic API key (pay-per-token): automated pipeline
          # inference is API-metered by design (see docs/budget.md), and per
          # Anthropic policy the Max subscription OAuth token is for interactive
          # Claude Code / claude.ai, not CI. For a local/interactive fallback,
          # swap this for `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.agent-token.outputs.token }}
          # Prompt caching is automatic: the stable prefix (AGENTS.md + the
          # prompt template + schema) is cached across the run's tool-use turns.
          # The API key's default cache TTL is only 5 minutes, which would expire
          # mid-run, so ENABLE_PROMPT_CACHING_1H below pins the 1-hour TTL (and the
          # cache-read discount priced in fedcourtsai.pricing).
          settings: |
            {
              "env": {
                "ENABLE_PROMPT_CACHING_1H": "1"
              }
            }
          # The kickoff prompt is identical across the three engines and carries
          # the cell identifiers inline: some engines sanitize the shell
          # environment in CI (Gemini strips every custom env var), so the
          # prompt text — not the env — is the contract's delivery channel.
          prompt: |
            Read ${{ matrix.prompt }} and AGENTS.md, then score every predictor's
            prediction for this cell against its outcome.json:

            COURT_ID=${{ matrix.court }}
            DOCKET_ID=${{ matrix.docket }}
            EVENT_ID=${{ matrix.event_id }}
            EVALUATOR_ID=${{ matrix.evaluator_id }}
            RUN_ID=${{ matrix.run_id }}
            MODEL_ID=${{ matrix.model }}

            These values are authoritative; the same identifiers are exported as
            environment variables on engines that pass them through, but if
            `$COURT_ID` expands empty in your shell, use the literals above.
            Write only the output files the prompt contract names for your cell.
            Do not commit, push, or open a PR — the workflow handles git. You run
            headless with no interactive input; if you are blocked, record it in
            flags.json and explain it in evaluation.md, then finish — do not wait
            for a reply. (A brief `gh issue comment` on the triggering issue
            (#${{ github.event.issue.number }}) is a welcome extra where your
            engine has GitHub access.)
          # The model comes from the plan job's matrix (registry override or the
          # engine's predict/evaluate default in fedcourtsai.pricing) — repo
          # config, not user input.
          claude_args: |
            --model ${{ matrix.model }}
            --max-turns 120
            --permission-mode bypassPermissions
            --mcp-config mcp-servers.json

      - name: Evaluate with Codex
        id: evaluate_codex
        if: matrix.engine == 'codex'
        # Same buffer as the Claude step: trip this step, not the job, on overrun.
        timeout-minutes: 50
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          MODEL_ID: ${{ matrix.model }}
          # Pin the session log to a known dir so the usage-capture step can read it.
          CODEX_HOME: ${{ github.workspace }}/.codex
        with:
          # As with the Claude step: let the trusted run-pull bot handoff
          # (`fedcourtsai-data[bot]`, already authorized by the plan job) past
          # codex-action's write-access check, which a bot installation fails.
          allow-bot-users: "fedcourtsai-data[bot]"
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # The same kickoff prompt as the Claude and Gemini steps (identifiers
          # inline — the engines' methodology stays comparable, and the contract
          # never depends on env passthrough); the agent reads the template
          # itself, as the other engines do.
          prompt: |
            Read ${{ matrix.prompt }} and AGENTS.md, then score every predictor's
            prediction for this cell against its outcome.json:

            COURT_ID=${{ matrix.court }}
            DOCKET_ID=${{ matrix.docket }}
            EVENT_ID=${{ matrix.event_id }}
            EVALUATOR_ID=${{ matrix.evaluator_id }}
            RUN_ID=${{ matrix.run_id }}
            MODEL_ID=${{ matrix.model }}

            These values are authoritative; the same identifiers are exported as
            environment variables on engines that pass them through, but if
            `$COURT_ID` expands empty in your shell, use the literals above.
            Write only the output files the prompt contract names for your cell.
            Do not commit, push, or open a PR — the workflow handles git. You run
            headless with no interactive input; if you are blocked, record it in
            flags.json and explain it in evaluation.md, then finish — do not wait
            for a reply. (A brief `gh issue comment` on the triggering issue
            (#${{ github.event.issue.number }}) is a welcome extra where your
            engine has GitHub access.)
          model: ${{ matrix.model }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo

      # Install the Gemini CLI in its own SECRET-FREE step: only the top-level
      # version is exactly pinned (transitive dependencies resolve fresh at every
      # install), so npm lifecycle scripts must never see credentials —
      # --ignore-scripts skips them outright (verified: the CLI needs none) and
      # this step's env carries nothing. The workspace settings file is written
      # here too; its telemetry log feeds the usage-capture step.
      - name: Install the Gemini CLI
        if: matrix.engine == 'gemini'
        # zizmor: ignore[adhoc-packages] — top-level exact-version pin, scripts
        # disabled, and a secret-free environment are the practical controls for
        # a single global CLI; a lockfile is not expressible for `npm i -g`.
        run: |
          set -euo pipefail
          npm install --silent --no-audit --ignore-scripts --global @google/gemini-cli@0.49.0
          gemini --version
          # .gemini/settings.json (telemetry + mcpServers) is written by the
          # "Configure agent retrieval" step above: it needs the CourtListener token in
          # its env, and this npm step must stay secret-free.

      # Gemini runs through its CLI directly, not the upstream run-gemini-cli
      # action: that action internally `uses:` unpinned actions
      # (google-github-actions/auth@v3, actions/upload-artifact@v6), which the
      # org's require-SHA-pinning policy rejects at job setup — and because
      # action resolution happens before `if:` gating, its mere presence failed
      # every cell in the job, claude and codex included. The CLI invocation
      # reproduces what the action ran: an exact-version npm install, env-var
      # auth, the same workspace settings file (telemetry preserved for the
      # usage-capture step), and the same headless `--yolo` prompt call.
      - name: Evaluate with Gemini
        id: evaluate_gemini
        if: matrix.engine == 'gemini'
        # Same buffer as the Claude step: trip this step, not the job, on overrun.
        timeout-minutes: 50
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          MODEL_ID: ${{ matrix.model }}
          # No GITHUB_TOKEN here: the Gemini CLI (0.49.0's environment
          # sanitization runs in strict mode whenever GITHUB_SHA is present)
          # strips every custom env var from the agent's shell commands in CI,
          # so a comment token could never be used — flags.json is this
          # engine's blocked-channel. Re-check on a CLI version bump.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Headless runs need the workspace trusted explicitly (the CLI exits 55
          # otherwise); the runner workspace is a fresh clone of this repo.
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          # The same kickoff prompt as the Claude and Codex steps: the inline
          # identifiers are what the agent works from, because the env vars
          # above never survive the CLI's shell sanitization.
          PROMPT: |
            Read ${{ matrix.prompt }} and AGENTS.md, then score every predictor's
            prediction for this cell against its outcome.json:

            COURT_ID=${{ matrix.court }}
            DOCKET_ID=${{ matrix.docket }}
            EVENT_ID=${{ matrix.event_id }}
            EVALUATOR_ID=${{ matrix.evaluator_id }}
            RUN_ID=${{ matrix.run_id }}
            MODEL_ID=${{ matrix.model }}

            These values are authoritative; the same identifiers are exported as
            environment variables on engines that pass them through, but if
            `$COURT_ID` expands empty in your shell, use the literals above.
            Write only the output files the prompt contract names for your cell.
            Do not commit, push, or open a PR — the workflow handles git. You run
            headless with no interactive input; if you are blocked, record it in
            flags.json and explain it in evaluation.md, then finish — do not wait
            for a reply. (A brief `gh issue comment` on the triggering issue
            (#${{ github.event.issue.number }}) is a welcome extra where your
            engine has GitHub access.)
        run: |
          set -euo pipefail
          gemini --yolo --model "$MODEL_ID" --prompt "$PROMPT" --output-format json

      # Record measured token usage + estimated cost next to the evaluation so a
      # maintainer can sum it into a real $/run (docs/budget.md). Best-effort: the
      # engine logs are read here, never the agent's word, and a miss must not
      # fail the evaluation — hence continue-on-error.
      - name: Capture model usage
        if: steps.evaluate_claude.conclusion == 'success' || steps.evaluate_codex.conclusion == 'success' || steps.evaluate_gemini.conclusion == 'success'
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          ENGINE: ${{ matrix.engine }}
          MODEL: ${{ matrix.model }}
          CLAUDE_EXECUTION_FILE: ${{ steps.evaluate_claude.outputs.execution_file }}
          CODEX_HOME: ${{ github.workspace }}/.codex
          GEMINI_TELEMETRY_FILE: ${{ github.workspace }}/.gemini/telemetry.log
        run: |
          args=(record-usage
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"
            --run-id "$RUN_ID" --engine "$ENGINE"
            --role evaluator --actor "$EVALUATOR_ID")
          if [ -n "$MODEL" ]; then args+=(--model "$MODEL"); fi
          if [ "$ENGINE" = "claude-code" ]; then
            args+=(--claude-execution-file "$CLAUDE_EXECUTION_FILE")
          elif [ "$ENGINE" = "gemini" ]; then
            args+=(--gemini-telemetry-file "$GEMINI_TELEMETRY_FILE")
          else
            args+=(--codex-sessions-dir "$CODEX_HOME/sessions")
          fi
          # Surface the measured tokens + estimated $ in the Actions UI. The
          # command already prints `usage: <actor> <N> tok ~$<cost> -> <path>`; keep
          # all but the path. A miss just warns (best-effort, like the step itself).
          if out=$(uv run fedcourts "${args[@]}"); then
            echo "$out"
            {
              echo "## evaluate usage — ${COURT_ID}/${DOCKET_ID} ${EVENT_ID} (${ENGINE})"
              echo "${out%% -> *}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no model usage captured for ${EVENT_ID}"
          fi

      # Harvest the cell's tool-call transcript to retrieval_log.json —
      # from the engine's own log, never the agent's word — the same posture as
      # run-predict. Runs even when the agent failed (a partial transcript is
      # still evidence); best-effort, so a parse miss warns rather than fails.
      - name: Capture retrieval log
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          ENGINE: ${{ matrix.engine }}
          CLAUDE_EXECUTION_FILE: ${{ steps.evaluate_claude.outputs.execution_file }}
          CODEX_HOME: ${{ github.workspace }}/.codex
          GEMINI_TELEMETRY_FILE: ${{ github.workspace }}/.gemini/telemetry.log
        run: |
          set -euo pipefail
          args=(record-retrieval
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID"
            --run-id "$RUN_ID" --engine "$ENGINE"
            --role evaluator --actor "$EVALUATOR_ID")
          if [ "$ENGINE" = "claude-code" ] && [ -n "$CLAUDE_EXECUTION_FILE" ]; then
            args+=(--claude-execution-file "$CLAUDE_EXECUTION_FILE")
          elif [ "$ENGINE" = "gemini" ]; then
            args+=(--gemini-telemetry-file "$GEMINI_TELEMETRY_FILE")
          elif [ "$ENGINE" = "codex" ]; then
            args+=(--codex-sessions-dir "$CODEX_HOME/sessions")
          fi
          uv run fedcourts "${args[@]}" \
            || echo "::warning::no retrieval log captured for ${EVENT_ID}"

      # Finalize even when the agent step failed or timed out (`!cancelled()`), so a
      # run stopped by max-turns or the step timeout still hands its partial output
      # to a maintainer instead of vanishing with the runner.
      # The cell no longer opens a PR. Even when the agent failed or timed out
      # (`!cancelled()`), record what it produced and hand its output to the
      # collect job; that job aggregates the whole run into one PR. The decisions
      # (produced? validated?) use the same tested commands the old finalize step
      # did — this step only records them into a status file the collect job reads.
      - name: Record cell status
        if: ${{ !cancelled() }}
        env:
          COURT_ID: ${{ matrix.court }}
          DOCKET_ID: ${{ matrix.docket }}
          EVENT_ID: ${{ matrix.event_id }}
          EVALUATOR_ID: ${{ matrix.evaluator_id }}
          RUN_ID: ${{ matrix.run_id }}
          # Did the agent finish cleanly? On max-turns or a step timeout the engine
          # step fails; its partial output still rides to the collect job, which
          # routes it to a draft PR a maintainer completes — never the ready one.
          AGENT_OK: ${{ (matrix.engine == 'claude-code' && steps.evaluate_claude.outcome == 'success') || (matrix.engine == 'codex' && steps.evaluate_codex.outcome == 'success') || (matrix.engine == 'gemini' && steps.evaluate_gemini.outcome == 'success') }}
        run: |
          set -euo pipefail
          # The event.yaml is materialized before the agent runs, so a staged change
          # is not proof of an evaluation. `finalize-produced` checks for this
          # evaluator's own evaluation.json; only a produced cell is validated, and
          # the collect job commits only produced cells (a no-output cell is warned).
          produced=$(uv run fedcourts finalize-produced --role evaluate \
            --court "$COURT_ID" --docket "$DOCKET_ID" --event "$EVENT_ID" \
            --actor "$EVALUATOR_ID" --run-id "$RUN_ID")
          validated=false
          if [ "$produced" = "true" ] && uv run fedcourts validate data; then
            validated=true
          fi
          jq -n \
            --arg court "$COURT_ID" --argjson docket "$DOCKET_ID" \
            --arg event_id "$EVENT_ID" --arg actor "$EVALUATOR_ID" --arg run_id "$RUN_ID" \
            --argjson produced "$produced" --argjson validated "$validated" \
            --argjson agent_ok "$AGENT_OK" \
            '{court:$court,docket:$docket,event_id:$event_id,actor:$actor,run_id:$run_id,produced:$produced,validated:$validated,agent_ok:$agent_ok}' \
            > status.json

      # One artifact per cell: its status.json plus its data/ subtree. The name is
      # unique per evaluator x case x event so concurrent cells never collide, and
      # the collect job keys the download on the `evaluate-` prefix.
      - name: Upload cell output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evaluate-${{ matrix.evaluator_id }}-${{ matrix.court }}-${{ matrix.docket }}-${{ matrix.event_id }}
          path: |
            status.json
            data
          if-no-files-found: error
          retention-days: 7

  collect:
    needs: [plan, evaluate]
    # Run after the whole fan-out even if some cells failed, as long as the plan
    # queued jobs. This is the only writer: it unions the cells' artifacts into one
    # PR per run (auto-merged when green) plus, if any cell left salvageable
    # partial output, one draft PR a maintainer finishes.
    if: ${{ always() && needs.plan.outputs.has_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: runner
    permissions:
      contents: write # commit the run's evaluations to a branch
      pull-requests: write # open the run PR and enable auto-merge
      issues: write # GITHUB_TOKEN posts flags to the agent-feedback issue (not the App token)
    steps:
      # The collect job opens the PR with the dev App token. The dev App is *not* a
      # branch-protection bypass actor (see docs/security.md), so its auto-merge is
      # bound by the required `gate` + `paths` checks rather than skipping them.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Configure git identity
        uses: ./.github/actions/configure-git-identity
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}

      - name: Download cell artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cell-artifacts
          pattern: evaluate-*

      - name: Aggregate the run into one PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh auth setup-git
          # Every cell was cancelled before it could upload — nothing to collect.
          run_url="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          if [ ! -d cell-artifacts ] || [ -z "$(ls -A cell-artifacts)" ]; then
            # Wholesale failure: no cell delivered anything. Render the tested
            # stall comment for the trigger issue so the run's silence is loud
            # there; the next step posts it with the ambient token.
            echo "::warning::no cell artifacts to collect"
            uv run fedcourts stall-comment --role evaluate --run-url "$run_url" > stall-comment.md
            exit 0
          fi
          # All cells share the plan's run id; read it off any status file. Search
          # recursively, matching collect-plan: the download nests each cell in its
          # own directory only when several artifacts match, while a single-cell
          # run extracts flat into cell-artifacts/ itself.
          run_id=$(find cell-artifacts -name status.json -exec jq -r '.run_id' {} + | head -n1)
          # The ready/draft partition, branch names, and PR prose are computed by the
          # tested `collect-plan`; this step only runs git and gh. The ready PR
          # closes the triggering issue on merge (unless a draft still has work).
          plan=$(uv run fedcourts collect-plan --role evaluate --run-id "$run_id" \
            --status-dir cell-artifacts --issue "$ISSUE")
          # Surface this run's agent flags in the Actions summary so they are seen
          # even when no PR opens (e.g. every cell was blocked). They also ride in
          # the ready/draft PR body, and each produced cell's flags.json is committed.
          flags=$(jq -r '.flags' <<<"$plan")
          if [ -n "$flags" ] && [ "$flags" != "null" ]; then
            printf '%s\n' "$flags" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Roll this run's agent flags to a file for the next step to latch onto the
          # long-lived agent-feedback issue. That step posts with the ambient
          # GITHUB_TOKEN rather than this job's contents-write App token (least
          # privilege — see the step's comment). `feedback_comment` (rendered by
          # collect-plan) is empty when the run raised no flags, so the file is too.
          feedback=$(jq -r '.feedback_comment' <<<"$plan")
          if [ -n "$feedback" ] && [ "$feedback" != "null" ]; then
            printf '%s\n' "$feedback" > feedback-comment.md
          fi
          # Never silently drop a cell: warn for each that produced no output.
          jq -r '.skipped[] | "::warning::no evaluation for \(.actor) on \(.court)/\(.docket) \(.event_id)"' <<<"$plan"
          if [ "$(jq -r '.stalled' <<<"$plan")" = "true" ]; then
            # Artifacts arrived but no cell produced output and no agent finished
            # cleanly (the tested `stalled` signal) — same stall, same comment.
            uv run fedcourts stall-comment --role evaluate --run-url "$run_url" > stall-comment.md
          fi
          for kind in ready partial; do
            pr=$(jq -c ".${kind}" <<<"$plan")
            [ "$pr" = "null" ] && continue
            git checkout -q main
            branch=$(jq -r '.branch' <<<"$pr")
            git checkout -q -b "$branch"
            # Union each member cell's data/ subtree onto the clean main checkout.
            # Cells write disjoint paths, so the union is conflict-free.
            while IFS= read -r dir; do
              cp -a "cell-artifacts/${dir}/data/." data/
            done < <(jq -r '.artifact_dirs[]' <<<"$pr")
            git add data/
            draft=$(jq -r '.draft' <<<"$pr")
            auto=true
            # Enforce the append-only data/ jail and a final schema check here,
            # producer-side. Either failing downgrades the PR to a draft for review
            # instead of auto-merging something unexpected (CI re-checks the jail).
            git diff --cached --name-status > changes.txt
            if ! uv run fedcourts assert-paths --name-status-file changes.txt; then
              draft=true; auto=false; echo "::warning::path jail tripped; opening ${branch} as a draft"
            fi
            if ! uv run fedcourts validate data; then
              draft=true; auto=false; echo "::warning::validation failed; opening ${branch} as a draft"
            fi
            git commit -q -m "$(jq -r '.commit_message' <<<"$pr")"
            # Push with the app (write) token explicitly; blank any ambient
            # extraheader at command scope so the write token authenticates.
            git -c http.extraHeader= -c "http.https://github.com/.extraHeader=" \
              push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
              "HEAD:refs/heads/${branch}"
            jq -r '.body' <<<"$pr" > pr-body.md
            flags=()
            [ "$draft" = "true" ] && flags+=(--draft)
            url=$(gh pr create --base main --head "$branch" "${flags[@]}" \
              --title "$(jq -r '.title' <<<"$pr")" --body-file pr-body.md)
            # Enable auto-merge only for a ready (non-draft, jail-clean) PR. A miss
            # (e.g. the repo's "Allow auto-merge" is off) leaves the PR open for a
            # manual merge rather than failing the run.
            if [ "$draft" != "true" ] && [ "$auto" = "true" ]; then
              gh pr merge --auto --squash "$url" \
                || echo "::warning::could not enable auto-merge on ${url}"
            fi
          done

      - name: Flag a stalled run on the trigger issue
        # A run that produced no output opens no PR, so nothing would close — or
        # even mention — the trigger issue; it would sit silently orphaned open.
        # Post the tested stall comment (rendered by the aggregate step) with the
        # ambient GITHUB_TOKEN: commenting triggers nothing, so the contents-write
        # App token stays out of it. Runs even if the aggregate step failed; the
        # file is absent whenever the run produced output.
        if: ${{ always() && github.event.issue.number }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          [ -s stall-comment.md ] || exit 0
          gh issue comment "$ISSUE" --repo "$REPO" --body-file stall-comment.md

      - name: Latch run flags onto the agent-feedback issue
        # Post with the ambient GITHUB_TOKEN (job-scoped `issues: write`), NOT the dev
        # App token: latching needs no cross-workflow trigger (`agent-feedback` is a
        # non-triggering label), so issue-write stays off this job's contents-write
        # token. The find-or-create and once-only idempotency are the tested
        # `post-agent-feedback` command (agent_feedback.py); this only invokes it.
        # Runs even if the aggregate step failed, so a fully-failed run still leaves a
        # note. The file is empty/absent when the run raised no flags.
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          [ -s feedback-comment.md ] || exit 0
          uv run fedcourts post-agent-feedback --repo "$REPO" --body-file feedback-comment.md
