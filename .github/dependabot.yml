version: 2
updates:
  # Keep the workflow action pins (full SHAs) fresh; zizmor requires pinning, so
  # Dependabot is how we get security/version bumps. Covers .github/workflows and
  # the composite action under .github/actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Python dependencies, resolved from pyproject.toml + uv.lock.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
