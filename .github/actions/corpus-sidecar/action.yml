name: Corpus query sidecar
description: >-
  Assume the read-only AWS role via OIDC with the credentials scoped to this
  action's own steps — never the job env — and launch `fedcourts corpus-serve`
  as a background localhost service that holds them. Later steps reach the
  corpus through the sidecar via the non-secret FEDCOURTS_CORPUS_SERVICE_URL
  (the `service` backend), so an agent step's shell carries no cloud
  credential at all; the deterministic pre-agent steps that still read S3
  directly (provisioning) take the credentials from this action's outputs as
  step-scoped env. The cell-job successor to `corpus-ranged`, which the
  agentless plan jobs keep (job-wide credentials are fine where no agent
  runs). The calling job must grant `id-token: write` and run in the `runner`
  environment so the role and remote variables are available to pass in.

inputs:
  role-to-assume:
    description: The read-only AWS role ARN (pass vars.AWS_ROLE_TO_ASSUME_READONLY).
    required: true
  aws-region:
    description: AWS region for the role/remote (pass vars.AWS_REGION).
    required: true
  corpus-remote-url:
    description: >-
      The corpus remote's bucket URL (pass vars.CORPUS_REMOTE_URL).
    required: true

outputs:
  aws-access-key-id:
    description: >-
      Read-only credential for the caller's deterministic pre-agent steps,
      passed as step-scoped env — never job-wide, never on an agent step.
    value: ${{ steps.creds.outputs.aws-access-key-id }}
  aws-secret-access-key:
    description: Step-scoped counterpart secret (masked by the credentials action).
    value: ${{ steps.creds.outputs.aws-secret-access-key }}
  aws-session-token:
    description: Step-scoped session token (masked by the credentials action).
    value: ${{ steps.creds.outputs.aws-session-token }}

runs:
  using: composite
  steps:
    # output-credentials + output-env-credentials=false is the crux: the
    # assumed role's credentials become masked step *outputs* and nothing —
    # not even AWS_REGION — lands in the job env, so the agent steps that run
    # later in this job inherit no credential.
    - name: Assume the read-only role (step outputs only, never the job env)
      id: creds
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
        output-credentials: true
        output-env-credentials: false

    - name: Launch the corpus query sidecar
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ steps.creds.outputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ steps.creds.outputs.aws-secret-access-key }}
        AWS_SESSION_TOKEN: ${{ steps.creds.outputs.aws-session-token }}
        AWS_REGION: ${{ inputs.aws-region }}
        CORPUS_REMOTE_URL: ${{ inputs.corpus-remote-url }}
      run: |
        set -euo pipefail
        # The background sidecar inherits the credentials from THIS step's
        # env and serves ranged corpus queries over localhost for the rest of
        # the job (the runner reaps it at job end). Only the non-secret
        # localhost URL goes job-wide.
        nohup uv run fedcourts corpus-serve --corpus-backend ranged \
          --host 127.0.0.1 --port 8377 > corpus-sidecar.log 2>&1 &
        echo "$!" > corpus-sidecar.pid
        # The port here, in the launch line above, and in the health check
        # below must stay in lockstep (a literal, not an expansion — an
        # env-file write with expansion trips the workflow linter).
        echo "FEDCOURTS_CORPUS_SERVICE_URL=http://127.0.0.1:8377" >> "$GITHUB_ENV"

    - name: Wait for the sidecar to become healthy
      shell: bash
      run: |
        set -euo pipefail
        # /healthz opens the corpus connection, so green here proves the
        # ranged read genuinely works — and it fails the job before any model
        # token is spent, the same posture as an OIDC failure today. A dead
        # sidecar process fails fast instead of waiting out the loop.
        for _ in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:8377/healthz >/dev/null 2>&1; then
            exit 0
          fi
          if ! kill -0 "$(cat corpus-sidecar.pid)" 2>/dev/null; then
            echo "::error::corpus sidecar process died during startup"
            break
          fi
          sleep 1
        done
        echo "::error::corpus sidecar failed to become healthy"
        tail -n 50 corpus-sidecar.log || true
        exit 1
