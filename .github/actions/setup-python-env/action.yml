name: Setup Python env
description: Install uv (with cache) and sync the project's dependencies into .venv.

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
    - name: Sync dependencies
      shell: bash
      run: uv sync
