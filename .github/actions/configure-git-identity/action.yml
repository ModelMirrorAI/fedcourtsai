name: Configure git identity
description: >
  Set the local git committer identity to the GitHub App's bot user so commits
  and PRs the workflow pushes are attributed to the app (fedcourtsai[bot]) rather
  than a generic bot. Resolves the bot's numeric user id from its login so the
  noreply email matches the form GitHub uses to link a commit to the bot account.

inputs:
  token:
    description: >
      An installation token minted by actions/create-github-app-token, used to
      read the bot user's id.
    required: true
  app-slug:
    description: >
      The `app-slug` output of actions/create-github-app-token. The bot's login
      is `<app-slug>[bot]`.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        APP_SLUG: ${{ inputs.app-slug }}
      run: |
        set -euo pipefail
        # GitHub links a commit to the App's bot account (showing its avatar and a
        # bot badge) only when the committer email is
        # `<numeric-user-id>+<login>@users.noreply.github.com`, so resolve the bot's
        # id from its login rather than hard-coding it. --global persists the
        # identity to every later step in the job.
        login="${APP_SLUG}[bot]"
        user_id=$(gh api "/users/${login}" --jq .id)
        git config --global user.name "$login"
        git config --global user.email "${user_id}+${login}@users.noreply.github.com"
