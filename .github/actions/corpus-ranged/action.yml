name: Ranged corpus access
description: >-
  Assume the read-only AWS role via OIDC and point the corpus read seam at the
  ranged backend: every later step in the job (including the agent) queries the
  immutable corpus blob in place on the corpus remote via HTTP range requests —
  no full-blob pull, per-query egress in KBs. The slim cell-job successor to
  `corpus-readonly`, which scan-heavy consumers (the plan jobs, analytics, the
  metrics refresh) keep for their full pulls. The calling job must grant
  `id-token: write` and run in the `runner` environment so the role and remote
  variables are available to pass in.

inputs:
  role-to-assume:
    description: The read-only AWS role ARN (pass vars.AWS_ROLE_TO_ASSUME_READONLY).
    required: true
  aws-region:
    description: AWS region for the role/remote (pass vars.AWS_REGION).
    required: true
  dvc-remote-url:
    description: >-
      The corpus remote's bucket URL (pass vars.DVC_REMOTE_URL). The input
      keeps the repo variable's legacy name until the variable itself is
      renamed to CORPUS_REMOTE_URL.
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (corpus S3 remote, read-only)
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
    - name: Select the ranged corpus backend
      shell: bash
      env:
        CORPUS_REMOTE_URL: ${{ inputs.dvc-remote-url }}
      run: |
        set -euo pipefail
        # Job-wide env for every later step: the read seam resolves the
        # committed corpus pointer against the remote URL and serves reads via
        # ranged GETs (see "The ranged read backend" in docs/data-pipeline.md).
        # Exported under BOTH names during the variable-rename transition:
        # CORPUS_REMOTE_URL is the preferred name; DVC_REMOTE_URL keeps any
        # tooling pinned to the legacy name working and goes away with the
        # rename. The heredoc form keeps the write line-safe: a multiline
        # value cannot smuggle extra NAME=value pairs into the job env.
        {
          echo "FEDCOURTS_CORPUS_BACKEND=ranged"
          echo "CORPUS_REMOTE_URL<<__FEDCOURTS_EOF__"
          echo "$CORPUS_REMOTE_URL"
          echo "__FEDCOURTS_EOF__"
          echo "DVC_REMOTE_URL<<__FEDCOURTS_EOF__"
          echo "$CORPUS_REMOTE_URL"
          echo "__FEDCOURTS_EOF__"
        } >> "$GITHUB_ENV"
