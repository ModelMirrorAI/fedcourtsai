name: Read-only corpus access
description: >-
  Assume the read-only AWS role via OIDC and optionally pull the packed corpus
  from the S3 remote (`fedcourts corpus-pull`: boto3 credentials from the
  environment, checksum-verified against the committed pointer — no remote
  config file is written). The shared first half of every corpus *consumer*
  job — the plan jobs of the agent fan-outs, analytics, and the metrics
  refresh. Corpus *writers* (run-pull's jobs) assume the read-write role and
  keep their own wiring. The calling job must run setup-python-env BEFORE this
  composite (corpus-pull runs from the synced environment), grant
  `id-token: write`, and run in the `runner` environment so the role and
  remote variables are available to pass in.

inputs:
  role-to-assume:
    description: The read-only AWS role ARN (pass vars.AWS_ROLE_TO_ASSUME_READONLY).
    required: true
  aws-region:
    description: AWS region for the role/remote (pass vars.AWS_REGION).
    required: true
  dvc-remote-url:
    description: >-
      The corpus remote's bucket URL (pass vars.DVC_REMOTE_URL). The input
      keeps the repo variable's legacy name until the variable itself is
      renamed to CORPUS_REMOTE_URL; it is passed to the CLI under the new
      name either way, and the CLI accepts both.
    required: true
  missing-pointer:
    description: >-
      What to do when no corpus pointer is committed in the checkout: "fail"
      the job, or "warn" and skip the pull (for jobs that degrade gracefully
      without the corpus).
    required: false
    default: "fail"

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (corpus S3 remote, read-only)
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
    - name: Pull the corpus
      shell: bash
      env:
        CORPUS_REMOTE_URL: ${{ inputs.dvc-remote-url }}
        MISSING_POINTER: ${{ inputs.missing-pointer }}
      run: |
        set -euo pipefail
        # corpus-pull resolves the committed pointer (corpus/corpus.db.ref)
        # against the remote URL and verifies the blob's checksum + size
        # before it lands.
        uv run fedcourts corpus-pull --missing-pointer "$MISSING_POINTER"
