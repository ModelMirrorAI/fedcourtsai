# Public forms: bug reports and feature/ideas. Data-production runs (pull /
# reconcile) are NOT public forms — a maintainer triggers them by applying a
# `run:*` label to an issue, which is the pipeline's trust boundary. Blank issues
# stay enabled so maintainers can file dev/backlog/ops issues and label them.
blank_issues_enabled: true
contact_links:
  - name: "Pipeline & data design"
    url: "https://github.com/ModelMirrorAI/fedcourtsai/blob/main/docs/data-pipeline.md"
    about: "How the ingestion channels work — read before opening a data issue."
  - name: "Repository conventions (AGENTS.md)"
    url: "https://github.com/ModelMirrorAI/fedcourtsai/blob/main/AGENTS.md"
    about: "Branch-and-PR workflow, the local gate, and the data contract."
