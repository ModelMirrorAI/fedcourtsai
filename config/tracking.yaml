# Global tracking settings for the pull (refresh), live, historical, and predict
# channels. See docs/data-pipeline.md for the full design. These keys are the
# contract the run-pull workflow reads; treat them as the single place to tune
# scope and the CourtListener API budget.

# pull = targeted CourtListener enrichment from the rate-limited REST API. Owns
# the API budget. The supremecourt.gov live channel owns SCOTUS freshness;
# pull's budget goes to keeping the tracked set's CourtListener records
# current.
# The per-request rate limits the client throttles to are NOT set here: they live
# in the runner env (FEDCOURTS_COURTLISTENER_RPM/_RPH/_RPD, wired from repo
# variables to the active Free Law Project tier — see docs/budget.md). The caps
# below bound how much work each run and each day does within that envelope.
pull:
  # Max dockets refreshed per run (~3 requests each). On Tier 2 (15/150/600) with
  # four daily windows this gives ~120 refreshes/day: 30×3=90 requests/run stays
  # under the 150/hr ceiling, and 4 runs stay under the 600/day ceiling.
  max_cases_per_run: 30
  # Refresh order: stalest first, so a large active set rotates within budget.
  rotation: oldest_last_pulled_first
  # Don't spend budget re-fetching closed / resolved cases.
  skip_closed: true
  # Reserve up to this many of each run's slots for the stalest SCOTUS dockets
  # (the prediction scope), so the in-scope set rotates ahead of the much larger
  # general active set and new docket activity is caught before a case resolves.
  # Unused slots fall through to the normal rotation, so it never wastes budget —
  # a large reserve is safe: it only bites when the SCOTUS-open pool is big
  # enough to fill it, which is exactly when prediction should get priority.
  eligible_refresh_reserve: 20
  # Discover newly-filed dockets in the tracked courts since the last run.
  # OFF: the live channel's frontier probing onboards newly filed SCOTUS
  # petitions (fresher, budget-free), and circuit discovery onboarded cases
  # outside the prediction scope. Its budget slice returns to
  # the enrichment rotation. Flip back on if the live channel is ever paused.
  discover_new_filings: false
  # Hard cap on new dockets onboarded per discovery run (its own slice of the
  # budget, separate from max_cases_per_run above).
  max_new_cases_per_run: 10
  # Wall-clock budget for one pull-all run, minutes — checked between cases (and
  # between courts during discovery), sized well under the workflow's job
  # timeout. On expiry the run stops, defers the rest of the rotation to the
  # next window, and still writes its queues and corpus updates — a degraded
  # upstream degrades the run instead of hanging it into the CI timeout and
  # losing the whole window's work.
  max_run_minutes: 25
  # Stop the refresh rotation after this many consecutive transient REST
  # failures (timeouts / 5xx / 429): the upstream is degraded and each doomed
  # case burns a full retry cycle of budget and minutes. Deterministic per-case
  # errors (e.g. a 404) never trip it; deferred cases keep their stalest-first
  # position, so the next window retries them.
  max_consecutive_transient_failures: 5
  # Only trigger run-predict when a pull detects new docket activity.
  predict_on_change_only: true

# live = the SCOTUS live channel: supremecourt.gov per-docket JSON. Owns
# SCOTUS freshness. No API budget — these caps bound per-cycle wall clock and
# upstream politeness (~1 req/s), not spend.
live:
  # Pending petitions re-polled per cycle (recent Terms first, then stalest).
  # Sized to re-poll the whole pending watchlist each cycle even at its seasonal
  # peak — the September long conference distributes ~276 petitions at once
  # (regular conferences run a median ~11, p90 ~37). This is a coverage ceiling,
  # not the wall-clock bound: a re-poll that catches a distribution transition
  # also fetches up to two document PDFs, and those cluster exactly at that peak,
  # so cycle time is governed by the run-pull live job's `--max-run-seconds` soft
  # budget (which commits progress and resumes next cycle), not by this count.
  # The poller only fetches what is actually pending, so off-peak cycles stay
  # small; a high ceiling just stops the rotation from truncating coverage.
  max_cases_per_run: 300
  # New petitions onboarded from the Term's numbering frontier per cycle
  # (sequential probing: paid from <term>-1, IFP from <term>-5001). Sized to
  # absorb the long-conference onboarding burst within a day (~276 over ~4
  # cycles) rather than trickling it over a week at the old cap; the same soft
  # budget bounds the onboarding provisioning cost per cycle.
  max_new_cases_per_run: 100
  # Oldest October Term the refresh rotation reaches — the reachability probe's
  # floor (docs/live-sources.md): full JSON coverage OT2017+.
  term_floor_year: 2017
  # Seconds between requests (polite-client pacing; browser UA is built in).
  throttle_seconds: 1.0
  # Consecutive 404s that mark a numbering stream's current frontier.
  frontier_misses: 2
  # Per-document cap on extracted text stored in the corpus: ~40 dense
  # pages. Documents (petition, questions presented, BIO) are fetched on the
  # same distribution transition that queues predict; the cap bounds corpus
  # blob growth, and a truncated document is flagged in its provisioning manifest.
  document_text_cap: 150000
  # Predict timing is not configured here: the live channel queues run:predict
  # on a DISTRIBUTION TRANSITION — a petition newly distributed for a
  # conference, or relisted to a new one — the cert-calendar analogue of
  # pull.predict_on_change_only. It replaced the interim predict_on_refresh
  # spend guard; max_cases_per_run above still bounds worst-case daily volume.

# historical = the historical Term walker (run-pull's historical job):
# accumulates resolved outcomes reverse-chronologically by Term — primarily
# for the statpack's per-Term base rates, secondarily the cert back-test set —
# by walking October Terms over the supremecourt.gov docket JSON: the same
# client/ingest path as `live:` above, so no API budget. This section IS the
# set's sampling frame; it is committed so the set's construction stays
# documented and reproducible.
historical:
  # Two-digit October Terms to walk, newest first. Floor OT2017, the
  # reachability probe's full-JSON floor (docs/live-sources.md). OT2025
  # is walkable alongside the forward poller (`live:`): the walker ingests
  # only decided petitions, skips pending ones, and leaves a decided petition
  # whose existing case carries an open PREDICTED event to the watchlist (its
  # re-poll queues the evaluate handoff the walker never files); the two
  # walkers' cursors are disjoint, so neither rewinds the other. Note the
  # sampling frame below applies to what the WALKER ingests — a Term the
  # forward poller also onboarded (OT2025+) carries poller-full coverage on
  # top of the walker's sample, so per-Term composition is not uniform there.
  terms: [25, 24, 23, 22, 21, 20, 19, 18, 17]
  # The denial sample: a Term is overwhelmingly denials, so every decided
  # petition is ingested EXCEPT denials, which are kept when their docket
  # serial is a multiple of this (10 = a systematic ~10% slice, uniform over
  # each Term's filing sequence and deterministic per serial, so a resumed run
  # keeps the identical sample). 1 keeps every denial.
  denial_sample_every: 10
  # Docket-JSON probes per `historical-terms` invocation = the workflow loop's
  # checkpoint chunk (~10 min at the polite ~1 req/s; ingested petitions'
  # document fetches ride on top). Trades crash-loss / corpus-push frequency,
  # not the total loaded per run — that is the workflow loop's wall clock.
  max_probes_per_run: 600
  # Per-invocation wall-clock backstop, minutes, checked between serials — so
  # a degraded upstream's retry pauses stop the chunk instead of stalling it.
  max_run_minutes: 20
  # Consecutive 404s that mark a (Term, stream)'s frontier — for a finished
  # Term, the true end of its docket sequence.
  frontier_misses: 2
  # Seconds between requests (polite-client pacing; browser UA is built in).
  throttle_seconds: 1.0
  # Oldest Term whose ingested petitions get filed documents fetched (the
  # document-rich replay cells need them): document links are a rolling
  # ~5-Term window upstream, near-zero before ~OT2021, so older Terms load as
  # metadata+proceedings-only rows. Two-digit Term form.
  document_floor_term: 21
  # Per-document cap on extracted text stored in the corpus (see `live:`).
  document_text_cap: 150000

predict:
  # Prediction-scope gate (docs/data-pipeline.md "Scope", docs/budget.md "The
  # pilot slice"). Restricts only the agentic predict/evaluate stages; ingestion
  # stays full-coverage. Read at the pull-queue and matrix seams.
  #   scotus_docket — only SCOTUS dockets (court == scotus); the cost gate.
  #                   Originating court-of-appeals dockets are ingested for
  #                   context and retrieval but not predicted.
  #   all           — no gate: every changed case with open events is in-scope;
  #                   keep for dev / unrestricted back-testing.
  scope: scotus_docket
  # Hard cap on concurrent predictor matrix jobs. The enforced value is the
  # `strategy.max-parallel` literal in run-predict/run-evaluate;
  # keep this in step with it (nothing reads this key today — it documents intent).
  max_parallel: 6
  # Skip events already resolved (an outcome.json exists).
  skip_resolved: true

evaluate:
  # Only evaluate events that have a realized outcome.json.
  require_outcome: true

# salience = the salience gate (see docs/salience.md): ranks in-scope cert
# petitions by a deterministic score and spends the tournament on the top slice
# up to a fundable capacity N. N is a guaranteed floor per conference, not a hard
# ceiling — carve-outs and the sticky latch may push the realized count above it.
salience:
  # Bootstrapping-sized: the long-conference cap keeps the flagship three-engine
  # OT2026 release inside the ~$10K bootstrapping budget (~$5K inference at the
  # measured ~$25/fully-tournamented-case, over the ~$5K non-inference floor);
  # raised as funding lifts N (see docs/budget.md). The long conference (the
  # Term's opening conference) clears the summer backlog at once, so it carries a
  # larger cap than a regular conference.
  per_conference_capacity: 150
  long_conference_capacity: 200
  # Always-include threshold: a petition at/above this score is selected
  # regardless of rank (the relist-2 / CVSG grant-rate band).
  floor: 0.28

courts:
  # The tracked set: SCOTUS + all 13 federal courts of appeals, by CourtListener
  # court id. pull keeps these current. District courts are intentionally out
  # of scope for now.
  - scotus
  - ca1
  - ca2
  - ca3
  - ca4
  - ca5
  - ca6
  - ca7
  - ca8
  - ca9
  - ca10
  - ca11
  - cadc
  - cafc
