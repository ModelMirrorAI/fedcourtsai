# Global tracking settings for the seed (backfill), pull (refresh), and predict
# fan-out. See docs/data-pipeline.md for the full design. These keys are the
# contract the seed/pull workflows read; treat them as the single place to tune
# scope and the CourtListener API budget.

# seed = historical backfill from CourtListener BULK data (no API budget).
# Runs daily until the backlog is loaded, then quarterly reconciliation.
seed:
  # Source: CourtListener quarterly bulk-data snapshots (public S3).
  source: bulk
  # Cases per `seed-backfill` invocation = the run-seed loop's checkpoint chunk.
  # The workflow stages the snapshot once, then loops this many cases at a time
  # (committing + pushing the corpus after each) until the backlog is done or its
  # wall-clock budget runs out — so this trades crash-loss / push-frequency, not
  # the total loaded per run. No API budget (bulk data).
  max_cases_per_run: 10000
  # Committed cursor tracking per-court backfill progress (resumable rebuild).
  cursor: config/seed-progress.yaml

# pull = targeted CourtListener enrichment from the rate-limited REST API. Owns
# the API budget. Since the live-sources pivot (July 2026, issues #472/#524) the
# supremecourt.gov channel owns SCOTUS freshness; pull's budget goes to keeping
# the SCOTUS-touched set's CourtListener records current — most importantly the
# originating CoA dockets the predict_eligible latch flags — not to draining
# bulk-era gaps (the date backfill was decommissioned with #524).
# The per-request rate limits the client throttles to are NOT set here: they live
# in the runner env (FEDCOURTS_COURTLISTENER_RPM/_RPH/_RPD, wired from repo
# variables to the active Free Law Project tier — see docs/budget.md). The caps
# below bound how much work each run and each day does within that envelope.
pull:
  # Max dockets refreshed per run (~3 requests each). On Tier 2 (15/150/600) with
  # four daily windows this gives ~120 refreshes/day: 30×3=90 requests/run stays
  # under the 150/hr ceiling, and 4 runs stay under the 600/day ceiling.
  max_cases_per_run: 30
  # Refresh order: stalest first, so a large active set rotates within budget.
  rotation: oldest_last_pulled_first
  # Don't spend budget re-fetching closed / resolved cases.
  skip_closed: true
  # Reserve up to this many of each run's slots for the stalest predict-eligible
  # (SCOTUS-touched) cases, so the pilot set rotates ahead of the much larger
  # general active set and new docket activity is caught before a case resolves.
  # Unused slots fall through to the normal rotation, so it never wastes budget —
  # a large reserve is safe: it only bites when the eligible-open pool is big
  # enough to fill it, which is exactly when the pilot should get priority.
  eligible_refresh_reserve: 20
  # Discover newly-filed dockets in the tracked courts since the last run.
  # Decision recorded with the July 2026 pivot (#524): stays ON until the live
  # channel (#472) lands, because this is currently the only path that onboards
  # newly filed SCOTUS petitions. Flip to false at #472 adoption — circuit
  # discovery onboards cases the SCOTUS-touch gate won't predict for years, and
  # its budget slice is better spent on enrichment.
  discover_new_filings: true
  # Hard cap on new dockets onboarded per discovery run (its own slice of the
  # budget, separate from max_cases_per_run above).
  max_new_cases_per_run: 10
  # Wall-clock budget for one pull-all run, minutes — checked between cases (and
  # between courts during discovery), sized well under the workflow's job
  # timeout. On expiry the run stops, defers the rest of the rotation to the
  # next window, and still writes its queues and corpus updates — a degraded
  # upstream degrades the run instead of hanging it into the CI timeout and
  # losing the whole window's work.
  max_run_minutes: 25
  # Stop the refresh rotation after this many consecutive transient REST
  # failures (timeouts / 5xx / 429): the upstream is degraded and each doomed
  # case burns a full retry cycle of budget and minutes. Deterministic per-case
  # errors (e.g. a 404) never trip it; deferred cases keep their stalest-first
  # position, so the next window retries them.
  max_consecutive_transient_failures: 5
  # Only trigger run-predict when a pull detects new docket activity.
  predict_on_change_only: true

# live = the SCOTUS live channel (#472): supremecourt.gov per-docket JSON. Owns
# SCOTUS freshness since the July 2026 pivot. No API budget — these caps bound
# per-cycle wall clock and upstream politeness (~1 req/s), not spend.
live:
  # Pending petitions re-polled per cycle (recent Terms first, then stalest).
  max_cases_per_run: 30
  # New petitions onboarded from the Term's numbering frontier per cycle
  # (sequential probing: paid from <term>-1, IFP from <term>-5001).
  max_new_cases_per_run: 25
  # Oldest October Term the refresh rotation reaches — the reachability probe's
  # floor (docs/live-sources-probe.md): full JSON coverage OT2017+.
  term_floor_year: 2017
  # Seconds between requests (polite-client pacing; browser UA is built in).
  throttle_seconds: 1.0
  # Consecutive 404s that mark a numbering stream's current frontier.
  frontier_misses: 2

predict:
  # Prediction-scope gate (docs/data-pipeline.md "Scope", docs/budget.md "The
  # pilot slice"). Restricts only the agentic predict/evaluate stages; ingestion
  # (seed/pull) stays full-coverage. Read at the pull-queue and matrix seams.
  #   scotus_touched — only cases that have interacted with SCOTUS (the latching
  #                    predict_eligible flag); the pilot cost gate.
  #   all            — no gate: every changed case with open events is in-scope;
  #                    keep for dev / unrestricted back-testing.
  scope: scotus_touched
  # Hard cap on concurrent predictor matrix jobs. The enforced value is the
  # `strategy.max-parallel` literal in run-predict/run-evaluate/run-reconcile;
  # keep this in step with it (nothing reads this key today — it documents intent).
  max_parallel: 6
  # Skip events already resolved (an outcome.json exists).
  skip_resolved: true

evaluate:
  # Only evaluate events that have a realized outcome.json.
  require_outcome: true

courts:
  # The tracked set: SCOTUS + all 13 federal courts of appeals, by CourtListener
  # court id. seed backfills history for these; pull keeps them current. District
  # courts are intentionally out of scope for now.
  - scotus
  - ca1
  - ca2
  - ca3
  - ca4
  - ca5
  - ca6
  - ca7
  - ca8
  - ca9
  - ca10
  - ca11
  - cadc
  - cafc
