# Evaluator registry — the routing table for `run-evaluate`.
# Each enabled evaluator scores EVERY predictor's prediction for a resolved
# event (evaluator x predictor fan-out). Quantitative scores (correctness,
# Brier, vote accuracy) are computed identically in code; evaluators add the
# qualitative judgment of the predicted reasoning.

# Tool manifest (#525): same shape and rules as config/predictors.yaml —
# pinned MCP servers, referenced per evaluator by id, echoed into each cell's
# retrieval_log.json. Evaluators get the same retrieval as predictors so a
# judge can check a cited authority rather than take it on faith.
mcp_servers:
  - id: courtlistener
    package: "courtlistener-api-client[mcp]==1.0.0"
    command: courtlistener-mcp
    token_env: COURTLISTENER_API_TOKEN
    description: >-
      Official CourtListener MCP (see config/predictors.yaml for the full
      rationale; keep the two manifests' pins in lockstep).

evaluators:
  - id: claude-judge
    engine: claude-code
    model: null
    prompt: .github/prompts/evaluate.md
    enabled: true
    mcp_servers: [courtlistener]
    description: Claude Code evaluator scoring reasoning quality against the outcome.

  - id: codex-judge
    engine: codex
    model: null
    prompt: .github/prompts/evaluate.md
    enabled: true
    mcp_servers: [courtlistener]
    description: Codex evaluator, for cross-checking the Claude evaluator.

  - id: gemini-judge
    engine: gemini
    model: null
    prompt: .github/prompts/evaluate.md
    enabled: true
    mcp_servers: [courtlistener]
    description: Gemini evaluator, for cross-checking the Claude and Codex evaluators.
