# DVC pipeline file. The `leaderboard` stage rolls the git `data/` evaluations
# ledger up into `metrics/leaderboard.json`, and the `backtest` stage replays the
# reference predictors over the resolved corpus into `metrics/backtest.json`, so
# `dvc metrics show` / `dvc metrics diff` track both predictor standings and
# historical back-test quality across runs. Both metric files are small and worth
# reading in a diff, so they are git-tracked (not pushed to the remote like the
# corpus blob).
stages:
  leaderboard:
    cmd: uv run fedcourts leaderboard
    deps:
      - data/cases
      - src/fedcourtsai/leaderboard.py
      - src/fedcourtsai/store.py
    metrics:
      - metrics/leaderboard.json:
          cache: false

  backtest:
    cmd: uv run fedcourts backtest
    deps:
      - corpus/corpus.db
      - src/fedcourtsai/backtest.py
      - src/fedcourtsai/corpus.py
    metrics:
      - metrics/backtest.json:
          cache: false
