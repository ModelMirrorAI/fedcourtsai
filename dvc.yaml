# DVC pipeline file. The `leaderboard` stage rolls the git `data/` evaluations
# ledger up into `metrics/leaderboard.json`, the `backtest` stage replays the
# reference predictors over the resolved corpus into `metrics/backtest.json`, and the
# `statpack` stage rolls the corpus into base-rate `metrics/statpack.{json,md}`, so
# `dvc metrics show` / `dvc metrics diff` track predictor standings, historical
# back-test quality, and corpus base-rates across runs. All metric files are small and
# worth reading in a diff, so they are git-tracked (not pushed to the remote like the
# corpus blob). The weekly `run-metrics` workflow keeps them fresh (#383): it reruns
# these same stage commands and lands any change as a reviewed PR.
stages:
  leaderboard:
    cmd: uv run fedcourts leaderboard
    deps:
      - data/cases
      - src/fedcourtsai/leaderboard.py
      - src/fedcourtsai/store.py
    metrics:
      - metrics/leaderboard.json:
          cache: false

  backtest:
    cmd: uv run fedcourts backtest
    deps:
      - corpus/corpus.db
      - src/fedcourtsai/backtest.py
      - src/fedcourtsai/corpus.py
    metrics:
      - metrics/backtest.json:
          cache: false

  statpack:
    cmd: uv run fedcourts statpack
    deps:
      - corpus/corpus.db
      - src/fedcourtsai/analytics.py
      - src/fedcourtsai/corpus.py
    metrics:
      - metrics/statpack.json:
          cache: false
    outs:
      - metrics/statpack.md:
          cache: false
