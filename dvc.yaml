# DVC pipeline file. For now it only registers metrics so `dvc metrics show`
# and `dvc metrics diff` track back-test results and leaderboards as they land.
# These metric files are small and worth reading in a diff, so they are
# git-tracked (not pushed to the remote like the corpus blob). Pipeline stages
# that compute them will be added with the back-test / leaderboard workflows.
metrics:
  - metrics/backtest.json
  - metrics/leaderboard.json
